    h+='</div>';
  });
  h+='</div>';
  return h;
}

window.noteWsFilter='';
function noteWsFilter(ws){ window.noteWsFilter=ws; renderContent(); }

function viewNote(id){
  var note=DB.notes().filter(function(n){ return n.id===id; })[0];
  if(!note) return;
  var body='<div class="note-meta" style="margin-bottom:14px"><span>'+_fmtFull(note.date)+'</span>';
  if(note.workstream) body+='<span class="pill" style="background:'+wsColor(note.workstream)+'18;color:'+wsColor(note.workstream)+'">'+_esc(note.workstream)+'</span>';
  if(note.attendees) body+='<span>👥 '+_esc(note.attendees)+'</span>';
  body+='</div>';
  NOTE_SEC.forEach(function(s){
    if(note[s.id]) body+='<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px">'+s.label+'</div><div style="font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:10px 12px">'+_esc(note[s.id])+'</div></div>';
  });
  // Push to todo button
  if(note.actions){
    body+='<div style="margin-top:10px"><button class="btn sm" onclick="pushActionsToTodo(\''+note.id+'\')">→ Push action items to To-Do</button></div>';
  }
  showModal({title:note.title,wide:true,body:body,saveLabel:'Edit',onSave:function(){ closeModal(); openNoteModal(id); }});
}

function pushActionsToTodo(noteId){
  var note=DB.notes().filter(function(n){ return n.id===noteId; })[0];
  if(!note||!note.actions) return;
  var todos=DB.todos();
  var lines=note.actions.split('\n').filter(function(l){ return l.trim(); });
  lines.forEach(function(line){
    todos.unshift({id:_uid(),text:line.trim(),date:_today(),workstream:note.workstream||'',
      priority:'normal',done:false,createdAt:_now(),notes:'From: '+note.title});
  });
  DB.save('todos',todos);
  closeModal();
  alert(lines.length+' action item'+(lines.length>1?'s':'')+' added to To-Do.');
  renderNav();
}

function deleteNote(id){
  if(!confirm('Delete this note?')) return;
  DB.save('notes',DB.notes().filter(function(n){ return n.id!==id; })); renderContent();
}

function openNoteModal(editId, _unused, prefillText){
  var notes=DB.notes();
  var n=editId?notes.filter(function(x){ return x.id===editId; })[0]:null;
  var ws=DB.settings().workstreams;
  var wsOpts='<option value="">— none —</option>';
  ws.forEach(function(w){ wsOpts+='<option value="'+_esc(w)+'"'+(n&&n.workstream===w?' selected':'')+'>'+_esc(w)+'</option>'; });
  var cards=DB.cards();
  var cardOpts='<option value="">— none —</option>';
  cards.forEach(function(c){ cardOpts+='<option value="'+c.id+'"'+(n&&n.linkedCard===c.id?' selected':'')+'>'+_esc(c.title)+'</option>'; });
  var fields='';
  NOTE_SEC.forEach(function(s){ fields+='<div class="field"><label>'+s.label+'</label><textarea class="inp" id="m-n-'+s.id+'" rows="3" placeholder="'+_esc(s.ph)+'">'+_esc(n?n[s.id]||'':(s.id==='summary'?prefillText||'':''))+'</textarea></div>'; });

  showModal({title:n?'Edit Note':'New Meeting Note',wide:true,body:
    '<div class="g2">'+
      '<div class="field"><label>Title</label><input class="inp" type="text" id="m-n-title" placeholder="e.g. ZM/SS Weekly Sync" value="'+_esc(n?n.title:'')+'"/></div>'+
      '<div class="field"><label>Date</label><input class="inp" type="date" id="m-n-date" value="'+(n?n.date:_today())+'"/></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="field"><label>Workstream</label><select class="inp" id="m-n-ws" onchange="toggleOtherLabel(\'m-n-ws\',\'m-n-ws-other\')">'+wsOpts+'</select></div>'
      +'<div class="field" id="m-n-ws-other-wrap" style="display:'+(n&&n.workstream||''==='Other'?'block':'none')+'"><label>What is this? <span style="font-weight:400;color:var(--t3)">(since you chose Other)</span></label><input class="inp" type="text" id="'+select_id+'-other" placeholder="e.g. Athletics, Special Ed, Title I…" value="'+(n&&n.otherLabel||''||'')+'"/></div>'+
      '<div class="field"><label>Attendees</label><input class="inp" type="text" id="m-n-att" placeholder="SS, ZM, CZ…" value="'+_esc(n?n.attendees||'':'')+'"/></div>'+
    '</div>'+
    '<div class="field"><label>Link to Card</label><select class="inp" id="m-n-card">'+cardOpts+'</select></div>'+
    fields,
  onSave:function(){
    var title=document.getElementById('m-n-title').value.trim();
    if(!title){ alert('Title required.'); return; }
    var obj={id:editId||_uid(),title:title,date:document.getElementById('m-n-date').value||_today(),
      workstream:saveWsIfCustom(getWsValue('m-n-ws')),attendees:document.getElementById('m-n-att').value.trim(),
      linkedCard:document.getElementById('m-n-card').value,createdAt:n?n.createdAt:_now()};
    NOTE_SEC.forEach(function(s){ obj[s.id]=document.getElementById('m-n-'+s.id).value.trim(); });
    if(editId) DB.save('notes',notes.map(function(x){ return x.id===editId?obj:x; }));
    else DB.save('notes',[obj].concat(notes));
    closeModal(); renderContent();
  }});
}

// ── ZENDESK ───────────────────────────────────────────────
var ZD_STATS=[{id:'open',label:'Open',color:'var(--blue)'},{id:'pending',label:'Pending',color:'var(--yellow)'},{id:'waiting',label:'Waiting on me',color:'var(--accent)'},{id:'solved',label:'Solved',color:'var(--green)'},{id:'closed',label:'Closed',color:'var(--t3)'}];
var ZD_PRIS=[{id:'urgent',label:'Urgent',color:'var(--red)'},{id:'high',label:'High',color:'var(--accent)'},{id:'normal',label:'Normal',color:'var(--blue)'},{id:'low',label:'Low',color:'var(--t3)'}];
var ZD_TYPES=['Access request','Login issue','Data question','Bug / technical issue','General question','Escalation needed'];
var ZD_ACCOUNTS=['School Performance','Insight'];
var zdAccount='School Performance';
var zdTab='tickets';
var zdFilter='all';

function getZStat(id){ for(var i=0;i<ZD_STATS.length;i++) if(ZD_STATS[i].id===id) return ZD_STATS[i]; return ZD_STATS[0]; }
function getZPri(id){ for(var i=0;i<ZD_PRIS.length;i++) if(ZD_PRIS[i].id===id) return ZD_PRIS[i]; return ZD_PRIS[2]; }
function zdDaysAgo(iso){ if(!iso) return null; return Math.floor((new Date()-new Date(iso))/86400000); }
function zdEscAge(iso){ if(!iso) return ''; var d=zdDaysAgo(iso); return d===0?'today':d===1?'1 day ago':d+' days ago'; }

function buildZendesk(){
  var h2=renderHelpTip('zendesk');
  var all=DB.tickets();
  var q=''; var qEl=document.getElementById('zendesk-q');
  if(qEl) q=qEl.value.toLowerCase();
  var acctT=all.filter(function(t){ return (t.account||'School Performance')===zdAccount; });
  var open=acctT.filter(function(t){ return t.status==='open'||t.status==='pending'||t.status==='waiting'; });
  var solved=acctT.filter(function(t){ return t.status==='solved'||t.status==='closed'; });
  var escalated=acctT.filter(function(t){ return t.escalated&&(t.status==='open'||t.status==='pending'||t.status==='waiting'); });
  var myAction=acctT.filter(function(t){ return t.myAction&&(t.status==='open'||t.status==='waiting'); });
  var waiting=acctT.filter(function(t){ return t.waitingOn&&(t.status==='open'||t.status==='pending'); });

  var h=h2+'<div style="max-width:1060px">';

  // Account tabs
  h+='<div class="row" style="margin-bottom:16px;gap:0">';
  ZD_ACCOUNTS.forEach(function(acc){
    h+='<button onclick="zdSwitchAccount(\''+acc+'\')" style="padding:8px 20px;border:1px solid var(--border2);background:'+(zdAccount===acc?'var(--accent)':'var(--card)')+';color:'+(zdAccount===acc?'#fff':'var(--t2)')+';font-size:13px;font-weight:'+(zdAccount===acc?'600':'400')+';cursor:pointer;'+(acc==='School Performance'?'border-radius:8px 0 0 8px;border-right:none':'border-radius:0 8px 8px 0')+'"  >'+acc+'</button>';
  });
  h+='<div style="flex:1"></div>';
  h+='<button onclick="zdSwitchTab(\'tickets\')" class="btn sm'+(zdTab==='tickets'?' primary':'')+'" style="margin-right:6px">All Tickets</button>';
  h+='<button onclick="zdSwitchTab(\'escalations\')" class="btn sm'+(zdTab==='escalations'?' primary':'')+'">';
  h+='Escalations';
  if(escalated.length) h+=' <span style="background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px">'+escalated.length+'</span>';
  h+='</button></div>';

  // Stats
  h+='<div class="row wrap" style="margin-bottom:16px;gap:10px">';
  h+='<div class="stat" style="padding:10px 14px;flex:1;min-width:90px"><div class="stat-n" style="font-size:20px">'+open.length+'</div><div class="stat-l">Open</div></div>';
  h+='<div class="stat" style="padding:10px 14px;flex:1;min-width:90px"><div class="stat-n" style="font-size:20px">'+solved.length+'</div><div class="stat-l">Solved</div></div>';
  if(myAction.length) h+='<div class="stat" style="padding:10px 14px;flex:1;min-width:90px;border-color:var(--accent)"><div class="stat-n" style="font-size:20px;color:var(--accent)">'+myAction.length+'</div><div class="stat-l">Need my action</div></div>';
  if(waiting.length) h+='<div class="stat" style="padding:10px 14px;flex:1;min-width:90px;border-color:var(--yellow)"><div class="stat-n" style="font-size:20px;color:var(--yellow)">'+waiting.length+'</div><div class="stat-l">Waiting on team</div></div>';
  if(escalated.length) h+='<div class="stat" style="padding:10px 14px;flex:1;min-width:90px;border-color:var(--red)"><div class="stat-n" style="font-size:20px;color:var(--red)">'+escalated.length+'</div><div class="stat-l">Escalated</div></div>';
  h+='</div>';

  if(zdTab==='escalations') h+=buildEscalationView(escalated,q);
  else h+=buildTicketTable(acctT,q);

  h+='</div>';
  return h;
}

function buildEscalationView(escalated,q){
  if(q) escalated=escalated.filter(function(t){ return t.title.toLowerCase().indexOf(q)>-1||(t.ticketId||'').indexOf(q)>-1||(t.requester||'').toLowerCase().indexOf(q)>-1; });
  if(!escalated.length) return '<div class="empty"><div class="empty-ico">✅</div><div style="font-size:13px">No open escalations.</div></div>';
  escalated=escalated.slice().sort(function(a,b){ return (a.escalatedAt||'').localeCompare(b.escalatedAt||''); });
  var h='<div style="margin-bottom:10px;font-size:12px;color:var(--t3)">Sorted oldest first — most overdue at top.</div>';
  escalated.forEach(function(t){
    var days=zdDaysAgo(t.escalatedAt);
    var ac=days===null?'var(--t3)':days>14?'var(--red)':days>7?'var(--accent)':'var(--yellow)';
    var st=getZStat(t.status); var pri=getZPri(t.priority);
    h+='<div class="card" style="margin-bottom:10px;border-left:4px solid '+ac+';cursor:pointer" onclick="openTicketModal(\''+t.id+'\')">';
    h+='<div class="card-body" style="padding:12px 16px">';
    h+='<div class="row" style="margin-bottom:8px;align-items:flex-start">';
    h+='<div style="flex:1"><div class="row wrap" style="margin-bottom:4px">';
    if(t.ticketId) h+='<span class="mono" style="color:var(--blue)">#'+_esc(t.ticketId)+'</span>';
    h+='<span class="pill" style="background:'+pri.color+'18;color:'+pri.color+'">'+pri.label+'</span>';
    h+='<span class="pill" style="background:'+st.color+'18;color:'+st.color+'">'+st.label+'</span>';
    if(zdAccount==='Insight'&&t.issueType) h+='<span class="pill gray">'+_esc(t.issueType)+'</span>';
    h+='</div><div style="font-size:13px;font-weight:600">'+_esc(t.title)+'</div></div>';
    h+='<div style="text-align:right;flex-shrink:0;padding-left:12px">';
    if(days!==null){ h+='<div style="font-size:18px;font-weight:700;color:'+ac+';line-height:1">'+days+'</div><div style="font-size:9px;color:var(--t3);text-transform:uppercase">days</div>'; }
    h+='</div></div>';
    h+='<div class="row wrap" style="gap:14px;font-size:12px;color:var(--t2)">';
    if(t.requester) h+='<span>👤 '+_esc(t.requester)+'</span>';
    if(t.dbn) h+='<span>🏫 '+_esc(t.dbn)+'</span>';
    if(t.escalatedTo) h+='<span>📤 '+_esc(t.escalatedTo)+'</span>';
    if(t.escalatedAt) h+='<span style="color:'+ac+'">⏱ '+zdEscAge(t.escalatedAt)+'</span>';
    h+='</div>';
    if(t.myAction||t.waitingOn){
      h+='<div class="g2" style="margin-top:10px;gap:8px">';
      if(t.myAction) h+='<div style="background:#fdf3ee;border-radius:8px;padding:8px 10px"><div style="font-size:9.5px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:3px">I need to</div><div style="font-size:12px">'+_esc(t.myAction)+'</div></div>';
      if(t.waitingOn) h+='<div style="background:#fef8ec;border-radius:8px;padding:8px 10px"><div style="font-size:9.5px;font-weight:700;color:var(--yellow);text-transform:uppercase;margin-bottom:3px">Waiting on</div><div style="font-size:12px">'+_esc(t.waitingOn)+'</div></div>';
      h+='</div>';
    }
    if(t.statusNotes) h+='<div style="margin-top:8px;font-size:11.5px;color:var(--t2);padding:6px 10px;background:var(--bg);border-radius:6px">'+_esc(t.statusNotes)+'</div>';
    h+='</div></div>';
  });
  return h;
}

function buildTicketTable(tickets,q){
  if(q) tickets=tickets.filter(function(t){ return t.title.toLowerCase().indexOf(q)>-1||(t.ticketId||'').indexOf(q)>-1||(t.requester||'').toLowerCase().indexOf(q)>-1||(t.dbn||'').indexOf(q)>-1; });
  var h='<div class="row wrap" style="margin-bottom:12px;gap:6px">';
  var filters=[{id:'all',label:'All'},{id:'open',label:'Open'},{id:'waiting',label:'Waiting on me'},{id:'escalated',label:'Escalated'},{id:'solved',label:'Solved'}];
  filters.forEach(function(f){ h+='<button class="btn sm'+(zdFilter===f.id?' active-filter':'')+'" onclick="zdSetFilter(\''+f.id+'\')">'+f.label+'</button>'; });
  h+='</div>';
  if(zdFilter==='open') tickets=tickets.filter(function(t){ return t.status==='open'||t.status==='pending'; });
  if(zdFilter==='waiting') tickets=tickets.filter(function(t){ return t.status==='waiting'||t.myAction; });
  if(zdFilter==='escalated') tickets=tickets.filter(function(t){ return t.escalated; });
  if(zdFilter==='solved') tickets=tickets.filter(function(t){ return t.status==='solved'||t.status==='closed'; });
  tickets=tickets.slice().sort(function(a,b){
    var as=(a.escalated&&a.status!=='solved'?2:0)+(a.myAction?1:0);
    var bs=(b.escalated&&b.status!=='solved'?2:0)+(b.myAction?1:0);
    return as!==bs?bs-as:(b.createdAt||'').localeCompare(a.createdAt||'');
  });
  if(!tickets.length) return h+'<div class="empty"><div class="empty-ico">🎫</div><div style="font-size:13px">No tickets here.</div></div>';
  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  h+='<th>#</th><th style="min-width:180px">Issue</th>';
  if(zdAccount==='Insight') h+='<th>Type</th>';
  h+='<th>Requester</th><th>DBN</th><th>Status</th><th>I need to</th><th>Waiting on</th><th>Age</th><th></th>';
  h+='</tr></thead><tbody>';
  tickets.forEach(function(t){
    var st=getZStat(t.status); var pri=getZPri(t.priority);
    var isEsc=t.escalated&&(t.status==='open'||t.status==='pending'||t.status==='waiting');
    var days=isEsc?zdDaysAgo(t.escalatedAt):zdDaysAgo(t.createdAt);
    var ac=days===null?'':days>14?'overdue':days>7?'soon':'';
    h+='<tr onclick="openTicketModal(\''+t.id+'\')" style="cursor:pointer'+(isEsc?';background:#fff8f6':'')+'">';
    h+='<td><span class="mono" style="color:var(--blue)">'+(t.ticketId?'#'+_esc(t.ticketId):'—')+'</span></td>';
    h+='<td><div style="font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:4px">'+(isEsc?'<span style="color:var(--red)">⚑</span>':'')+_esc(t.title)+'</div>';
    h+='<div style="margin-top:2px;display:flex;gap:4px"><span class="pill" style="font-size:9px;background:'+st.color+'18;color:'+st.color+'">'+st.label+'</span><span class="pill" style="font-size:9px;background:'+pri.color+'18;color:'+pri.color+'">'+pri.label+'</span></div></td>';
    if(zdAccount==='Insight') h+='<td style="font-size:11.5px">'+_esc(t.issueType||'—')+'</td>';
    h+='<td style="font-size:12px">'+_esc(t.requester||'—')+'</td>';
    h+='<td><span class="mono" style="font-size:11px">'+_esc(t.dbn||'—')+'</span></td>';
    h+='<td>'+(t.escalatedTo?'<div style="font-size:10px;color:var(--t3)">→ '+_esc(t.escalatedTo)+'</div>':'')+'</td>';
    h+='<td style="font-size:11.5px;max-width:140px">'+(t.myAction?'<span style="color:var(--accent)">'+_esc(t.myAction)+'</span>':'<span style="color:var(--t3)">—</span>')+'</td>';
    h+='<td style="font-size:11.5px;max-width:140px">'+(t.waitingOn?'<span style="color:var(--yellow)">'+_esc(t.waitingOn)+'</span>':'<span style="color:var(--t3)">—</span>')+'</td>';
    h+='<td style="font-size:11px;white-space:nowrap" class="'+(isEsc?ac:'')+'">'+(days!==null?days+'d':'—')+'</td>';
    h+='<td onclick="event.stopPropagation()" style="white-space:nowrap">';
    h+='<button class="btn sm ghost" data-flag-type="Ticket" data-flag-text="#'+_esc(t.ticket||t.id.slice(0,6))+' '+_esc((t.title||'').slice(0,40))+'" data-flag-ws="" onclick="flagFromBtn(this)">⚑</button>';
    h+='<button class="btn sm ghost" onclick="cycleTicketStatus(\''+t.id+'\')">↻</button>';
    h+='<button class="btn sm ghost" onclick="deleteTicket(\''+t.id+'\')">✕</button>';
    h+='</td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function zdSwitchAccount(acc){ zdAccount=acc; zdFilter='all'; zdTab='tickets'; renderContent(); }
function zdSwitchTab(tab){ zdTab=tab; renderContent(); }
function zdSetFilter(f){ zdFilter=f; renderContent(); }

function cycleTicketStatus(id){
  var tickets=DB.tickets();
  var order=['open','pending','waiting','solved','closed'];
  for(var i=0;i<tickets.length;i++) if(tickets[i].id===id){
    var idx=order.indexOf(tickets[i].status);
    tickets[i].status=order[(idx+1)%order.length]; tickets[i].updatedAt=_now(); break;
  }
  DB.save('tickets',tickets); renderNav(); renderContent();
}
function deleteTicket(id){
  if(!confirm('Delete?')) return;
  DB.save('tickets',DB.tickets().filter(function(t){ return t.id!==id; })); renderContent();
}

function openTicketModal(editId){
  var tickets=DB.tickets();
  var t=editId?tickets.filter(function(x){ return x.id===editId; })[0]:null;
  var acct=t?(t.account||'School Performance'):zdAccount;
  var statOpts=''; ZD_STATS.forEach(function(s){ statOpts+='<option value="'+s.id+'"'+((t?t.status:'open')===s.id?' selected':'')+'>'+s.label+'</option>'; });
  var priOpts=''; ZD_PRIS.forEach(function(p){ priOpts+='<option value="'+p.id+'"'+((t?t.priority:'normal')===p.id?' selected':'')+'>'+p.label+'</option>'; });
  var accOpts=''; ZD_ACCOUNTS.forEach(function(a){ accOpts+='<option value="'+a+'"'+(acct===a?' selected':'')+'>'+a+'</option>'; });

var COMMS_TYPES=['Digest','Mailing','Announcement','Recap','Other'];
var COMMS_AUDIENCES=['SWM','OPE Leads','Principals','All staff','Leadership','External'];
var COMMS_STATS=['drafting','in review','approved','sent'];
var commsView='workstream';

function buildComms(){
  var h2=renderHelpTip('comms');
  var all=DB.comms();
  var q=''; var qEl=document.getElementById('comms-q');
  if(qEl) q=qEl.value.toLowerCase();
  var comms=q?all.filter(function(c){ return c.title.toLowerCase().indexOf(q)>-1||(c.workstream||'').toLowerCase().indexOf(q)>-1; }):all;

  var h=h2+'<div style="max-width:1060px">';

  // View toggle
  h+='<div class="row wrap" style="margin-bottom:14px;gap:8px">';
  h+='<button class="btn sm'+(commsView==='workstream'?' active-filter':'')+'" onclick="commsSetView(\'workstream\')">By Workstream</button>';
  h+='<button class="btn sm'+(commsView==='status'?' active-filter':'')+'" onclick="commsSetView(\'status\')">By Status</button>';
  h+='<button class="btn sm'+(commsView==='date'?' active-filter':'')+'" onclick="commsSetView(\'date\')">By Send Date</button>';
  h+='</div>';

  if(!comms.length){
    h+='<div class="empty"><div class="empty-ico">✉</div><div style="font-size:13px">No comms tracked yet.</div></div>';
    h+='</div>'; return h;
  }

  // Stats
  var drafting=all.filter(function(c){ return c.status==='drafting'; }).length;
  var review=all.filter(function(c){ return c.status==='in review'; }).length;
  var sent=all.filter(function(c){ return c.status==='sent'; }).length;
  h+='<div class="g4" style="margin-bottom:16px">';
  h+='<div class="stat"><div class="stat-n">'+drafting+'</div><div class="stat-l">Drafting</div></div>';
  h+='<div class="stat"><div class="stat-n">'+review+'</div><div class="stat-l">In Review</div></div>';
  h+='<div class="stat"><div class="stat-n">'+sent+'</div><div class="stat-l">Sent</div></div>';
  h+='<div class="stat"><div class="stat-n">'+all.length+'</div><div class="stat-l">Total</div></div>';
  h+='</div>';

  var sorted=comms.slice().sort(function(a,b){ return (a.sendDate||'9').localeCompare(b.sendDate||'9'); });

  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  h+='<th>Title</th><th>Type</th><th>Workstream</th><th>Audience</th><th>Status</th><th>Planned Send</th><th>Actual Send</th><th>Reviewer</th><th>Link</th><th></th>';
  h+='</tr></thead><tbody>';

  sorted.forEach(function(c){
    var statColor={'drafting':'var(--yellow)','in review':'var(--blue)','approved':'var(--purple)','sent':'var(--green)'}[c.status]||'var(--t3)';
    var du=_daysUntil(c.sendDate);
    var dc=du===null?'':du<0&&c.status!=='sent'?'overdue':du<=3&&c.status!=='sent'?'soon':'';
    h+='<tr onclick="openCommsModal(\''+c.id+'\')" style="cursor:pointer">';
    h+='<td><div style="font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:6px">';
    if(c.workstream) h+='<div style="width:4px;height:16px;border-radius:2px;background:'+wsColor(c.workstream)+'"></div>';
    h+=_esc(c.title)+'</div>';
    if(c.notes) h+='<div style="font-size:11px;color:var(--t3);margin-top:1px">'+_esc(c.notes.slice(0,60))+'</div>';
    h+='</td>';
    h+='<td><span class="pill gray">'+_esc(c.type||'—')+'</span></td>';
    h+='<td style="font-size:12px">'+_esc(c.workstream||'—')+'</td>';
    h+='<td style="font-size:12px">'+_esc(c.audience||'—')+'</td>';
    h+='<td><span style="font-size:11px;font-weight:600;color:'+statColor+'">'+_esc(c.status||'—')+'</span></td>';
    h+='<td style="font-size:11px" class="'+dc+'">'+_fmt(c.sendDate)+'</td>';
    h+='<td style="font-size:11px;color:var(--t3)">'+_fmt(c.actualSendDate)+'</td>';
    h+='<td style="font-size:12px">'+_esc(c.reviewer||'—')+'</td>';
    h+='<td>'+(c.url?'<a href="'+_esc(c.url)+'" target="_blank" onclick="event.stopPropagation()" style="color:var(--blue);font-size:11px">Open ↗</a>':'')+'</td>';
    h+='<td onclick="event.stopPropagation()" style="white-space:nowrap">';
    if(c.status!=='sent') h+='<button class="btn sm" onclick="openPresendChecklist(\''+c.id+'\')" style="font-size:10px;margin-right:3px">✓ Pre-send</button>';
    h+='<button class="btn sm ghost" onclick="copyCommsAsEmail(\''+c.id+'\')" style="font-size:10px;margin-right:3px" title="Copy formatted for email">📋</button>';
    h+='<button class="btn sm ghost" data-flag-type="Comms" data-flag-text="'+_esc(c.title)+'" data-flag-ws="'+_esc(c.workstream||'')+'" onclick="flagFromBtn(this)">⚑</button>';
    h+='<button class="btn sm ghost" onclick="deleteComms(\''+c.id+'\')">✕</button>';
    h+='</td>';
    h+='</tr>';
  });

  h+='</tbody></table></div></div>';
  return h;
}

// ── DECISIONS ─────────────────────────────────────────────
var DEC_FUNCTIONS=['Project Management','Management','Engagement','Communication','Operations'];

function buildDecisions(){
  var h2=renderHelpTip('decisions');
  var all=DB.decisions();
  var h=h2+'<div style="max-width:900px">';
  if(!all.length){
    h+='<div class="empty"><div class="empty-ico">⊕</div><div style="font-size:13px">No decisions logged yet.</div></div>';
    h+='</div>'; return h;
  }

  var groups={};
  all.forEach(function(d){
    var k=d.function||'Other';
    if(!groups[k]) groups[k]=[];
    groups[k].push(d);
  });

  DEC_FUNCTIONS.concat(['Other']).forEach(function(fn){
    if(!groups[fn]||!groups[fn].length) return;
    h+='<div style="margin-bottom:20px">';
    h+='<div class="section-label" style="margin-bottom:10px">'+fn+'</div>';
    groups[fn].sort(function(a,b){ return b.date.localeCompare(a.date); }).forEach(function(d){
      h+='<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="openDecisionModal(\''+d.id+'\')">';
      h+='<div class="card-body" style="padding:11px 16px">';
      h+='<div class="row" style="align-items:flex-start;margin-bottom:6px">';
      h+='<div style="flex:1"><div style="font-size:13.5px;font-weight:600;font-family:Lora,serif">'+_esc(d.title)+'</div></div>';
      h+='<div class="row" style="flex-shrink:0;gap:6px">';
      h+='<span style="font-size:11px;color:var(--t3)">'+_fmt(d.date)+'</span>';
      if(d.workstream) h+='<span class="pill" style="background:'+wsColor(d.workstream)+'18;color:'+wsColor(d.workstream)+'">'+_esc(d.workstream)+'</span>';
      h+='<button class="btn sm ghost" onclick="event.stopPropagation();deleteDecision(\''+d.id+'\')">✕</button>';
      h+='</div></div>';
      if(d.why) h+='<div style="font-size:12px;color:var(--t2);margin-bottom:5px">'+_esc(d.why)+'</div>';
      h+='<div class="row wrap" style="gap:12px;font-size:11.5px;color:var(--t3)">';
      if(d.madeBy) h+='<span>👤 '+_esc(d.madeBy)+'</span>';
      if(d.impacts) h+='<span>⚡ Impacts: '+_esc(d.impacts)+'</span>';
      if(d.inform) h+='<span>📢 Inform: '+_esc(d.inform)+'</span>';
      if(d.revisitDate){
        var overdue=d.revisitDate<=_today()&&!d.outcome;
        h+='<span style="color:'+(overdue?'var(--red)':'var(--blue)')+';font-weight:'+(overdue?'700':'400')+'">'+(overdue?'⚠ Revisit overdue: ':'📅 Revisit: ')+_fmt(d.revisitDate)+'</span>';
      }
      if(d.outcome) h+='<span style="color:var(--green)">✓ Outcome: '+_esc(d.outcome)+'</span>';
      h+='</div></div></div>';
    });
    h+='</div>';
  });

  h+='</div>';
  return h;
}

function openEodModal(){
  var td=_today();
  var existing=DB.eod().filter(function(e){ return e.date===td; })[0];
  var todos=DB.todos().filter(function(t){ return !t.done&&t.date<td; });

  showModal({title:'End of Day — '+_fmt(td),body:
    '<div class="field"><label>Priority #1 for tomorrow</label><textarea class="inp" id="m-eod-pri" rows="2" placeholder="The one thing I must do tomorrow…">'+_esc(existing?existing.priority1||'':'')+'</textarea></div>'+

// ── WEEKLY SNAPSHOT ───────────────────────────────────────
var snapshotHtml='';

function buildSnapshot(){
  var h2=renderHelpTip('snapshot');
  var h=h2+'<div style="max-width:700px">';
  h+='<div style="font-size:12.5px;color:var(--t3);margin-bottom:18px">Auto-generated from this week\'s activity. Hit "Generate This Week" in the top right, then edit before saving.</div>';
  if(!snapshotHtml){
    h+='<div class="empty"><div class="empty-ico">◐</div><div style="font-size:13px">Hit <strong>Generate This Week</strong> to create your snapshot.</div></div>';
  } else {
    h+=snapshotHtml;
  }
  h+='</div>';
  return h;
}

function generateSnapshot(){
  var td=_today();
  var weekStart=new Date(); weekStart.setDate(weekStart.getDate()-weekStart.getDay());
  var ws=weekStart.toISOString().split('T')[0];

  var todos=DB.todos();
  var notes=DB.notes();
  var deliverables=DB.deliverables();
  var cards=DB.cards();
  var tickets=DB.tickets();

  var done=todos.filter(function(t){ return t.done&&(t.doneAt||'')>=ws; });
  var sentDels=deliverables.filter(function(d){ return (d.phase==='sent'||d.phase==='done')&&d.dueDate>=ws; });
  var thisWeekNotes=notes.filter(function(n){ return n.date>=ws; });
  var carryOver=todos.filter(function(t){ return !t.done&&t.date<td; });
  var blocked=cards.filter(function(c){ return c.status==='blocked'; });
  var openTickets=tickets.filter(function(t){ return t.status==='open'; });

  var h='<div class="eod-card">';
  h+='<div style="font-family:Lora,serif;font-size:20px;font-weight:600;margin-bottom:4px">Weekly Snapshot</div>';
  h+='<div style="font-size:12px;color:var(--t3);margin-bottom:20px">Week of '+_fmt(ws)+' — '+_fmt(td)+'</div>';

  // Done
  h+=snapshotSection('✓ Tasks completed ('+done.length+')', done.map(function(t){ return t.text+(t.workstream?' ('+t.workstream+')':''); }));
  h+=snapshotSection('◫ Deliverables sent / submitted ('+sentDels.length+')', sentDels.map(function(d){ return d.title; }));
  h+=snapshotSection('◎ Meetings this week ('+thisWeekNotes.length+')', thisWeekNotes.map(function(n){ return n.title+' — '+_fmt(n.date); }));

  // Carrying over
  h+=snapshotSection('→ Carrying over to next week ('+carryOver.length+')', carryOver.slice(0,8).map(function(t){ return t.text; }));

  // Blockers
  if(blocked.length) h+=snapshotSection('⛔ Blocked ('+blocked.length+')', blocked.map(function(c){ return c.title+(c.blockerNote?' — '+c.blockerNote:''); }));
  if(openTickets.length) h+='<div style="margin-bottom:16px"><div style="font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">🎫 Open Zendesk tickets</div><div style="font-size:13px;color:var(--t2)">'+openTickets.length+' open across School Performance &amp; Insight</div></div>';

  // Next week
  var upDel=deliverables.filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'&&d.dueDate>td; }).sort(function(a,b){ return a.dueDate.localeCompare(b.dueDate); }).slice(0,5);
  h+=snapshotSection('📅 Next week priorities', upDel.map(function(d){ return _fmt(d.dueDate)+' — '+d.title; }));

  h+='</div>';
  snapshotHtml=h;
  renderContent();
}

function snapshotSection(title, items){
  if(!items.length) return '';
  var h='<div style="margin-bottom:16px">';
  h+='<div style="font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">'+title+'</div>';
  h+='<ul style="padding-left:16px;margin:0">';
  items.forEach(function(item){ h+='<li style="font-size:13px;color:var(--t2);line-height:1.7">'+_esc(item)+'</li>'; });
  h+='</ul></div>';
  return h;
}

var JIRA_BASE = _lsGet('dh4-jira-base',''); // legacy single-base (kept for compatibility)

function getJiraBases(){
  var bases=_lsGet('dh4-jira-bases',null);
  // Hardcoded defaults for this hub
  var defaults=[
    {name:'SQR',     url:'https://doeord.atlassian.net/browse/'},
    {name:'SQRT',    url:'https://doeord.atlassian.net/browse/'},
    {name:'INSIGHT', url:'https://doeord.atlassian.net/browse/'}
  ];
  if(bases===null){ _lsSave('dh4-jira-bases',defaults); return defaults; }
  // Migrate legacy single base if needed
  if(!bases.length&&JIRA_BASE){ bases=[{name:'Jira',url:JIRA_BASE}]; _lsSave('dh4-jira-bases',bases); }
  return bases;
}

function jiraLink(ticket){
  if(!ticket) return _esc(ticket);
  var bases=getJiraBases();
  if(!bases.length) return '<span class="mono">'+_esc(ticket)+'</span>';
  // Match ticket prefix to base (e.g. "SQR-123" matches base named "SQR")
  var base=bases[0].url; // default to first
  for(var i=0;i<bases.length;i++){
    var prefix=bases[i].name.toUpperCase();
    if(ticket.toUpperCase().startsWith(prefix+'-')||ticket.toUpperCase().startsWith(prefix)){
      base=bases[i].url; break;
    }
  }
  if(!base.endsWith('/')) base+='/';
  return '<a href="'+_esc(base+ticket)+'" target="_blank" onclick="event.stopPropagation()" class="mono" style="color:var(--blue);text-decoration:none;border-bottom:1px dotted var(--blue)">'+_esc(ticket)+' ↗</a>';
}

function setJiraBase(){
  openManageJira();
}

function openManageJira(){
  function render(){
    var bases=getJiraBases();
    var body='<div style="font-size:12.5px;color:var(--t2);margin-bottom:14px;line-height:1.7">Add each Jira project you work in. Ticket numbers will auto-link to the right project based on the prefix (e.g. <strong>SQR-123</strong> matches a base named <strong>SQR</strong>).</div>';
    if(bases.length){
      body+='<div style="margin-bottom:14px">';
      bases.forEach(function(b,i){
        body+='<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:8px;margin-bottom:6px">';
        body+='<span class="pill" style="background:var(--blue)18;color:var(--blue);font-size:11px;font-weight:700;min-width:50px;text-align:center">'+_esc(b.name)+'</span>';
        body+='<span style="flex:1;font-size:11.5px;color:var(--t2);word-break:break-all">'+_esc(b.url)+'</span>';
        body+='<button onclick="deleteJiraBase('+i+');openManageJira()" style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:12px;padding:2px 4px">✕</button>';
        body+='</div>';
      });
      body+='</div>';
    } else {
      body+='<div style="color:var(--t3);font-size:12px;margin-bottom:14px">No Jira bases configured yet.</div>';
    }
    body+='<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px">';
    body+='<div style="font-size:12px;font-weight:700;margin-bottom:10px">Add a Jira project</div>';
    body+='<div class="g2">';
    body+='<div class="field"><label>Prefix / Name</label><input class="inp" type="text" id="m-jira-name" placeholder="e.g. SQR, NSS, INSIGHT"/></div>';
    body+='<div class="field"><label>Base URL</label><input class="inp" type="text" id="m-jira-url" placeholder="https://yourcompany.atlassian.net/browse/"/></div>';
    body+='</div>';
    body+='<button class="btn primary" onclick="addJiraBase()">Add</button>';
    body+='</div>';
    return body;
  }
  showModal({title:'Manage Jira Links',wide:true,body:render(),hideFooter:true});
}

function addJiraBase(){
  var name=document.getElementById('m-jira-name').value.trim().toUpperCase();
  var url=document.getElementById('m-jira-url').value.trim();
  if(!name||!url){ alert('Fill in both fields.'); return; }
  if(!url.endsWith('/')) url+='/';
  var bases=getJiraBases();
  // Check duplicate name
  if(bases.find(function(b){ return b.name===name; })){ alert(name+' already exists. Delete it first to update.'); return; }
  bases.push({name:name,url:url});
  _lsSave('dh4-jira-bases',bases);
  ghSchedulePush();
  openManageJira();
}

function deleteJiraBase(idx){
  var bases=getJiraBases();
  bases.splice(idx,1);
  _lsSave('dh4-jira-bases',bases);
  ghSchedulePush();
}

function buildLearning(){
  var h2 = renderHelpTip('learning');
  var all = DB.learning ? DB.learning() : _lsGet('dh4-learning',[]);
  var h = h2 + '<div style="max-width:800px">';

  if(!all.length){

    h += '</div>'; return h;
  }

  // Group by topic
  var groups = {};
  all.forEach(function(e){
    var k = e.topic||'Other';
    if(!groups[k]) groups[k]=[];
    groups[k].push(e);
  });

  Object.keys(groups).sort().forEach(function(topic){
    h += '<div style="margin-bottom:22px">';
    h += '<div class="section-label" style="display:flex;align-items:center;gap:7px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+wsColor(topic)+'"></div>';
    h += _esc(topic)+' <span style="font-weight:400;color:var(--t3)">('+groups[topic].length+')</span></div>';
    groups[topic].sort(function(a,b){ return b.date.localeCompare(a.date); }).forEach(function(e){
      h += '<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="openLearningModal(\''+e.id+'\')">';
      h += '<div class="card-body" style="padding:10px 16px">';
      h += '<div class="row" style="margin-bottom:6px">';
      h += '<div style="flex:1;font-size:13px;font-weight:600;font-family:Lora,serif">'+_esc(e.title)+'</div>';
      h += '<span style="font-size:11px;color:var(--t3);flex-shrink:0">'+_fmt(e.date)+'</span>';
      h += '<button class="btn sm ghost" onclick="event.stopPropagation();deleteLearning(\''+e.id+'\')">✕</button>';

// ── WORKLOAD VIEW ─────────────────────────────────────────
function buildWorkload(){
  var h2 = renderHelpTip('workload');
  var todos = DB.todos().filter(function(t){ return !t.done; });
  var cards = DB.cards().filter(function(c){ return c.status!=='done'; });
  var deliverables = DB.deliverables().filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; });
  var comms = DB.comms().filter(function(c){ return c.status!=='sent'; });

  // Build week buckets
  var today = new Date(new Date().toDateString());
  var weeks = [];
  for(var w=0;w<6;w++){
    var wStart = new Date(today); wStart.setDate(today.getDate() - today.getDay() + (w*7));
    var wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+6);
    weeks.push({start:wStart,end:wEnd,items:[]});
  }
  var overdue = [];
  var nodate = [];

  function bucket(dateStr, item){
    if(!dateStr){ nodate.push(item); return; }
    var d = new Date(dateStr+'T00:00:00');
    if(d < today){ overdue.push(item); return; }
    for(var i=0;i<weeks.length;i++){
      if(d >= weeks[i].start && d <= weeks[i].end){ weeks[i].items.push(item); return; }
    }
    nodate.push(item);
  }

  todos.forEach(function(t){ bucket(t.date,{label:t.text,type:'task',ws:t.workstream||'',date:t.date,pri:t.priority||'normal'}); });
  deliverables.forEach(function(d){ bucket(d.dueDate,{label:d.title,type:'deliverable',ws:d.workstream||'',date:d.dueDate,pri:d.priority||'normal'}); });
  comms.forEach(function(c){ bucket(c.sendDate,{label:c.title,type:'comms',ws:c.workstream||'',date:c.sendDate,pri:'normal'}); });

  var typeIcon = {task:'✓',deliverable:'◫',comms:'✉',card:'▦'};
  var typeColor = {task:'var(--blue)',deliverable:'var(--accent)',comms:'var(--purple)',card:'var(--green)'};

  function renderWeekItems(items){
    if(!items.length) return '<div style="font-size:11.5px;color:var(--t3);padding:8px 0">Nothing due</div>';
    var h='';
    items.sort(function(a,b){ return (a.date||'9').localeCompare(b.date||'9'); }).forEach(function(item){
      h += '<div style="display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)">';
      h += '<span style="font-size:10px;padding:2px 5px;border-radius:4px;background:'+typeColor[item.type]+'18;color:'+typeColor[item.type]+';flex-shrink:0;margin-top:1px">'+typeIcon[item.type]+' '+item.type+'</span>';
      h += '<div style="flex:1"><div style="font-size:12px;font-weight:500">'+_esc(item.label)+'</div>';
      if(item.ws) h += '<div style="font-size:10.5px;color:'+wsColor(item.ws)+'">'+_esc(item.ws)+'</div>';
      h += '</div>';
      if(item.date) h += '<span style="font-size:10.5px;color:var(--t3);flex-shrink:0">'+_fmt(item.date)+'</span>';
      h += '</div>';
    });
    return h;
  }

  var h = h2 + '<div style="max-width:1060px">';

  // Summary stats
  var totalOpen = todos.length + deliverables.length + comms.length;
  h += '<div class="g4" style="margin-bottom:20px">';
  h += '<div class="stat"><div class="stat-n">'+totalOpen+'</div><div class="stat-l">Total open items</div></div>';
  h += '<div class="stat" style="'+(overdue.length?'border-color:var(--red)':'')+'"><div class="stat-n" style="'+(overdue.length?'color:var(--red)':'')+'">'+overdue.length+'</div><div class="stat-l">Overdue</div></div>';
  h += '<div class="stat"><div class="stat-n">'+weeks[0].items.length+'</div><div class="stat-l">Due this week</div></div>';
  h += '<div class="stat"><div class="stat-n">'+cards.length+'</div><div class="stat-l">Active cards</div></div>';
  h += '</div>';

  // Overdue
  if(overdue.length){
    h += '<div class="card" style="margin-bottom:14px;border-color:var(--red)">';
    h += '<div class="card-head" style="background:#fdf0ee"><span style="color:var(--red)">⚠</span><span class="card-title" style="color:var(--red)">Overdue ('+overdue.length+')</span></div>';
    h += '<div class="card-body" style="padding:8px 16px">'+renderWeekItems(overdue)+'</div></div>';
  }

  // Weekly columns
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px">';
  weeks.slice(0,6).forEach(function(wk,i){
    var label = i===0?'This Week':i===1?'Next Week':'Week of '+_fmt(wk.start.toISOString().split('T')[0]);
    var heavy = wk.items.length >= 5;
    h += '<div class="card" style="'+(heavy?'border-color:var(--yellow)':'')+'">';
    h += '<div class="card-head">';
    h += '<span class="card-title" style="font-size:12px">'+label+'</span>';
    h += '<span class="pill '+(wk.items.length===0?'gray':heavy?'yellow':'green')+'" style="margin-left:auto">'+wk.items.length+'</span>';
    if(heavy) h += '<span style="font-size:10px;color:var(--yellow);margin-left:4px">heavy</span>';
    h += '</div>';
    h += '<div class="card-body" style="padding:6px 14px;max-height:220px;overflow-y:auto">'+renderWeekItems(wk.items)+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // No date
  if(nodate.length){
    h += '<div class="card">';
    h += '<div class="card-head"><span class="card-title" style="color:var(--t3)">No date set ('+nodate.length+')</span></div>';
    h += '<div class="card-body" style="padding:6px 14px">'+renderWeekItems(nodate)+'</div></div>';
  }

  h += '</div>';
  return h;
}

// ── ALERTS / NUDGES (Dashboard panel) ─────────────────────
function buildAlerts(){
  var alerts = [];
  var td = _today();

  // Overdue tasks
  var odTodos = DB.todos().filter(function(t){ return !t.done&&t.date&&t.date<td; });
  if(odTodos.length) alerts.push({level:'red',icon:'✓',msg:odTodos.length+' overdue task'+(odTodos.length>1?'s':'')+'. Oldest: '+_esc(odTodos[0].text.slice(0,50))});

  // Stuck cards
  var stuckCards = DB.cards().filter(function(c){ var d=_daysAgo(c.statusChangedAt); return d!==null&&d>7&&c.status!=='done'; });
  if(stuckCards.length) alerts.push({level:'yellow',icon:'▦',msg:stuckCards.length+' card'+(stuckCards.length>1?'s':'')+' stuck for 7+ days. Oldest stuck: '+_esc(stuckCards[0].title.slice(0,50))});

  // Old escalations
  var oldEsc = DB.tickets().filter(function(t){ return t.escalated&&(t.status==='open'||t.status==='pending')&&zdDaysAgo(t.escalatedAt)>14; });
  if(oldEsc.length) alerts.push({level:'red',icon:'🎫',msg:oldEsc.length+' escalation'+(oldEsc.length>1?'s':'')+' over 14 days old. Oldest: '+_esc(oldEsc[0].title.slice(0,50))});

  // Deliverables due in 3 days
  var urgDel = DB.deliverables().filter(function(d){ var du=_daysUntil(d.dueDate); return du!==null&&du>=0&&du<=3&&d.phase!=='done'&&d.phase!=='sent'; });
  if(urgDel.length) alerts.push({level:'yellow',icon:'◫',msg:urgDel.length+' deliverable'+(urgDel.length>1?'s':'')+' due within 3 days'});

  // Comms overdue to send
  var odComms = DB.comms().filter(function(c){ return c.sendDate&&c.sendDate<td&&c.status!=='sent'; });
  if(odComms.length) alerts.push({level:'red',icon:'✉',msg:odComms.length+' comms piece'+(odComms.length>1?'s':'')+' past planned send date'});

  // Active OOO with conflicts
  var oooBlocks=DB_ooo();
  var activeOOO=oooBlocks.filter(function(o){ return o.end>=td; });
  activeOOO.forEach(function(ooo){
    var conflicts=[];
    DB.events().forEach(function(e){ if(e.date>=ooo.start&&e.date<=ooo.end) conflicts.push(e.title); });
    DB.deliverables().filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; }).forEach(function(d){ if(d.dueDate>=ooo.start&&d.dueDate<=ooo.end) conflicts.push('DUE: '+d.title); });
    DB.todos().filter(function(t){ return !t.done; }).forEach(function(t){ if(t.date&&t.date>=ooo.start&&t.date<=ooo.end) conflicts.push(t.text); });
    if(conflicts.length) alerts.push({level:'yellow',icon:'✈',msg:'OOO "'+ooo.label+'" ('+_fmt(ooo.start)+' – '+_fmt(ooo.end)+'): '+conflicts.length+' item'+(conflicts.length>1?'s overlap':' overlaps')+' — '+_esc(conflicts[0].slice(0,40))+(conflicts.length>1?'…':'')});
  });

  if(!alerts.length) return '';

  var h = '<div class="card" style="margin-bottom:16px;border-color:var(--yellow)">';
  h += '<div class="card-head" style="background:linear-gradient(135deg,#fef8ec,#fdf3ee)"><span>⚡</span><span class="card-title">Nudges ('+alerts.length+')</span><span style="font-size:11px;color:var(--t3);margin-left:auto">Things that need attention</span></div>';
  h += '<div class="card-body" style="padding:6px 16px">';
  alerts.forEach(function(a){
    var bg = a.level==='red'?'#fdf0ee':'#fef8ec';
    var color = a.level==='red'?'var(--red)':'var(--yellow)';
    h += '<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)">';
    h += '<span style="font-size:14px">'+a.icon+'</span>';
    h += '<div style="flex:1;font-size:12.5px;color:var(--text)">'+a.msg+'</div>';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0"></div>';
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}

function buildSearch(){
  var q=window.globalSearchQ||'';
  var h='<div style="max-width:760px">';
  h+='<div style="margin-bottom:18px"><div class="sbar" style="max-width:100%;padding:10px 14px">';
  h+='<span style="color:var(--t3);font-size:16px">🔍</span>';
  h+='<input type="text" id="global-q" class="inp" placeholder="Search notes, cards, deliverables, decisions, comms…" style="font-size:14px;width:100%;background:transparent;border:none;padding:0" value="'+_esc(q)+'" oninput="globalSearch(this.value)"/>';
  h+='</div></div>';
  if(!q){ h+='<div style="color:var(--t3);font-size:13px;text-align:center;padding:40px 0">Start typing to search everything…</div></div>'; return h; }
  var results=doGlobalSearch(q);
  if(!results.length){ h+='<div style="color:var(--t3);font-size:13px;text-align:center;padding:40px 0">No results for "'+_esc(q)+'"</div></div>'; return h; }
  h+='<div style="font-size:12px;color:var(--t3);margin-bottom:12px">'+results.length+' result'+(results.length>1?'s':'')+' for "'+_esc(q)+'"</div>';
  results.forEach(function(r){
    h+='<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer" onclick="'+r.action+'">';
    h+='<div style="width:30px;height:30px;border-radius:7px;background:'+r.color+';display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff">'+r.icon+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+_esc(r.title)+'</div>';
    h+='<div style="font-size:11.5px;color:var(--t3);margin-top:2px">'+r.type+(r.sub?' · '+_esc(r.sub):'')+(r.date?' · '+_fmt(r.date):'')+'</div>';
    if(r.preview) h+='<div style="font-size:12px;color:var(--t2);margin-top:3px">'+_esc(r.preview.slice(0,120))+'</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}
window.globalSearchQ='';
function globalSearch(q){ window.globalSearchQ=q; renderContent(); }

function doGlobalSearch(q){
  var ql=q.toLowerCase(); var results=[];
  function match(s){ return s&&s.toLowerCase().indexOf(ql)>-1; }
  DB.notes().forEach(function(n){
    if(match(n.title)||match(n.agenda)||match(n.actions)||match(n.decisions))
      results.push({title:n.title,type:'Meeting Note',icon:'◎',color:'var(--blue)',sub:n.workstream,date:n.date,preview:n.agenda||n.actions||'',action:"navigate('notes')"});
  });
  DB.cards().forEach(function(c){
    if(match(c.title)||match(c.desc)||match(c.actions))
      results.push({title:c.title,type:'Card',icon:'▦',color:wsColor(c.workstream||'Other'),sub:c.workstream,date:c.due,preview:c.desc||'',action:"openCardModal('"+c.id+"')"});
  });
  DB.deliverables().forEach(function(d){
    if(match(d.title)||match(d.notes))
      results.push({title:d.title,type:'Deliverable',icon:'◫',color:wsColor(d.workstream||'Other'),sub:d.workstream,date:d.dueDate,preview:d.notes||'',action:"openDelivModal('"+d.id+"')"});
  });
  DB.decisions().forEach(function(dec){
    if(match(dec.title)||match(dec.why)||match(dec.impacts))
      results.push({title:dec.title,type:'Decision',icon:'⊕',color:'var(--purple)',sub:dec.workstream,date:dec.date,preview:dec.why||'',action:"openDecisionModal('"+dec.id+"')"});
  });
  DB.comms().forEach(function(c){
    if(match(c.title)||match(c.notes)||match(c.draft))
      results.push({title:c.title,type:'Comms',icon:'✉',color:wsColor(c.workstream||'Other'),sub:c.workstream,date:c.sendDate,preview:c.notes||'',action:"openCommsModal('"+c.id+"')"});
  });
  DB.releases().forEach(function(r){
    if(match(r.title)||match(r.notes))
      results.push({title:r.title,type:'Release',icon:'⬡',color:wsColor(r.product||'Other'),sub:r.product,date:r.releaseDate,preview:r.notes||'',action:"openReleaseModal('"+r.id+"')"});
  });
  DB.todos().forEach(function(t){
    if(match(t.text)||match(t.notes))
      results.push({title:t.text,type:'Task',icon:'✓',color:'var(--green)',sub:t.workstream,date:t.date,preview:t.notes||'',action:"openTodoModal('"+t.id+"')"});
  });
  _lsGet('dh4-learning',[]).forEach(function(e){
    if(match(e.title)||match(e.takeaway)||match(e.unclear))
      results.push({title:e.title,type:'Learning',icon:'⟡',color:'var(--accent)',sub:e.topic,date:e.date,preview:e.takeaway||'',action:"openLearningModal('"+e.id+"')"});
  });
  return results;
}

// ── OVERALL GANTT VIEW ────────────────────────────────────
function buildGanttView(){
  var releases=DB.releases();
  var deliverables=DB.deliverables();
  var h='<div style="max-width:1100px">';

  var items=[];
  releases.filter(function(r){ return r.startDate&&r.releaseDate; }).forEach(function(r){
    items.push({label:r.title,start:r.startDate,end:r.releaseDate,color:wsColor(r.product||'Other'),type:'release',sub:r.phase||r.product,id:r.id});
  });
  deliverables.filter(function(d){ return d.startDate&&d.dueDate; }).forEach(function(d){
    items.push({label:d.title,start:d.startDate,end:d.dueDate,color:wsColor(d.workstream||'Other'),type:'deliverable',sub:d.workstream,id:d.id});
  });

  if(!items.length){
    h+='<div class="empty"><div class="empty-ico">▬</div><div style="font-size:13px">Add <strong>start dates + end dates</strong> to your Releases and Deliverables to see the Gantt.</div></div>';
    h+='</div>'; return h;
  }

  items.sort(function(a,b){ return a.start.localeCompare(b.start); });
  var minD=items[0].start;
  var maxD=items.reduce(function(m,r){ return r.end>m?r.end:m; },items[0].end);
  var totalDays=Math.max(1,Math.round((new Date(maxD+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000))+14;
  var td=_today();
  var todayOff=Math.round((new Date(td+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000);
  var todayPct=(todayOff/totalDays*100).toFixed(1);

  var ganttFilter=window.ganttFilter||'all';
  h+='<div class="row wrap" style="margin-bottom:14px;gap:6px">';
  [{id:'all',l:'All'},{id:'release',l:'Releases'},{id:'deliverable',l:'Deliverables'}].forEach(function(f){
    h+='<button class="btn sm'+(ganttFilter===f.id?' active-filter':'')+'" onclick="setGanttFilter(\''+f.id+'\')">'+f.l+'</button>';
  });
  h+='</div>';

  var filtered=ganttFilter==='all'?items:items.filter(function(i){ return i.type===ganttFilter; });

  h+='<div class="card" style="margin-bottom:20px;overflow-x:auto">';
  h+='<div class="card-head"><span>▬</span><span class="card-title">Full Timeline</span>';
  h+='<span style="font-size:11px;color:var(--t3);margin-left:auto">'+filtered.length+' items · '+_fmt(minD)+' → '+_fmt(maxD)+'</span></div>';
  h+='<div class="card-body" style="padding:12px 16px;min-width:640px">';

  filtered.forEach(function(item){
    var startOff=Math.max(0,Math.round((new Date(item.start+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000));
    var dur=Math.max(2,Math.round((new Date(item.end+'T00:00:00')-new Date(item.start+'T00:00:00'))/86400000));
    var leftPct=(startOff/totalDays*100).toFixed(1);
    var widthPct=Math.max(1.5,(dur/totalDays*100)).toFixed(1);
    var isOd=item.end<td;
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
    h+='<div style="width:170px;flex-shrink:0;font-size:11px;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="'+(item.type==='release'?"openReleaseModal('"+item.id+"')":'openDelivModal(\''+item.id+'\')')+'" title="'+_esc(item.label)+'">'+_esc(item.label.slice(0,24))+'</div>';
    h+='<div style="flex:1;position:relative;height:24px;background:var(--border);border-radius:5px">';
    if(todayOff>=0&&todayOff<=totalDays) h+='<div style="position:absolute;left:'+todayPct+'%;top:-3px;bottom:-3px;width:2px;background:var(--red);z-index:3;border-radius:2px"></div>';
    h+='<div style="position:absolute;left:'+leftPct+'%;width:'+widthPct+'%;height:100%;background:'+item.color+(isOd?';opacity:.5':'')+';border-radius:5px;display:flex;align-items:center;padding:0 6px;overflow:hidden;z-index:1;cursor:pointer" onclick="'+(item.type==='release'?"openReleaseModal('"+item.id+"')":'openDelivModal(\''+item.id+'\')')+'">';
    h+='<span style="font-size:9px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(item.sub||'')+'</span>';
    h+='</div></div>';
    h+='<div style="font-size:10px;color:var(--t3);flex-shrink:0;width:52px;text-align:right">'+(isOd?'<span class="overdue">':'')+(item.type==='release'?'🚀 ':'')+_fmt(item.end)+(isOd?'</span>':'')+'</div>';
    h+='</div>';
  });

  h+='<div style="font-size:10.5px;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:6px"><div style="width:14px;height:2px;background:var(--red);border-radius:2px"></div>Today — '+_fmtFull(td)+'</div>';
  h+='</div></div>';

  // Drill-in cards

function DB_ooo(){ return _lsGet('dh4-ooo',[]); }

function isOOO(dateStr){
  return DB_ooo().some(function(o){ return dateStr>=o.start&&dateStr<=o.end; });
}

function getOOOBlock(dateStr){
  return DB_ooo().find(function(o){ return dateStr>=o.start&&dateStr<=o.end; })||null;
}

function openOOOModal(editId){
  var all=DB_ooo();
  var o=editId?all.find(function(x){ return x.id===editId; }):null;
  showModal({title:o?'Edit OOO Block':'Add Out-of-Office',body:
    '<div style="font-size:12.5px;color:var(--t2);margin-bottom:14px">Mark date ranges when you\'re away. The calendar will shade those days and warn you about conflicts.</div>'+
    '<div class="field"><label>Label</label><input class="inp" type="text" id="m-ooo-label" placeholder="e.g. Vacation, Conference, Sick leave…" value="'+_esc(o?o.label:'')+'"/></div>'+
    '<div class="g2">'+
      '<div class="field"><label>Start date</label><input class="inp" type="date" id="m-ooo-start" value="'+(o?o.start:_today())+'"/></div>'+
      '<div class="field"><label>End date</label><input class="inp" type="date" id="m-ooo-end" value="'+(o?o.end:_today())+'"/></div>'+
    '</div>'+
    '<div class="field"><label>Notes <span style="font-weight:400;color:var(--t3)">(optional)</span></label><input class="inp" type="text" id="m-ooo-notes" placeholder="Coverage, contact, reason…" value="'+_esc(o?o.notes||'':'')+'"/></div>',
  onSave:function(){
    var label=document.getElementById('m-ooo-label').value.trim();
    var start=document.getElementById('m-ooo-start').value;
    var end=document.getElementById('m-ooo-end').value;
    if(!label||!start||!end){ alert('Label, start, and end date are required.'); return; }
    if(end<start){ alert('End date must be on or after start date.'); return; }
    var obj={id:editId||_uid(),label:label,start:start,end:end,notes:document.getElementById('m-ooo-notes').value.trim()};

function deleteOOO(id){
  if(!confirm('Remove this OOO block?')) return;
  _lsSave('dh4-ooo',DB_ooo().filter(function(o){ return o.id!==id; }));
  renderContent();
}

function _checkOOOConflicts(ooo){
  var conflicts=[];
  DB.events().forEach(function(e){ if(e.date>=ooo.start&&e.date<=ooo.end) conflicts.push('Meeting: '+e.title+' ('+_fmt(e.date)+')'); });
  DB.deliverables().filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; }).forEach(function(d){ if(d.dueDate>=ooo.start&&d.dueDate<=ooo.end) conflicts.push('Deliverable due: '+d.title+' ('+_fmt(d.dueDate)+')'); });
  DB.todos().filter(function(t){ return !t.done; }).forEach(function(t){ if(t.date&&t.date>=ooo.start&&t.date<=ooo.end) conflicts.push('Task due: '+t.text+' ('+_fmt(t.date)+')'); });
  if(conflicts.length){
    var msg='⚠ OOO conflict — '+conflicts.length+' item'+(conflicts.length>1?'s':'')+' overlap your '+_fmt(ooo.start)+' – '+_fmt(ooo.end)+' block:\n\n'+conflicts.slice(0,8).join('\n')+(conflicts.length>8?'\n…and '+(conflicts.length-8)+' more':'');
    alert(msg);
  }
}

function _importFilesSequentially(files,idx,totals,done){
  if(idx>=files.length){ done(totals); return; }
  var file=files[idx];
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result;
    if(ext==='ics'||ext==='ical'){
      var imported=parseIcal(text);
      var existing=DB.events(); var added=0;
      imported.forEach(function(e){
        if(!existing.find(function(x){ return x.title===e.title&&x.date===e.date; })){ existing.unshift(e); added++; }
        else totals.skipped++;
      });
      DB.save('events',existing); totals.events+=added;
    } else if(ext==='csv'){
      var name=file.name.toLowerCase();
      if(name.includes('task')||name.includes('todo')){
        var imported=parseTasksCsv(text); var todos=DB.todos(); var added=0;
        imported.forEach(function(t){
          if(!todos.find(function(x){ return x.text===t.text&&x.date===t.date; })){ todos.unshift(t); added++; }
          else totals.skipped++;
        });
        DB.save('todos',todos); totals.tasks+=added;
      } else if(name.includes('deliverable')){
        var imported=parseDeliverablesCsv(text); var dels=DB.deliverables(); var added=0;
        imported.forEach(function(d){
          if(!dels.find(function(x){ return x.title===d.title&&x.dueDate===d.dueDate; })){ dels.unshift(d); added++; }
          else totals.skipped++;
        });
        DB.save('deliverables',dels); totals.deliverables+=added;
      } else {
        // Default: Outlook calendar CSV
        var imported=parseOutlookCsv(text); var events=DB.events(); var added=0;
        imported.forEach(function(e){
          if(!events.find(function(x){ return x.title===e.title&&x.date===e.date; })){ events.unshift(e); added++; }
          else totals.skipped++;
        });
        DB.save('events',events); totals.events+=added;
      }
    }
    _importFilesSequentially(files,idx+1,totals,done);
  };
  reader.readAsText(file);
}

function parseTasksCsv(csv){
  var lines=csv.split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  var headers=parseCsvLine(lines[0]).map(function(h){ return h.trim().toLowerCase().replace(/"/g,''); });
  var ti=headers.indexOf('text'),di=headers.indexOf('date'),wi=headers.indexOf('workstream'),pi=headers.indexOf('priority'),ni=headers.indexOf('notes');
  if(ti===-1) return [];
  var tasks=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCsvLine(lines[i]);
    var text=cols[ti]?cols[ti].replace(/^"|"$/g,'').trim():'';
    if(!text) continue;
    tasks.push({id:_uid(),text:text,date:di>-1&&cols[di]?cols[di].replace(/^"|"$/g,'').trim():'',
      workstream:wi>-1&&cols[wi]?cols[wi].replace(/^"|"$/g,'').trim():'',
      priority:pi>-1&&cols[pi]?cols[pi].replace(/^"|"$/g,'').trim():'normal',
      notes:ni>-1&&cols[ni]?cols[ni].replace(/^"|"$/g,'').trim():'',done:false,createdAt:_now()});
  }
  return tasks;
}

function parseDeliverablesCsv(csv){
  var lines=csv.split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  var headers=parseCsvLine(lines[0]).map(function(h){ return h.trim().toLowerCase().replace(/"/g,''); });
  var cols={title:headers.indexOf('title'),type:headers.indexOf('type'),ws:headers.indexOf('workstream'),
    phase:headers.indexOf('phase'),pri:headers.indexOf('priority'),start:headers.indexOf('startdate'),
    due:headers.indexOf('duedate'),rev:headers.indexOf('reviewer')};
  if(cols.title===-1) return [];
  var dels=[];
  for(var i=1;i<lines.length;i++){
    var c=parseCsvLine(lines[i]);
    var get=function(idx){ return idx>-1&&c[idx]?c[idx].replace(/^"|"$/g,'').trim():''; };
    var title=get(cols.title);
    if(!title) continue;
    dels.push({id:_uid(),title:title,type:get(cols.type),workstream:get(cols.ws),
      phase:get(cols.phase)||'not started',priority:get(cols.pri)||'normal',
      startDate:get(cols.start),dueDate:get(cols.due),reviewer:get(cols.rev),createdAt:_now()});
  }
  return dels;
}

function parseIcal(text){
  // Unfold lines (RFC 5545: lines starting with space/tab continue previous line)
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  text=text.replace(/\n[ \t]/g,'');
  var lines=text.split('\n');

  var events=[]; var cur=null;
  lines.forEach(function(line){
    if(line==='BEGIN:VEVENT'){ cur={}; return; }
    if(line==='END:VEVENT'){
      if(cur&&cur.title&&cur.date) events.push(cur);
      cur=null; return;
    }
    if(!cur) return;

    // Handle property parameters (e.g. DTSTART;TZID=America/New_York:20241015T090000)
    var colonIdx=line.indexOf(':');
    if(colonIdx===-1) return;
    var prop=line.slice(0,colonIdx).toUpperCase();
    var val=line.slice(colonIdx+1).trim();

    // Decode common ICS escape sequences
    val=val.replace(/\\n/g,' ').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\');

    if(prop==='SUMMARY'||prop.startsWith('SUMMARY;')){
      cur.title=val;
    }
    else if(prop==='DTSTART'||prop.startsWith('DTSTART;')){
      // val might be 20241015T090000Z or 20241015T090000 or 20241015
      var v=val.replace('Z','');
      cur.date=v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6,8);
      if(v.length>8){
        // Convert time — if Z suffix, adjust from UTC to Eastern (UTC-4 or UTC-5)
        var hh=parseInt(v.slice(9,11)); var mm=v.slice(11,13);
        if(val.endsWith('Z')){
          // Rough Eastern offset: use -4 (EDT) or -5 (EST) based on month
          var mo=parseInt(v.slice(4,6));
          var offset=(mo>=3&&mo<=11)?-4:-5;
          hh=hh+offset;
          if(hh<0){ hh+=24;
            // Adjust date back one day
            var d=new Date(cur.date+'T00:00:00'); d.setDate(d.getDate()-1);
            cur.date=d.toISOString().split('T')[0];
          }
          if(hh>=24){ hh-=24;
            var d2=new Date(cur.date+'T00:00:00'); d2.setDate(d2.getDate()+1);
            cur.date=d2.toISOString().split('T')[0];
          }
        }
        cur.time=String(hh).padStart(2,'0')+':'+mm;
      } else {
        cur.time='';
      }
    }
    else if(prop==='DTEND'||prop.startsWith('DTEND;')){
      var v2=val.replace('Z','');
      if(v2.length>8){
        var hh2=parseInt(v2.slice(9,11)); var mm2=v2.slice(11,13);
        if(val.endsWith('Z')){ var mo2=parseInt(v2.slice(4,6)); hh2+=((mo2>=3&&mo2<=11)?-4:-5); }
        if(hh2<0) hh2+=24; if(hh2>=24) hh2-=24;
        cur.endTime=String(hh2).padStart(2,'0')+':'+mm2;
      }
    }
    else if(prop==='LOCATION'||prop.startsWith('LOCATION;')){
      cur.location=val;
    }
    else if(prop==='DESCRIPTION'||prop.startsWith('DESCRIPTION;')){
      cur.notes=val.slice(0,300); // cap length
    }
    else if(prop==='ORGANIZER'||prop.startsWith('ORGANIZER')){
      // Extract display name if present: CN=Name:mailto:email
      var cn=line.match(/CN=([^;:]+)/i);
      if(cn) cur.organizer=cn[1].trim();
    }
    else if(prop==='ATTENDEE'||prop.startsWith('ATTENDEE')){
      var acn=line.match(/CN=([^;:]+)/i);
      if(acn){ cur.attendees=(cur.attendees?cur.attendees+', ':'')+acn[1].trim(); }
    }
    else if(prop==='STATUS'){
      cur.status=val; // CONFIRMED, TENTATIVE, CANCELLED
    }
    else if(prop==='RRULE'){
      cur.isRecurring=true; // flag but don't expand — Outlook handles recurrence server-side
    }
  });

  return events
    .filter(function(e){ return e.status!=='CANCELLED'; })
    .map(function(e){
      return {
        id:_uid(),
        title:e.title,
        date:e.date,
        time:e.time||'',
        endTime:e.endTime||'',
        notes:e.notes||'',
        location:e.location||'',
        attendees:e.attendees||'',
        organizer:e.organizer||'',
        workstream:'',
        prepNotes:'',
        source:'outlook',
        isRecurring:e.isRecurring||false
      };
    });
}

function parseOutlookCsv(csv){
  var lines=csv.split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  var headers=parseCsvLine(lines[0]).map(function(h){ return h.trim().toLowerCase().replace(/"/g,''); });
  var si=headers.indexOf('subject'),di=headers.indexOf('start date'),ti=headers.indexOf('start time'),dsi=headers.indexOf('description');
  if(si===-1||di===-1) return [];
  var events=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCsvLine(lines[i]);
    var subj=cols[si]?cols[si].replace(/^"|"$/g,''):'';
    var sd=cols[di]?cols[di].replace(/^"|"$/g,''):'';
    if(!subj||!sd) continue;
    var parts=sd.split('/');
    var dateStr=parts.length===3?parts[2].trim()+'-'+parts[0].trim().padStart(2,'0')+'-'+parts[1].trim().padStart(2,'0'):sd;
    var time=ti>-1&&cols[ti]?cols[ti].replace(/^"|"$/g,'').trim():'';
    events.push({id:_uid(),title:subj.trim(),date:dateStr,time:time,
      notes:dsi>-1&&cols[dsi]?cols[dsi].replace(/^"|"$/g,'').trim():'',
      workstream:'',attendees:'',prepNotes:'',source:'outlook'});
  }
  return events;
}

function parseCsvLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ inQ=!inQ; } else if(c===','&&!inQ){ result.push(cur); cur=''; } else cur+=c;
  }
  result.push(cur); return result;
}

  events.forEach(function(e){ allItems.push({date:e.date,title:e.title,time:e.time||'',type:'event',color:wsColor(e.workstream||'Other')}); });
  todos.forEach(function(t){ if(t.date&&!t.done) allItems.push({date:t.date,title:t.text,time:'',type:'task',color:wsColor(t.workstream||'Other')}); });
  deliverables.forEach(function(d){ if(d.dueDate&&d.phase!=='done'&&d.phase!=='sent') allItems.push({date:d.dueDate,title:'◫ '+d.title,time:'',type:'deliverable',color:wsColor(d.workstream||'Other')}); });
  var h='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px">';
  for(var d=0;d<7;d++){
    var day=new Date(sow); day.setDate(sow.getDate()+d);
    var ds=day.toISOString().split('T')[0];
    var isToday=ds===td;
    var oooBlock=oooBlocks.find(function(o){ return ds>=o.start&&ds<=o.end; });
    var di=allItems.filter(function(e){ return e.date===ds; }).sort(function(a,b){ return (a.time||'z').localeCompare(b.time||'z'); });
    var bg=isToday?'var(--accent)':oooBlock?'linear-gradient(135deg,#fef8ec,#fffbf0)':'var(--bg)';
    h+='<div style="background:'+bg+';border-radius:8px;padding:5px 4px;min-height:80px;cursor:pointer;overflow:hidden;'+(oooBlock&&!isToday?'border:1px solid var(--yellow)':'')+'" onclick="navigate(\'calendar\')">';
    h+='<div style="font-size:8.5px;font-weight:700;text-transform:uppercase;color:'+(isToday?'rgba(255,255,255,.75)':oooBlock?'var(--yellow)':'var(--t3)')+';margin-bottom:1px;white-space:nowrap;overflow:hidden">'+DAYS[d]+(oooBlock?' ✈':'')+'</div>';
    h+='<div style="font-size:13px;font-weight:700;color:'+(isToday?'#fff':'var(--text)')+';margin-bottom:2px">'+day.getDate()+'</div>';
    if(oooBlock) h+='<div style="font-size:7.5px;color:'+(isToday?'rgba(255,255,255,.8)':'var(--yellow)')+';font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_esc(oooBlock.label.slice(0,10))+'</div>';
    di.slice(0,3).forEach(function(item){
      h+='<div style="font-size:8.5px;border-radius:3px;padding:1px 3px;margin-bottom:2px;background:'+(isToday?'rgba(255,255,255,.22)':item.color+'cc')+';color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;box-sizing:border-box" title="'+_esc(item.title)+'">';
      if(item.time) h+=item.time.slice(0,5)+' ';
      h+=_esc(item.title)+'</div>';
    });
    if(di.length>3) h+='<div style="font-size:8px;color:'+(isToday?'rgba(255,255,255,.6)':'var(--t3)')+'">+'+(di.length-3)+' more</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function buildPrioritiesWidget(saved){
  var lines=saved?saved.split('\n').filter(function(l){ return l.trim(); }):[];
  var h='';
  if(!lines.length) h+='<div style="font-size:11px;color:var(--t3);margin-bottom:6px">What are your top 3 priorities today?</div>';
  for(var i=0;i<3;i++){
    h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">';
    h+='<div style="width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>';
    h+='<input type="text" class="inp" style="flex:1;padding:5px 9px;font-size:12px" placeholder="Priority '+(i+1)+'…" id="dash-p'+(i+1)+'" value="'+_esc(lines[i]||'')+'" onchange="savePriorities()"/>';
    h+='</div>';
  }
  return h;
}

function savePriorities(){
  var lines=[];
  for(var i=1;i<=3;i++){ var el=document.getElementById('dash-p'+i); if(el&&el.value.trim()) lines.push(el.value.trim()); }
  _lsSave('dh4-p1-'+_today(),lines.join('\n'));
}

// ── EMAIL COPY FORMATTER ───────────────────────────────────
function copyCommsAsEmail(commsId){
  var all=DB.comms();
  var c=all.find(function(x){ return x.id===commsId; });
  if(!c){ alert('Comms item not found.'); return; }
  var lines=[];
  if(c.title) lines.push('Subject: '+c.title+'\n');
  lines.push('---');
  if(c.draft&&c.draft.trim()){
    lines.push(c.draft.trim());
  } else if(c.notes&&c.notes.trim()){
    lines.push(c.notes.trim());
  } else {
    lines.push('[Body copy not yet drafted — open the comms item and fill in the Draft field.]');
  }
  lines.push('\n---');
  lines.push('Best,');
  lines.push('[Your name]');
  lines.push('NYC DOE | Office of School Performance');
  var text=lines.join('\n');
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      showBackupToast('✅ Copied to clipboard — paste into Outlook.');
    }).catch(function(){ _fallbackCopy(text); });
  } else { _fallbackCopy(text); }
}

function _fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showBackupToast('✅ Copied to clipboard — paste into Outlook.'); }
  catch(e){ alert('Could not copy automatically.\n\n'+text); }
  document.body.removeChild(ta);
}

  // Last meeting note for this workstream
  var lastNote=DB.notes().filter(function(n){ return n.workstream===ws&&n.date<e.date; }).sort(function(a,b){ return b.date.localeCompare(a.date); })[0];
