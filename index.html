    if(lastNote.actions){
      body+='<div style="font-size:12px;color:var(--t2);background:var(--bg);border-radius:7px;padding:8px 10px">';
      body+='<div style="font-size:9.5px;font-weight:700;color:var(--accent);margin-bottom:3px">Action items from last time:</div>';
      lastNote.actions.split('\n').filter(Boolean).slice(0,4).forEach(function(a){ body+='<div style="padding:1px 0">· '+_esc(a)+'</div>'; });
      body+='</div>';
    }
    if(lastNote.decisions){
      body+='<div style="font-size:12px;color:var(--t2);background:var(--bg);border-radius:7px;padding:8px 10px;margin-top:6px">';
      body+='<div style="font-size:9.5px;font-weight:700;color:var(--purple);margin-bottom:3px">Decisions made:</div>';
      lastNote.decisions.split('\n').filter(Boolean).slice(0,3).forEach(function(d){ body+='<div style="padding:1px 0">· '+_esc(d)+'</div>'; });
      body+='</div>';
    }
    body+='</div>';
  }

  function section(label,color,items,emptyMsg){
    body+='<div style="margin-bottom:10px">';
    body+='<div style="font-size:9.5px;font-weight:700;color:'+color+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+label+'</div>';
    if(!items.length){ body+='<div style="font-size:11.5px;color:var(--t3)">'+emptyMsg+'</div>'; }
    else items.forEach(function(it){ body+='<div style="font-size:12px;color:var(--t2);padding:2px 0;border-bottom:1px solid var(--border)">'+it+'</div>'; });
    body+='</div>';
  }

  section('Open cards',wsColor(ws),relCards.map(function(c){ return '▦ '+_esc(c.title)+' <span style="color:var(--t3);font-size:10px">['+c.status+']</span>'; }),'No open cards');
  section('Tasks due',wsColor(ws),relTasks.map(function(t){ return '✓ '+_esc(t.text)+(t.date?' ('+_fmt(t.date)+')':''); }),'No open tasks');
  section('Pending deliverables','var(--accent)',relDels.map(function(d){ return '◫ '+_esc(d.title)+(d.dueDate?' — due '+_fmt(d.dueDate):''); }),'Nothing pending');
  if(relTickets.length) section('Open tickets','var(--blue)',relTickets.map(function(t){ return '🎫 #'+_esc(t.ticket||'')+' '+_esc(t.title); }),'');
  if(flags.length) section('Flagged items','var(--red)',flags.map(function(f){ return '⚑ '+_esc(f.text); }),'');

  body+='<div style="margin-top:14px;padding:10px 12px;background:#f5f0e8;border-radius:8px">';
  body+='<div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px">MEETING AGENDA (editable)</div>';
  body+='<textarea id="prep-agenda" class="inp" rows="4" style="width:100%" placeholder="What do you need to cover? What decisions need to be made? What do you need from them?">'+(e.agenda||'')+'</textarea>';
  body+='</div>';

  showModal({title:'Meeting Prep: '+e.title,wide:true,body:body,saveLabel:'Save agenda',onSave:function(){
    var ag=document.getElementById('prep-agenda').value;
    var evts=DB.events();
    for(var i=0;i<evts.length;i++) if(evts[i].id===eventId){ evts[i].agenda=ag; break; }
    DB.save('events',evts);
    closeModal(); renderContent();
  }});
}

// ── MANAGER FLAG SYSTEM ───────────────────────────────────
function buildFlagged(){
  var h2=renderHelpTip('flagged')||'';
  var all=_lsGet('dh4-flags',[]);
  var h=h2+'<div style="max-width:800px">';

  var open=all.filter(function(f){ return !f.resolved; });
  var resolved=all.filter(function(f){ return f.resolved; });

  // Copy summary button
  if(open.length){
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
    h+='<div style="flex:1;font-size:12.5px;color:var(--t2)">'+open.length+' open item'+(open.length>1?'s':'')+' flagged for manager attention</div>';
    h+='<button class="btn sm ghost" onclick="copyFlagSummary()">📋 Copy for 1:1</button>';
    h+='</div>';
  }

  if(!all.length){
    h+='<div class="empty"><div class="empty-ico">⚑</div><div style="font-size:13px">Nothing flagged yet.<br/>Use the <strong>⚑ Flag for manager</strong> button on any task, card, deliverable, or ticket — or hit <strong>+ Flag something</strong> above.</div></div>';
    h+='</div>'; return h;
  }

  function renderFlag(f){
    var r='<div class="card" style="margin-bottom:8px;'+(f.resolved?'opacity:.55':'border-left:3px solid var(--accent)')+'">';
    r+='<div class="card-body" style="padding:9px 14px">';
    r+='<div class="row" style="margin-bottom:4px">';
    r+='<div style="flex:1">';
    if(f.manager) r+='<span class="pill" style="background:var(--accent)18;color:var(--accent);margin-right:6px">⚑ '+_esc(f.manager)+'</span>';
    if(f.workstream) r+='<span class="pill" style="background:'+wsColor(f.workstream)+'18;color:'+wsColor(f.workstream)+'">'+_esc(f.workstream)+'</span>';
    r+='</div>';
    r+='<span style="font-size:11px;color:var(--t3)">'+_fmt(f.date)+'</span>';
    if(!f.resolved) r+='<button class="btn sm ghost" onclick="resolveFlag(\''+f.id+'\')" style="color:var(--green)">✓ Resolved</button>';
    r+='<button class="btn sm ghost" onclick="deleteFlag(\''+f.id+'\')">✕</button>';
    r+='</div>';
    r+='<div style="font-size:13px;font-weight:600;margin-bottom:3px">'+_esc(f.text)+'</div>';
    if(f.context) r+='<div style="font-size:12px;color:var(--t2);margin-bottom:4px">'+_esc(f.context)+'</div>';
    if(f.sourceType) r+='<div style="font-size:10.5px;color:var(--t3)">From: '+_esc(f.sourceType)+'</div>';
    r+='</div></div>';
    return r;
  }

  if(open.length){
    h+='<div class="section-label" style="margin-bottom:8px">Open ('+open.length+')</div>';
    open.forEach(function(f){ h+=renderFlag(f); });
  }
  if(resolved.length){
    h+='<div class="section-label" style="margin-top:16px;margin-bottom:8px">Resolved ('+resolved.length+')</div>';
    resolved.forEach(function(f){ h+=renderFlag(f); });
  }
  h+='</div>';
  return h;
}

function flagFromBtn(btn){
  var type=btn.getAttribute('data-flag-type')||'';
  var text=btn.getAttribute('data-flag-text')||'';
  var ws=btn.getAttribute('data-flag-ws')||'';
  openFlagModal(type,text,ws);
}

function openFlagModal(sourceType, sourceText, workstream){
  showModal({title:'⚑ Flag for Manager',body:
    '<div style="font-size:12.5px;color:var(--t2);margin-bottom:14px">Flag anything that needs your manager\'s awareness, input, or unblocking.</div>'+
    '<div class="field"><label>What needs attention?</label><input class="inp" type="text" id="m-fl-text" placeholder="e.g. ISA mailing blocked on legal review, need decision on timeline…" value="'+_esc(sourceText||'')+'"/></div>'+
    '<div class="field"><label>Who are you flagging this for?</label><input class="inp" type="text" id="m-fl-mgr" placeholder="e.g. ZM, Cleo, RF…"/></div>'+
    '<div class="g2">'+
      '<div class="field"><label>Workstream</label><select class="inp" id="m-fl-ws"><option value="">—</option>'+
      getWorkstreams().map(function(w){ return '<option value="'+w+'"'+(workstream===w?' selected':'')+'>'+w+'</option>'; }).join('')+
      '</select></div>'+
      '<div class="field"><label>Date</label><input class="inp" type="date" id="m-fl-date" value="'+_today()+'"/></div>'+
    '</div>'+
    '<div class="field"><label>Context / why it matters <span style="font-weight:400;color:var(--t3)">(optional)</span></label><textarea class="inp" id="m-fl-ctx" rows="3" placeholder="Background, what you need from them, what happens if not resolved…"></textarea></div>',
  saveLabel:'⚑ Flag it',
  onSave:function(){
    var text=document.getElementById('m-fl-text').value.trim();
    if(!text){ alert('Describe what needs attention.'); return; }
    var obj={id:_uid(),text:text,manager:document.getElementById('m-fl-mgr').value.trim(),
      workstream:document.getElementById('m-fl-ws').value,
      date:document.getElementById('m-fl-date').value||_today(),
      context:document.getElementById('m-fl-ctx').value.trim(),
      sourceType:sourceType||'Manual',resolved:false,createdAt:_now()};
    _lsSave('dh4-flags',[obj].concat(_lsGet('dh4-flags',[])));
    closeModal();
    if(currentView==='flagged') renderContent();
    showBackupToast('⚑ Flagged. View all flags in "Flagged for Manager" in the sidebar.');
  }});
}

function resolveFlag(id){
  var all=_lsGet('dh4-flags',[]);
  all=all.map(function(f){ return f.id===id?Object.assign({},f,{resolved:true,resolvedAt:_now()}):f; });
  _lsSave('dh4-flags',all); renderContent();
}

function deleteFlag(id){
  if(!confirm('Delete this flag?')) return;
  _lsSave('dh4-flags',_lsGet('dh4-flags',[]).filter(function(f){ return f.id!==id; }));
  renderContent();
}

function copyFlagSummary(){
  var open=_lsGet('dh4-flags',[]).filter(function(f){ return !f.resolved; });
  if(!open.length){ alert('Nothing open to copy.'); return; }
  var lines=['1:1 FLAG SUMMARY — '+_fmtFull(_today()),''];
  open.forEach(function(f,i){
    lines.push((i+1)+'. '+f.text);
    if(f.workstream) lines.push('   Workstream: '+f.workstream);
    if(f.manager) lines.push('   For: '+f.manager);
    if(f.context) lines.push('   Context: '+f.context);
    lines.push('');
  });
  var text=lines.join('\n');
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(function(){ showBackupToast('✅ Copied — paste into your 1:1 notes.'); }); }
  else { _fallbackCopy(text); }
}

// ── TRENDS & PATTERNS ────────────────────────────────────
function buildTrends(){
  var h2=renderHelpTip('trends')||'';
  var h=h2+'<div style="max-width:1060px">';

  var todos=DB.todos(); var notes=DB.notes(); var deliverables=DB.deliverables();
  var comms=DB.comms(); var WS=getWorkstreams();

  // ── 1. Deliverables completed vs overdue ──
  var completed=deliverables.filter(function(d){ return d.phase==='done'||d.phase==='sent'; });
  var overdue=deliverables.filter(function(d){ return _isOD(d.dueDate)&&d.phase!=='done'&&d.phase!=='sent'; });
  var inProgress=deliverables.filter(function(d){ return d.phase==='in progress'||d.phase==='in review'; });

  h+='<div class="section-label" style="margin-bottom:10px">Deliverables</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">';
  [
    {n:completed.length,l:'Completed',c:'var(--green)'},
    {n:overdue.length,l:'Overdue',c:'var(--red)'},
    {n:inProgress.length,l:'In Progress',c:'var(--blue)'}
  ].forEach(function(s){
    h+='<div class="stat" style="border-top:3px solid '+s.c+'"><div class="stat-n" style="color:'+s.c+'">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>';
  });
  h+='</div>';

  // Deliverables by workstream bar chart
  h+='<div class="card" style="margin-bottom:18px"><div class="card-head"><span>◫</span><span class="card-title">Deliverables by Workstream</span></div>';
  h+='<div class="card-body" style="padding:10px 16px">';
  var wsDelMap={};
  WS.forEach(function(w){ wsDelMap[w]={done:0,open:0,od:0}; });
  deliverables.forEach(function(d){
    var w=d.workstream||'Other'; if(!wsDelMap[w]) wsDelMap[w]={done:0,open:0,od:0};
    if(d.phase==='done'||d.phase==='sent') wsDelMap[w].done++;
    else if(_isOD(d.dueDate)) wsDelMap[w].od++;
    else wsDelMap[w].open++;
  });
  var maxDel=Math.max(1,Object.values(wsDelMap).reduce(function(m,v){ return Math.max(m,v.done+v.open+v.od); },0));
  WS.filter(function(w){ return wsDelMap[w]&&(wsDelMap[w].done||wsDelMap[w].open||wsDelMap[w].od); }).forEach(function(w){
    var v=wsDelMap[w]; var total=v.done+v.open+v.od;
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">';
    h+='<div style="width:90px;font-size:11.5px;font-weight:600;text-align:right;flex-shrink:0">'+w+'</div>';
    h+='<div style="flex:1;height:18px;background:var(--border);border-radius:5px;overflow:hidden;display:flex">';
    if(v.done) h+='<div style="width:'+(v.done/maxDel*100).toFixed(1)+'%;background:var(--green);height:100%"></div>';
    if(v.open) h+='<div style="width:'+(v.open/maxDel*100).toFixed(1)+'%;background:var(--blue);height:100%"></div>';
    if(v.od)   h+='<div style="width:'+(v.od/maxDel*100).toFixed(1)+'%;background:var(--red);height:100%"></div>';
    h+='</div>';
    h+='<div style="font-size:10.5px;color:var(--t3);flex-shrink:0;width:60px">'+total+' total</div>';
    h+='</div>';
  });
  h+='<div style="display:flex;gap:12px;margin-top:8px">';
  [{c:'var(--green)',l:'Done/Sent'},{c:'var(--blue)',l:'In progress'},{c:'var(--red)',l:'Overdue'}].forEach(function(x){
    h+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:'+x.c+'"></div><span style="font-size:10.5px;color:var(--t3)">'+x.l+'</span></div>';
  });
  h+='</div></div></div>';

  // ── 2. Time spent per workstream (tasks + notes as proxy) ──
  h+='<div class="section-label" style="margin-bottom:10px">Time Spent by Workstream <span style="font-size:10px;font-weight:400;color:var(--t3)">(based on tasks + meetings logged)</span></div>';
  var wsTimeMap={};
  WS.forEach(function(w){ wsTimeMap[w]=0; });
  todos.forEach(function(t){ var w=t.workstream||'Other'; if(!wsTimeMap[w]) wsTimeMap[w]=0; wsTimeMap[w]+=1; });
  notes.forEach(function(n){ var w=n.workstream||'Other'; if(!wsTimeMap[w]) wsTimeMap[w]=0; wsTimeMap[w]+=3; }); // meetings count more
  var maxTime=Math.max(1,Object.values(wsTimeMap).reduce(function(m,v){ return Math.max(m,v); },0));
  var timeEntries=Object.keys(wsTimeMap).filter(function(w){ return wsTimeMap[w]>0; }).sort(function(a,b){ return wsTimeMap[b]-wsTimeMap[a]; });

  h+='<div class="card" style="margin-bottom:18px"><div class="card-head"><span>◧</span><span class="card-title">Workstream Activity Index</span></div>';
  h+='<div class="card-body" style="padding:10px 16px">';
  if(!timeEntries.length){ h+='<div style="font-size:12px;color:var(--t3)">Log tasks and meeting notes to see patterns here.</div>'; }
  else timeEntries.forEach(function(w){
    var v=wsTimeMap[w]; var pct=(v/maxTime*100).toFixed(1);
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">';
    h+='<div style="width:90px;font-size:11.5px;font-weight:600;text-align:right;flex-shrink:0">'+w+'</div>';
    h+='<div style="flex:1;height:18px;background:var(--border);border-radius:5px;overflow:hidden">';
    h+='<div style="width:'+pct+'%;background:'+wsColor(w)+';height:100%;border-radius:5px"></div></div>';
    h+='<div style="font-size:10.5px;color:var(--t3);flex-shrink:0;width:60px">'+v+' units</div>';
    h+='</div>';
  });
  h+='<div style="font-size:10px;color:var(--t3);margin-top:8px">1 unit = 1 task · 3 units = 1 meeting. This is an estimate, not clock time.</div>';
  h+='</div></div>';

  // ── 3. Comms sent per month ──
  h+='<div class="section-label" style="margin-bottom:10px">Comms Sent by Month</div>';
  var sentComms=comms.filter(function(c){ return c.status==='sent'&&c.actualSendDate; });
  var monthMap={};
  sentComms.forEach(function(c){
    var m=c.actualSendDate.slice(0,7); // YYYY-MM
    if(!monthMap[m]) monthMap[m]=0; monthMap[m]++;
  });
  var months=Object.keys(monthMap).sort();
  h+='<div class="card" style="margin-bottom:18px"><div class="card-head"><span>✉</span><span class="card-title">Comms Volume</span></div>';
  h+='<div class="card-body" style="padding:10px 16px">';
  if(!months.length){ h+='<div style="font-size:12px;color:var(--t3)">Mark comms as sent and add an actual send date to see volume here.</div>'; }
  else{
    var maxComms=Math.max(1,Object.values(monthMap).reduce(function(m,v){ return Math.max(m,v); },0));
    months.forEach(function(m){
      var v=monthMap[m]; var pct=(v/maxComms*100).toFixed(1);
      var label=new Date(m+'-15').toLocaleString('default',{month:'short',year:'2-digit'});
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">';
      h+='<div style="width:60px;font-size:11.5px;font-weight:600;text-align:right;flex-shrink:0">'+label+'</div>';
      h+='<div style="flex:1;height:18px;background:var(--border);border-radius:5px;overflow:hidden">';
      h+='<div style="width:'+pct+'%;background:var(--purple);height:100%;border-radius:5px"></div></div>';
      h+='<div style="font-size:10.5px;color:var(--t3);flex-shrink:0;width:40px">'+v+' sent</div>';
      h+='</div>';
    });
  }
  h+='</div></div>';

  // ── 4. Meeting frequency by workstream ──
  h+='<div class="section-label" style="margin-bottom:10px">Meeting Frequency by Workstream</div>';
  var wsMeetMap={};
  notes.forEach(function(n){ var w=n.workstream||'Other'; if(!wsMeetMap[w]) wsMeetMap[w]=0; wsMeetMap[w]++; });
  var meetEntries=Object.keys(wsMeetMap).sort(function(a,b){ return wsMeetMap[b]-wsMeetMap[a]; });
  h+='<div class="card" style="margin-bottom:18px"><div class="card-head"><span>◎</span><span class="card-title">Meetings Logged</span></div>';
  h+='<div class="card-body" style="padding:10px 16px">';
  if(!meetEntries.length){ h+='<div style="font-size:12px;color:var(--t3)">Log meeting notes to see frequency patterns here.</div>'; }
  else{
    var maxMeet=Math.max(1,wsMeetMap[meetEntries[0]]);
    meetEntries.forEach(function(w){
      var v=wsMeetMap[w]; var pct=(v/maxMeet*100).toFixed(1);
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">';
      h+='<div style="width:90px;font-size:11.5px;font-weight:600;text-align:right;flex-shrink:0">'+w+'</div>';
      h+='<div style="flex:1;height:18px;background:var(--border);border-radius:5px;overflow:hidden">';
      h+='<div style="width:'+pct+'%;background:'+wsColor(w)+';height:100%;border-radius:5px"></div></div>';
      h+='<div style="font-size:10.5px;color:var(--t3);flex-shrink:0;width:60px">'+v+' meeting'+(v>1?'s':'')+'</div>';
      h+='</div>';
    });
  }
  h+='</div></div>';

  h+='</div>';
  return h;
}

// ── BACKUP & RESTORE ──────────────────────────────────────
var BACKUP_KEYS = [
  'dh4-todos','dh4-notes','dh4-cards','dh4-events','dh4-tickets',
  'dh4-deliverables','dh4-decisions','dh4-stakeholders','dh4-comms',
  'dh4-releases','dh4-eod','dh4-settings','dh4-learning','dh4-ooo',
  'dh4-jira-base','dh4-flags'
];

// Also grab any dh4-p1-* and dh4-sow-* keys
function getAllBackupKeys(){
  var keys = BACKUP_KEYS.slice();
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k && (k.startsWith('dh4-p1-')||k.startsWith('dh4-sow-')) && keys.indexOf(k)===-1) keys.push(k);
  }
  return keys;
}

function buildBackupData(){
  var data = {version:2, exportedAt: new Date().toISOString(), data:{}};
  getAllBackupKeys().forEach(function(k){
    var v = localStorage.getItem(k);
    if(v !== null) data.data[k] = v;
  });
  return data;
}

function backupNow(silent){
  try {
    var data = buildBackupData();
    var json = JSON.stringify(data, null, 2);
    var blob = new Blob([json], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'daily-hub-backup.json';  // fixed filename = always overwrites in same folder
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    _lsSave('dh4-last-backup', new Date().toISOString());
    setBackupStatus('Backed up ' + _fmtTime(new Date()));
    if(!silent) showBackupToast('✅ Backup saved — move it to your OneDrive folder to keep it safe.');
  } catch(e) {
    setBackupStatus('Backup failed');
    console.error('Backup error:', e);
  }
}

function setBackupStatus(msg){
  var el = document.getElementById('backup-status');
  if(el) el.textContent = msg;
}

function _fmtTime(d){
  var h=d.getHours(), m=d.getMinutes();
  return (h%12||12)+':'+(m<10?'0':'')+m+(h<12?'am':'pm');
}

function showBackupToast(msg){
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;right:24px;background:#2c2416;color:#fff;padding:10px 16px;border-radius:10px;font-size:12.5px;z-index:9999;max-width:320px;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,.25)';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); },400); }, 3500);
}

function restoreBackup(){
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var parsed = JSON.parse(ev.target.result);
        // Support both v1 (flat keys) and v2 (wrapped in .data)
        var dataObj = parsed.data || parsed;
        if(typeof dataObj !== 'object') throw new Error('Invalid format');
        var count = 0;
        Object.keys(dataObj).forEach(function(k){
          if(k.startsWith('dh4-')){ localStorage.setItem(k, dataObj[k]); count++; }
        });
        setBackupStatus('Restored ' + count + ' keys');
        showBackupToast('✅ Restored from backup ('+count+' data keys). Reloading…');
        setTimeout(function(){ renderNav(); renderContent(); }, 1200);
      } catch(err) {
        alert('Could not read backup file. Make sure it\'s a valid Daily Hub backup (.json).\n\nError: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

// ── WHAT DO I DO RIGHT NOW? ───────────────────────────────
function buildNow(){
  var td=_today();
  var todos=DB.todos().filter(function(t){ return !t.done&&!isSnoozed(t.id); });
  var urgent=todos.filter(function(t){ return t.priority==='urgent'&&t.date&&t.date<=td; });
  var high=todos.filter(function(t){ return t.priority==='high'&&t.date&&t.date<=td; });
  var dueToday=todos.filter(function(t){ return t.date===td&&t.priority!=='urgent'&&t.priority!=='high'; });
  var overdue=todos.filter(function(t){ return t.date&&t.date<td&&t.priority!=='urgent'&&t.priority!=='high'; });
  var waiting=todos.filter(function(t){ return t.waitingOn; });
  var pool=urgent.length?urgent:high.length?high:dueToday.length?dueToday:overdue;
  pool=pool.filter(function(t){ return !t.waitingOn; }); // skip things you're waiting on

  var p1=_lsGet('dh4-p1-'+td,'').split('\n').filter(Boolean)[0]||'';
  var h='<div style="max-width:640px">';

  // Main answer
  h+='<div class="now-card">';
  if(p1){
    h+='<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Your #1 priority today</div>';
    h+='<div class="now-task">'+_esc(p1)+'</div>';
    h+='<div class="now-meta">You set this as your top priority. Start here.</div>';
  } else if(pool.length){
    var pick=pool[0];
    var reason=urgent.length?'This is marked URGENT and due today.':high.length?'This is high priority and due today.':overdue.length?'This is overdue — it needs to move.':'This is due today.';
    h+='<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Do this next</div>';
    h+='<div class="now-task">'+_esc(pick.text)+'</div>';
    if(pick.workstream) h+='<div style="margin:6px 0"><span class="pill" style="background:'+wsColor(pick.workstream)+'18;color:'+wsColor(pick.workstream)+'">'+_esc(pick.workstream)+'</span></div>';
    h+='<div class="now-meta">'+reason+'</div>';
    h+='<div style="display:flex;gap:8px;margin-top:16px">';
    h+='<button class="btn primary" onclick="toggleTodo(\''+pick.id+'\');navigate(\'now\')">✓ Done</button>';
    h+='<button class="btn sm ghost" onclick="openSnoozeModal(\'todo\',\''+pick.id+'\')">💤 Snooze</button>';
    h+='<button class="btn sm ghost" onclick="navigate(\'todo\')">See all tasks</button>';
    h+='</div>';
  } else {
    h+='<div style="font-size:32px;margin-bottom:10px">✅</div>';
    h+='<div class="now-task">You\'re clear.</div>';
    h+='<div class="now-meta">Nothing urgent or overdue right now. Check your calendar for what\'s coming up.</div>';
  }
  h+='</div>';

  // Context: what's coming up
  var meetings=DB.events().filter(function(e){ return e.date===td; }).sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
  if(meetings.length){
    h+='<div class="card" style="margin-bottom:12px"><div class="card-head"><span>⊡</span><span class="card-title">Meetings today</span></div><div class="card-body" style="padding:6px 14px">';
    meetings.forEach(function(e){
      h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">';
      if(e.time) h+='<span class="pill blue" style="font-size:9.5px">'+_esc(e.time)+'</span>';
      h+='<span style="font-size:12.5px;font-weight:600;flex:1">'+_esc(e.title)+'</span>';
      h+='<button class="btn sm ghost" onclick="openMeetingPrep(\''+e.id+'\')">📋 Prep</button>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // Waiting-on nudge
  if(waiting.length){
    h+='<div class="card" style="margin-bottom:12px;border-color:var(--yellow)"><div class="card-head"><span>◷</span><span class="card-title" style="color:var(--yellow)">You\'re waiting on '+waiting.length+' thing'+(waiting.length>1?'s':'')+'</span><button class="btn sm ghost" onclick="navigate(\'waiting\')">See all →</button></div></div>';
  }

  // Quick stats
  var blocked=DB.cards().filter(function(c){ return c.status==='blocked'; });
  var flags=_lsGet('dh4-flags',[]).filter(function(f){ return !f.resolved; });
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';
  h+='<div class="stat" style="cursor:pointer" onclick="navigate(\'todo\')"><div class="stat-n">'+todos.filter(function(t){ return !t.waitingOn; }).length+'</div><div class="stat-l">Open tasks</div></div>';
  h+='<div class="stat" style="cursor:pointer;'+(blocked.length?'border-color:var(--red)':'')+'" onclick="navigate(\'cards\')"><div class="stat-n" style="'+(blocked.length?'color:var(--red)':'')+'">'+blocked.length+'</div><div class="stat-l">Blocked cards</div></div>';
  h+='<div class="stat" style="cursor:pointer" onclick="navigate(\'flagged\')"><div class="stat-n">'+flags.length+'</div><div class="stat-l">Flagged items</div></div>';
  h+='</div>';
  h+='</div>';
  return h;
}

  if(until<=_today()){ delete snoozes[id]; _lsSave('dh4-snoozes',snoozes); return false; }

}

function buildWaiting(){

  });
  // Cards blocked
  DB.cards().filter(function(c){ return c.status==='blocked'&&c.blockerNote; }).forEach(function(c){
    items.push({person:c.blockerNote.slice(0,30),text:c.title,type:'Card',ws:c.workstream||'',date:c.due,id:c.id,source:'card'});
  });
  // Tickets waiting on team
  DB.tickets().filter(function(t){ return t.waitingOn&&t.status!=='solved'; }).forEach(function(t){

    h+='</div>'; return h;
  }

  // Group by person
  var byPerson={};
  items.forEach(function(i){
    var p=i.person||'Unknown'; if(!byPerson[p]) byPerson[p]=[];
    byPerson[p].push(i);
  });

  h+='<div style="font-size:12.5px;color:var(--t2);margin-bottom:16px">'+items.length+' item'+(items.length>1?'s':'')+' waiting on someone else. These are <strong>not your fault</strong> — but they need a follow-up plan.</div>';

  Object.keys(byPerson).sort().forEach(function(person){
    var pItems=byPerson[person];
    var initials=person.split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
    h+='<div style="margin-bottom:16px">';
    h+='<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">';
    h+='<div class="waiting-person">'+_esc(initials)+'</div>';
    h+='<div style="font-size:13px;font-weight:700">'+_esc(person)+'</div>';
    h+='<span style="font-size:11px;color:var(--t3)">'+pItems.length+' item'+(pItems.length>1?'s':'')+'</span>';
    h+='</div>';
    pItems.forEach(function(item){
      h+='<div class="waiting-row">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:12.5px;font-weight:600">'+_esc(item.text)+'</div>';
      h+='<div style="font-size:11px;color:var(--t3);margin-top:2px">'+item.type+(item.ws?' · '+_esc(item.ws):'')+(item.date?' · due '+_fmt(item.date):'')+'</div>';
      h+='</div>';
      h+='<button class="btn sm ghost" onclick="navigate(\''+item.source+'\')" style="font-size:10.5px">View →</button>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ── RECURRING EVENTS ──────────────────────────────────────
function expandRecurringEvents(){
  // Called at boot — generates recurring events for next 12 weeks
  var templates=_lsGet('dh4-recurring-events',[]);
  if(!templates.length) return;
  var existing=DB.events();
  var existingKeys={}; existing.forEach(function(e){ if(e.recurringId) existingKeys[e.recurringId+'-'+e.date]=true; });
  var toAdd=[];
  var today=new Date(new Date().toDateString());
  var horizon=new Date(today); horizon.setDate(today.getDate()+84); // 12 weeks
  templates.forEach(function(tmpl){
    var d=new Date(today);
    while(d<=horizon){
      var match=false;
      if(tmpl.freq==='daily') match=true;
      else if(tmpl.freq==='weekly') match=(d.getDay()===tmpl.dow);
      else if(tmpl.freq==='biweekly'){
        var start=new Date(tmpl.startDate+'T00:00:00');
        var diff=Math.round((d-start)/86400000);
        match=(d.getDay()===tmpl.dow&&diff%14===0);
      }
      else if(tmpl.freq==='monthly') match=(d.getDate()===tmpl.dayOfMonth);
      if(match){
        var ds=d.toISOString().split('T')[0];
        var key=tmpl.id+'-'+ds;
        if(!existingKeys[key]){
          toAdd.push({id:_uid(),title:tmpl.title,date:ds,time:tmpl.time||'',workstream:tmpl.workstream||'',
            attendees:tmpl.attendees||'',prepNotes:tmpl.prepNotes||'',recurringId:tmpl.id,isRecurring:true});
          existingKeys[key]=true;
        }
      }
      d.setDate(d.getDate()+1);
    }
  });
  if(toAdd.length){ DB.save('events',existing.concat(toAdd)); }
}

// ── CONFLICT DETECTOR ─────────────────────────────────────
function buildConflictWarnings(){
  var warnings=[];
  var today=new Date(new Date().toDateString());
  for(var w=0;w<8;w++){
    var wStart=new Date(today); wStart.setDate(today.getDate()-today.getDay()+(w*7));
    var wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);
    var ws=wStart.toISOString().split('T')[0];
    var we=wEnd.toISOString().split('T')[0];
    var score=0; var flags=[];
    // OOO in this week?
    var ooo=_lsGet('dh4-ooo',[]).filter(function(o){ return o.start<=we&&o.end>=ws; });
    if(ooo.length){ score+=3; flags.push('OOO: '+ooo[0].label); }
    // Deliverables due this week
    var dels=DB.deliverables().filter(function(d){ return d.dueDate&&d.dueDate>=ws&&d.dueDate<=we&&d.phase!=='done'&&d.phase!=='sent'; });
    if(dels.length>=3){ score+=2; flags.push(dels.length+' deliverables due'); }
    // Releases in this week
    var rels=DB.releases().filter(function(r){ return r.releaseDate&&r.releaseDate>=ws&&r.releaseDate<=we; });
    if(rels.length>=2){ score+=2; flags.push(rels.length+' releases'); }
    // Tasks due
    var tasks=DB.todos().filter(function(t){ return !t.done&&t.date&&t.date>=ws&&t.date<=we; });
    if(tasks.length>=8){ score+=1; flags.push(tasks.length+' tasks'); }
    if(score>=4) warnings.push({week:ws,weekEnd:we,score:score,flags:flags});
  }
  if(!warnings.length) return '';
  var h='<div class="card" style="margin-bottom:14px;border-color:var(--red)">';
  h+='<div class="card-head" style="background:#fdf0ee"><span>⚠</span><span class="card-title" style="color:var(--red)">Conflict Alert — '+warnings.length+' heavy week'+(warnings.length>1?'s':'')+'</span></div>';
  h+='<div class="card-body" style="padding:6px 16px">';
  warnings.forEach(function(w){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">';
    h+='<span class="conflict-badge">⚠</span>';
    h+='<span style="font-size:12.5px;font-weight:600;flex:1">Week of '+_fmt(w.week)+'</span>';
    h+='<span style="font-size:11px;color:var(--t3)">'+w.flags.join(' · ')+'</span>';
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

    }

// ── IN-APP NUDGES ─────────────────────────────────────────
var _nudgeQueue=[];
var _nudgeShowing=false;

function checkNudges(){
  var td=_today();
  var nudges=[];
  // Overdue high-priority tasks
  var urgentOverdue=DB.todos().filter(function(t){
    return !t.done&&t.priority==='urgent'&&t.date&&t.date<td&&!isSnoozed(t.id);
  });
  if(urgentOverdue.length) nudges.push({msg:'🔴 '+urgentOverdue.length+' urgent task'+(urgentOverdue.length>1?'s are':' is')+' overdue',action:'View tasks',view:'todo'});
  // Items waiting on that are old (7+ days no update)
  var oldWaiting=DB.todos().filter(function(t){
    return !t.done&&t.waitingOn&&t.date&&t.date<new Date(new Date().getTime()-7*86400000).toISOString().split('T')[0];
  });
  if(oldWaiting.length) nudges.push({msg:'◷ '+oldWaiting.length+' item'+(oldWaiting.length>1?'s have':' has')+' been waiting 7+ days',action:'Check waiting on',view:'waiting'});
  // Deliverables due in 2 days with no recent progress
  var soon=DB.deliverables().filter(function(d){
    return d.phase!=='done'&&d.phase!=='sent'&&d.dueDate&&_daysUntil(d.dueDate)===2;
  });
  if(soon.length) nudges.push({msg:'⏰ '+soon.length+' deliverable'+(soon.length>1?'s due':'  due')+' in 2 days',action:'Review',view:'deliverables'});
  // Unlogged EOD (if after 4pm)
  var hr=new Date().getHours();
  if(hr>=16){
    var eods=DB.eod(); var todayEod=eods.find(function(e){ return e.date===td; });
    if(!todayEod) nudges.push({msg:'◑ End of day approaching — log how today went?',action:'Log EOD',view:'eod'});
  }
  // Decisions overdue for revisit
  var overdueDecisions=DB.decisions().filter(function(d){
    return d.revisitDate&&d.revisitDate<=td&&!d.outcome;
  });
  if(overdueDecisions.length) nudges.push({msg:'⊕ '+overdueDecisions.length+' decision'+(overdueDecisions.length>1?'s need':'  needs')+' a revisit check',action:'Review decisions',view:'decisions'});
  if(!nudges.length) return;
  // Only show one at a time, rotate
  var last=_lsGet('dh4-nudge-last','');
  var pick=nudges[Math.floor(Math.random()*nudges.length)];
  var key=pick.msg+td;
  if(key===last) return; // don't re-show same one
  _lsSave('dh4-nudge-last',key);
  showNudge(pick);
}

function showNudge(nudge){
  var existing=document.getElementById('nudge-toast');
  if(existing) existing.remove();
  var el=document.createElement('div');
  el.id='nudge-toast';
  el.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;max-width:320px;display:flex;align-items:center;gap:10px;animation:slideUp .2s ease';
  el.innerHTML='<div style="flex:1"><div style="font-size:12.5px;font-weight:600;margin-bottom:2px">'+_esc(nudge.msg)+'</div></div>'+
    '<button onclick="navigate(\''+nudge.view+'\');this.closest(\'#nudge-toast\').remove()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11.5px;cursor:pointer;white-space:nowrap">'+_esc(nudge.action)+'</button>'+
    '<button onclick="this.closest(\'#nudge-toast\').remove()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 2px">✕</button>';
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.remove(); }, 8000);
}

  {id:'terracotta-dark', label:'Terracotta Dark', preview:['#1e1710','#d4754e','#f0e8dc']},

  {id:'linen',       label:'Linen',           preview:['#fdf8f0','#9e7a4a','#3a3020']},
];

function applyTheme(id){
  // Remove all theme classes
  THEMES.forEach(function(t){ if(t.id) document.body.classList.remove('theme-'+t.id); });
  if(id) document.body.classList.add('theme-'+id);
  _lsSave('dh4-theme',id);
  ghSchedulePush();
  // Re-render theme picker if open
  var picker=document.getElementById('theme-picker-wrap');
  if(picker) renderThemePicker(picker);
}

function renderThemePicker(wrap){
  var current=_lsGet('dh4-theme','');
  var h='<div style="padding:4px 0">';
  THEMES.forEach(function(t){
    var active=current===t.id;
    h+='<button onclick="applyTheme(\''+t.id+'\')" style="width:100%;display:flex;align-items:center;gap:8px;padding:7px 8px;border:none;border-radius:8px;cursor:pointer;background:'+(active?'var(--accent)':'transparent')+';color:'+(active?'#fff':'var(--text)')+';text-align:left;transition:background .1s">';
    // Color swatches
    h+='<div style="display:flex;gap:3px;flex-shrink:0">';
    t.preview.forEach(function(c){
      h+='<div style="width:12px;height:12px;border-radius:3px;background:'+c+';border:1px solid rgba(0,0,0,.1)"></div>';
    });
    h+='</div>';
    h+='<span style="font-size:12px;font-weight:'+(active?'700':'500')+'">'+t.label+'</span>';
    if(active) h+='<span style="margin-left:auto;font-size:10px">✓</span>';
    h+='</button>';
  });
  h+='</div>';
  wrap.innerHTML=h;
}

function toggleThemePicker(){
  var existing=document.getElementById('theme-popover');
  if(existing){ existing.remove(); return; }
  var btn=document.getElementById('theme-btn');
  var rect=btn.getBoundingClientRect();
  var pop=document.createElement('div');
  pop.id='theme-popover';
  pop.style.cssText='position:fixed;bottom:'+(window.innerHeight-rect.top+6)+'px;left:'+rect.left+'px;background:var(--card);border:1px solid var(--border2);border-radius:12px;box-shadow:var(--shadow-lg);z-index:9998;width:200px;padding:8px;';
  pop.innerHTML='<div style="font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:2px 8px 6px">Theme</div><div id="theme-picker-wrap"></div>';
  document.body.appendChild(pop);
  renderThemePicker(document.getElementById('theme-picker-wrap'));
  // Close on outside click
  setTimeout(function(){
    document.addEventListener('click',function closePop(e){
      if(!pop.contains(e.target)&&e.target.id!=='theme-btn'){
        pop.remove(); document.removeEventListener('click',closePop);
      }
    });
  },10);
}

// ── MEETING AGENDA BUILDER ────────────────────────────────
function buildAgendaBuilder(){
  var td=_today();
  var events=DB.events().filter(function(e){
    return e.date>=td;
  }).sort(function(a,b){ return (a.date+a.time).localeCompare(b.date+b.time); }).slice(0,20);

  var selectedId=_lsGet('dh4-agenda-sel','');
  if(selectedId&&!events.find(function(e){ return e.id===selectedId; })) selectedId='';
  if(!selectedId&&events.length) selectedId=events[0].id;

  var h='<div style="max-width:960px">';
  h+='<div style="display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start">';

  // Left: event picker
  h+='<div class="card" style="padding:0;overflow:hidden">';
  h+='<div class="card-head"><span>⊡</span><span class="card-title">Upcoming meetings</span></div>';
  if(!events.length){
    h+='<div style="padding:16px;font-size:12.5px;color:var(--t3)">No upcoming events. Add events in Calendar first.</div>';
  } else {
    events.forEach(function(e){
      var active=e.id===selectedId;
      h+='<div onclick="_lsSave(\'dh4-agenda-sel\',\''+e.id+'\');renderContent()" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);background:'+(active?'var(--accent)':'transparent')+';transition:background .1s">';
      h+='<div style="font-size:12.5px;font-weight:700;color:'+(active?'#fff':'var(--text)')+';margin-bottom:2px">'+_esc(e.title)+'</div>';
      h+='<div style="font-size:11px;color:'+(active?'rgba(255,255,255,.75)':'var(--t3)')+'">'+_fmt(e.date)+(e.time?' · '+e.time:'')+'</div>';
      if(e.workstream&&!active) h+='<span style="font-size:10.5px;color:'+wsColor(e.workstream)+'">'+_esc(e.workstream)+'</span>';
      h+='</div>';
    });
  }
  h+='</div>';

  // Right: agenda for selected event
  h+='<div>';
  if(!selectedId){
    h+='<div class="card"><div class="card-body"><div class="empty"><div class="empty-ico">📋</div><div>Select a meeting to build its agenda</div></div></div></div>';
  } else {
    var ev=events.find(function(e){ return e.id===selectedId; });
    if(!ev){ h+='<div class="card"><div class="card-body"><div class="empty">Select a meeting</div></div></div>'; }
    else {
      var ws=ev.workstream||'';

      // Auto-pull related items
      var relCards=DB.cards().filter(function(c){ return (!ws||c.workstream===ws)&&c.status!=='done'; }).slice(0,5);
      var relTasks=DB.todos().filter(function(t){ return !t.done&&(!ws||t.workstream===ws)&&t.date&&t.date<=ev.date; }).slice(0,5);
      var relDels=DB.deliverables().filter(function(d){ return (!ws||d.workstream===ws)&&d.phase!=='done'&&d.phase!=='sent'; }).slice(0,4);
      var relDecs=DB.decisions().filter(function(d){ return (!ws||d.workstream===ws)&&d.revisitDate&&d.revisitDate<=ev.date&&!d.outcome; }).slice(0,3);
      var flags=_lsGet('dh4-flags',[]).filter(function(f){ return (!ws||f.workstream===ws)&&!f.resolved; }).slice(0,3);
      var lastNote=DB.notes().filter(function(n){ return (!ws||n.workstream===ws)&&n.date<ev.date; }).sort(function(a,b){ return b.date.localeCompare(a.date); })[0];

      // Event header
      h+='<div class="card" style="margin-bottom:12px">';
      h+='<div class="card-body" style="padding:14px 16px">';
      h+='<div style="display:flex;align-items:center;gap:10px">';
      h+='<div style="width:12px;height:12px;border-radius:50%;background:'+wsColor(ws||'Other')+';flex-shrink:0"></div>';
      h+='<div style="flex:1"><div style="font-size:15px;font-weight:700">'+_esc(ev.title)+'</div>';
      h+='<div style="font-size:12px;color:var(--t3)">'+_fmtFull(ev.date)+(ev.time?' · '+ev.time:'')+((ev.endTime&&ev.time)?' – '+ev.endTime:'')+(ev.location?' · 📍'+_esc(ev.location):'')+(ev.attendees?' · 👥'+_esc(ev.attendees.slice(0,60)):'')+'</div></div>';
      if(ws) h+='<span class="pill" style="background:'+wsColor(ws)+'18;color:'+wsColor(ws)+';border:1.5px solid '+wsColor(ws)+'40">'+_esc(ws)+'</span>';
      h+='</div></div></div>';

      // Auto-generated agenda sections
      h+='<div class="card" style="margin-bottom:12px">';
      h+='<div class="card-head"><span>📋</span><span class="card-title">Auto-generated agenda</span><span style="font-size:10.5px;color:var(--t3);margin-left:auto">pulled from your hub</span></div>';
      h+='<div class="card-body" style="padding:12px 16px">';

      function agSection(icon,label,color,items,empty){
        h+='<div style="margin-bottom:14px">';
        h+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:'+color+';margin-bottom:6px">'+icon+' '+label+'</div>';
        if(!items.length){ h+='<div style="font-size:12px;color:var(--t3);font-style:italic">'+empty+'</div>'; }
        else items.forEach(function(it){
          h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg);border-radius:7px;margin-bottom:3px">';
          h+='<span style="font-size:12px;flex:1;color:var(--text)">'+it.label+'</span>';
          if(it.meta) h+='<span style="font-size:11px;color:var(--t3)">'+it.meta+'</span>';
          h+='</div>';
        });
        h+='</div>';
      }

      if(lastNote){
        h+='<div style="margin-bottom:14px;padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--t3)">';
        h+='<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Last meeting — '+_fmt(lastNote.date)+'</div>';
        if(lastNote.actions) lastNote.actions.split('\n').filter(Boolean).slice(0,3).forEach(function(a){
          h+='<div style="font-size:12px;color:var(--t2);padding:1px 0">· '+_esc(a)+'</div>';
        });
        h+='</div>';
      }

      agSection('✓','Open tasks',wsColor(ws||'Other'),relTasks.map(function(t){ return {label:t.text,meta:t.date?_fmt(t.date):''}; }),'No open tasks for this workstream');
      agSection('▦','Cards in progress',wsColor(ws||'Other'),relCards.map(function(c){ return {label:c.title,meta:c.status}; }),'No open cards');
      agSection('◫','Pending deliverables','var(--accent)',relDels.map(function(d){ return {label:d.title,meta:d.dueDate?'due '+_fmt(d.dueDate):''}; }),'Nothing pending');
      if(relDecs.length) agSection('⊕','Decisions to revisit','var(--purple)',relDecs.map(function(d){ return {label:d.title,meta:'revisit by '+_fmt(d.revisitDate)}; }),'');
      if(flags.length) agSection('⚑','Flagged items','var(--red)',flags.map(function(f){ return {label:f.text,meta:''}; }),'');

      h+='</div></div>';

      // Editable agenda notes
      h+='<div class="card">';
      h+='<div class="card-head"><span>✏</span><span class="card-title">Your agenda notes</span></div>';
      h+='<div class="card-body" style="padding:12px 16px">';
      h+='<textarea id="agenda-notes" class="inp dump-area" rows="6" style="min-height:120px" placeholder="What do you need to cover?\nWhat decisions need to be made?\nWhat do you need from them?\nWhat are your talking points?">'+_esc(ev.agenda||'')+'</textarea>';
      h+='<div style="display:flex;gap:8px;margin-top:10px">';
      h+='<button class="btn primary" onclick="saveAgendaNotes(\''+ev.id+'\')">💾 Save agenda</button>';
      h+='<button class="btn ghost" onclick="copyAgenda(\''+ev.id+'\')" style="margin-left:auto">📋 Copy agenda</button>';
      h+='</div></div></div>';
    }
  }
  h+='</div></div></div>';
  return h;
}

function saveAgendaNotes(eventId){
  var notes=document.getElementById('agenda-notes').value;
  var evts=DB.events();
  for(var i=0;i<evts.length;i++) if(evts[i].id===eventId){ evts[i].agenda=notes; break; }
  DB.save('events',evts);
  showBackupToast('✅ Agenda saved');
}

function copyAgenda(eventId){
  var ev=DB.events().find(function(e){ return e.id===eventId; });
  if(!ev) return;
  var ws=ev.workstream||'';
  var lines=['📋 MEETING AGENDA','','Meeting: '+ev.title,'Date: '+_fmtFull(ev.date)+(ev.time?' at '+ev.time:''),''];
  if(ev.attendees) lines.push('Attendees: '+ev.attendees,'');

  var relTasks=DB.todos().filter(function(t){ return !t.done&&(!ws||t.workstream===ws)&&t.date&&t.date<=ev.date; }).slice(0,5);
  var relCards=DB.cards().filter(function(c){ return (!ws||c.workstream===ws)&&c.status!=='done'; }).slice(0,5);
  var relDels=DB.deliverables().filter(function(d){ return (!ws||d.workstream===ws)&&d.phase!=='done'&&d.phase!=='sent'; }).slice(0,4);

  if(relTasks.length){ lines.push('OPEN TASKS'); relTasks.forEach(function(t){ lines.push('  · '+t.text+(t.date?' (due '+_fmt(t.date)+')':'')); }); lines.push(''); }
  if(relCards.length){ lines.push('IN PROGRESS'); relCards.forEach(function(c){ lines.push('  · '+c.title+' ['+c.status+']'); }); lines.push(''); }
  if(relDels.length){ lines.push('PENDING DELIVERABLES'); relDels.forEach(function(d){ lines.push('  · '+d.title+(d.dueDate?' — due '+_fmt(d.dueDate):'')); }); lines.push(''); }
  if(ev.agenda){ lines.push('NOTES'); lines.push(ev.agenda); }

  navigator.clipboard.writeText(lines.join('\n')).then(function(){
    showBackupToast('📋 Agenda copied to clipboard');
  });
}

// ── TIME BLOCKING ─────────────────────────────────────────
function buildTimeBlock(){
  var td=_today();
  var selDate=_lsGet('dh4-tb-date',td);

  // Unscheduled tasks (no time block assigned)
  var todos=DB.todos().filter(function(t){ return !t.done&&!isSnoozed(t.id); }).slice(0,30);
  var blocks=_lsGet('dh4-timeblocks',{});
  var dayBlocks=blocks[selDate]||[];

  var h='<div style="max-width:1000px">';

  // Date nav
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  h+='<button class="btn ghost" onclick="tbShiftDate(-1)">← Prev</button>';
  h+='<input type="date" class="inp" id="tb-date-pick" value="'+selDate+'" onchange="tbSetDate(this.value)" style="width:150px;text-align:center;font-weight:700"/>';
  h+='<button class="btn ghost" onclick="tbShiftDate(1)">Next →</button>';
  if(selDate!==td) h+='<button class="btn ghost" onclick="tbSetDate(\''+td+'\')">Today</button>';
  h+='<button class="btn primary" onclick="openTimeBlockModal(\''+selDate+'\',\'\')" style="margin-left:auto">+ Add block</button>';
  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start">';

  // Left: time grid
  h+='<div class="card">';
  h+='<div class="card-head"><span>⏱</span><span class="card-title">'+_fmtFull(selDate)+'</span></div>';
  h+='<div class="card-body" style="padding:0">';

  var hours=[];
  for(var hh=7;hh<=19;hh++) hours.push(hh);
  hours.forEach(function(hr){
    var hrStr=String(hr).padStart(2,'0');
    var label=(hr===12?'12 PM':hr<12?hr+' AM':(hr-12)+' PM');
    var slotBlocks=dayBlocks.filter(function(b){
      var bh=parseInt(b.startTime.split(':')[0]);
      return bh===hr;
    });
    h+='<div style="display:flex;min-height:52px;border-bottom:1px solid var(--border)">';
    h+='<div style="width:52px;flex-shrink:0;padding:6px 8px;font-size:10.5px;font-weight:600;color:var(--t3);border-right:1px solid var(--border);display:flex;align-items:flex-start">'+label+'</div>';
    h+='<div style="flex:1;padding:3px 6px;min-height:52px" onclick="openTimeBlockModal(\''+selDate+'\',\''+hrStr+':00\')">';
    if(!slotBlocks.length){
      h+='<div style="height:100%;min-height:44px;border-radius:6px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.4;font-size:11px;color:var(--t3)">+ block</div>';
    } else {
      slotBlocks.forEach(function(b){
        var bColor=wsColor(b.workstream||'Other');
        h+='<div style="background:'+bColor+'18;border-left:3px solid '+bColor+';border-radius:0 6px 6px 0;padding:5px 10px;margin-bottom:3px;cursor:pointer;position:relative" onclick="event.stopPropagation();openTimeBlockModal(\''+selDate+'\',\''+b.startTime+'\',\''+b.id+'\')">';
        h+='<div style="font-size:12.5px;font-weight:700;color:var(--text)">'+_esc(b.label)+'</div>';
        h+='<div style="font-size:11px;color:var(--t3)">'+b.startTime+' – '+b.endTime+(b.workstream?' · '+_esc(b.workstream):'')+'</div>';
        h+='<button onclick="event.stopPropagation();deleteTimeBlock(\''+selDate+'\',\''+b.id+'\')" style="position:absolute;top:4px;right:6px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px">✕</button>';
        h+='</div>';
      });
    }
    h+='</div></div>';
  });
  h+='</div></div>';

  // Right: unscheduled tasks
  h+='<div>';
  h+='<div class="card">';
  h+='<div class="card-head"><span>✓</span><span class="card-title">Unscheduled tasks</span><span style="font-size:10.5px;color:var(--t3);margin-left:auto">click to block</span></div>';
  h+='<div class="card-body" style="padding:8px">';
  if(!todos.length){
    h+='<div style="font-size:12px;color:var(--t3);padding:8px;text-align:center">No open tasks</div>';
  } else {
    todos.slice(0,15).forEach(function(t){
      h+='<div onclick="openTimeBlockFromTask(\''+selDate+'\',\''+t.id+'\')" style="padding:7px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--border);margin-bottom:4px;background:var(--card);transition:border-color .1s" onmouseover="this.style.borderColor=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border)\'">';
      h+='<div style="font-size:12.5px;font-weight:600;color:var(--text)">'+_esc(t.text)+'</div>';
      h+='<div style="font-size:11px;color:var(--t3)">';
      if(t.workstream) h+='<span style="color:'+wsColor(t.workstream)+'">'+_esc(t.workstream)+'</span>';
      if(t.date) h+='<span style="margin-left:4px">· due '+_fmt(t.date)+'</span>';
      h+='</div></div>';
    });
  }
  h+='</div></div></div>';

  h+='</div></div>';
  return h;
}

function tbSetDate(d){ _lsSave('dh4-tb-date',d); renderContent(); }
function tbShiftDate(n){
  var d=new Date(_lsGet('dh4-tb-date',_today())+'T00:00:00');
  d.setDate(d.getDate()+n);
  tbSetDate(d.toISOString().split('T')[0]);
}

function openTimeBlockModal(date,startTime,editId){
  var blocks=_lsGet('dh4-timeblocks',{});
  var dayBlocks=blocks[date]||[];
  var b=editId?dayBlocks.find(function(x){ return x.id===editId; }):null;
  var WS=getWorkstreams();
  var wsOpts='<option value="">— none —</option>';
  WS.forEach(function(w){ wsOpts+='<option value="'+_esc(w)+'"'+(b&&b.workstream===w?' selected':'')+'>'+_esc(w)+'</option>'; });

  showModal({title:b?'Edit time block':'Add time block',body:
    '<div class="field"><label>Label</label><input class="inp" type="text" id="tb-label" placeholder="e.g. Deep work: SQR comms draft" value="'+_esc(b?b.label:'')+'"/></div>'+
    '<div class="g2">'+
      '<div class="field"><label>Start time</label><input class="inp" type="time" id="tb-start" value="'+(b?b.startTime:startTime||'09:00')+'"/></div>'+
      '<div class="field"><label>End time</label><input class="inp" type="time" id="tb-end" value="'+(b?b.endTime:_addHour(startTime||'09:00'))+'"/></div>'+
    '</div>'+
    '<div class="field"><label>Workstream</label><select class="inp" id="tb-ws">'+wsOpts+'</select></div>'+
    '<div class="field"><label>Notes (optional)</label><input class="inp" type="text" id="tb-notes" placeholder="What specifically are you working on?" value="'+_esc(b?b.notes||'':'')+'"/></div>',
  saveLabel:b?'Update block':'Add block',onSave:function(){
    var label=document.getElementById('tb-label').value.trim();
    if(!label){ alert('Label required'); return; }
    var obj={id:editId||_uid(),label:label,
      startTime:document.getElementById('tb-start').value,
      endTime:document.getElementById('tb-end').value,
      workstream:document.getElementById('tb-ws').value,
      notes:document.getElementById('tb-notes').value.trim()};
    var bs=_lsGet('dh4-timeblocks',{});
    if(!bs[date]) bs[date]=[];
    if(editId) bs[date]=bs[date].map(function(x){ return x.id===editId?obj:x; });
    else bs[date].push(obj);
    bs[date].sort(function(a,b2){ return a.startTime.localeCompare(b2.startTime); });
    _lsSave('dh4-timeblocks',bs);
    closeModal(); renderContent();
  }});
}

function openTimeBlockFromTask(date,taskId){
  var t=DB.todos().find(function(x){ return x.id===taskId; });
  if(!t) return;
  var blocks=_lsGet('dh4-timeblocks',{});
  var dayBlocks=blocks[date]||[];
  var WS=getWorkstreams();
  var wsOpts='<option value="">— none —</option>';
  WS.forEach(function(w){ wsOpts+='<option value="'+_esc(w)+'"'+(t.workstream===w?' selected':'')+'>'+_esc(w)+'</option>'; });

  showModal({title:'Block time for task',body:
    '<div style="padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:14px;font-size:12.5px;font-weight:600">'+_esc(t.text)+'</div>'+
    '<div class="g2">'+
      '<div class="field"><label>Start time</label><input class="inp" type="time" id="tb-start" value="09:00"/></div>'+
      '<div class="field"><label>End time</label><input class="inp" type="time" id="tb-end" value="10:00"/></div>'+
    '</div>'+
    '<div class="field"><label>Workstream</label><select class="inp" id="tb-ws">'+wsOpts+'</select></div>',
  saveLabel:'Block time',onSave:function(){
    var obj={id:_uid(),label:t.text,taskId:taskId,
      startTime:document.getElementById('tb-start').value,
      endTime:document.getElementById('tb-end').value,
      workstream:document.getElementById('tb-ws').value,notes:''};
    var bs=_lsGet('dh4-timeblocks',{});
    if(!bs[date]) bs[date]=[];
    bs[date].push(obj);
    bs[date].sort(function(a,b){ return a.startTime.localeCompare(b.startTime); });
    _lsSave('dh4-timeblocks',bs);
    closeModal(); renderContent();
  }});
}

function deleteTimeBlock(date,id){
  var bs=_lsGet('dh4-timeblocks',{});
  if(bs[date]) bs[date]=bs[date].filter(function(b){ return b.id!==id; });
  _lsSave('dh4-timeblocks',bs); renderContent();
}

function _addHour(timeStr){
  if(!timeStr) return '10:00';
  var p=timeStr.split(':'); var h=parseInt(p[0])+1;
  return String(Math.min(h,23)).padStart(2,'0')+':'+(p[1]||'00');
}

// ── CONTEXT SWITCH TRACKER ────────────────────────────────
function buildContextLog(){
  var logs=_lsGet('dh4-ctxlogs',[]);
  var td=_today();

  // Stats
  var todayLogs=logs.filter(function(l){ return l.date===td; });
  var weekStart=new Date(new Date().toDateString()); weekStart.setDate(weekStart.getDate()-weekStart.getDay());
  var wsStr=weekStart.toISOString().split('T')[0];
  var weekLogs=logs.filter(function(l){ return l.date>=wsStr; });

  // Group by date
  var byDate={};
  logs.slice(0,100).forEach(function(l){
    if(!byDate[l.date]) byDate[l.date]=[];
    byDate[l.date].push(l);
  });
  var dates=Object.keys(byDate).sort(function(a,b){ return b.localeCompare(a); }).slice(0,14);

  var h='<div style="max-width:800px">';

  // Log a switch NOW
  h+='<div class="card" style="margin-bottom:16px">';
  h+='<div class="card-head"><span>⇄</span><span class="card-title">Log a context switch</span></div>';
  h+='<div class="card-body" style="padding:12px 16px">';
  h+='<div style="font-size:12.5px;color:var(--t2);margin-bottom:12px">Every time you switch workstreams mid-task, log it here. Over time you\'ll see your most fragmented days.</div>';
  var WS=getWorkstreams();
  var fromOpts='<option value="">From workstream…</option>';
  var toOpts='<option value="">To workstream…</option>';
  WS.forEach(function(w){
    fromOpts+='<option value="'+_esc(w)+'">'+_esc(w)+'</option>';
    toOpts+='<option value="'+_esc(w)+'">'+_esc(w)+'</option>';
  });
  h+='<div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:3px">Switching FROM</label><select class="inp" id="ctx-from">'+fromOpts+'</select></div>';
  h+='<div style="font-size:20px;color:var(--t3);padding-bottom:6px">→</div>';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:3px">Switching TO</label><select class="inp" id="ctx-to">'+toOpts+'</select></div>';
  h+='<div style="flex:1;min-width:160px"><label style="font-size:11px;color:var(--t3);display:block;margin-bottom:3px">Reason (optional)</label><input class="inp" type="text" id="ctx-reason" placeholder="e.g. urgent email, ZM request…"/></div>';
  h+='<button class="btn primary" onclick="logContextSwitch()" style="flex-shrink:0;padding:8px 18px">Log switch</button>';
  h+='</div></div></div>';

  // Stats row
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  var avgDay=weekLogs.length?(weekLogs.length/Math.max(1,Object.keys(weekLogs.reduce(function(acc,l){ acc[l.date]=1; return acc; },{})).length)).toFixed(1):0;
  h+='<div class="card" style="text-align:center;padding:14px"><div style="font-size:28px;font-weight:800;color:var(--accent)">'+todayLogs.length+'</div><div style="font-size:12px;color:var(--t3)">switches today</div></div>';
  h+='<div class="card" style="text-align:center;padding:14px"><div style="font-size:28px;font-weight:800;color:var(--blue)">'+weekLogs.length+'</div><div style="font-size:12px;color:var(--t3)">switches this week</div></div>';
  h+='<div class="card" style="text-align:center;padding:14px"><div style="font-size:28px;font-weight:800;color:var(--purple)">'+avgDay+'</div><div style="font-size:12px;color:var(--t3)">avg per day this week</div></div>';
  h+='</div>';

  if(!logs.length){
    h+='<div class="empty"><div class="empty-ico">⇄</div><div>No switches logged yet.<br/>Every time you get pulled away from what you\'re working on, log it here.</div></div>';
  } else {
    // Workstream breakdown for today
    if(todayLogs.length){
      var wsCount={};
      todayLogs.forEach(function(l){ if(l.to) wsCount[l.to]=(wsCount[l.to]||0)+1; });
      h+='<div class="card" style="margin-bottom:16px">';
      h+='<div class="card-head"><span>◑</span><span class="card-title">Today\'s workstream pulls</span></div>';
      h+='<div class="card-body" style="padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap">';
      Object.keys(wsCount).forEach(function(w){
        h+='<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:'+wsColor(w)+'18;border:1.5px solid '+wsColor(w)+'40">';
        h+='<span style="font-size:13px;font-weight:700;color:'+wsColor(w)+'">'+wsCount[w]+'×</span>';
        h+='<span style="font-size:12.5px;font-weight:700;color:'+wsColor(w)+'">'+_esc(w)+'</span>';
        h+='</div>';
      });
      h+='</div></div>';
    }

    // Log by date
    dates.forEach(function(date){
      var dl=byDate[date];
      var isToday=date===td;
      var fragScore=dl.length;
      var scoreColor=fragScore>=5?'var(--red)':fragScore>=3?'var(--yellow)':'var(--green)';
      h+='<div style="margin-bottom:14px">';
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
      h+='<div style="font-size:12.5px;font-weight:700;color:var(--text)">'+_fmtFull(date)+(isToday?' (today)':'')+'</div>';
      h+='<div style="font-size:12px;font-weight:700;color:'+scoreColor+'">'+fragScore+' switch'+(fragScore!==1?'es':'')+'</div>';
      if(fragScore>=5) h+='<div style="font-size:11px;color:var(--red)">⚠ Very fragmented day</div>';
      else if(fragScore>=3) h+='<div style="font-size:11px;color:var(--yellow)">Moderately fragmented</div>';
      h+='<button class="btn sm ghost" style="margin-left:auto" onclick="clearDayCtx(\''+date+'\')">Clear</button>';
      h+='</div>';
      dl.forEach(function(l){
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:7px;margin-bottom:3px;font-size:12px">';
        h+='<span style="color:var(--t3);font-size:11px;flex-shrink:0">'+l.time+'</span>';
        if(l.from) h+='<span style="color:'+wsColor(l.from)+';font-weight:700">'+_esc(l.from)+'</span><span style="color:var(--t3)">→</span>';
        if(l.to) h+='<span style="color:'+wsColor(l.to)+';font-weight:700">'+_esc(l.to)+'</span>';
        if(l.reason) h+='<span style="color:var(--t3);margin-left:4px;font-style:italic">— '+_esc(l.reason)+'</span>';
        h+='</div>';
      });
      h+='</div>';
    });
  }

  h+='</div>';
  return h;
}

function logContextSwitch(){
  var from=document.getElementById('ctx-from').value;
  var to=document.getElementById('ctx-to').value;
  if(!to){ alert('Select the workstream you\'re switching TO'); return; }
  var now=new Date();
  var timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var entry={id:_uid(),date:_today(),time:timeStr,from:from,to:to,
    reason:document.getElementById('ctx-reason').value.trim()};
  var logs=_lsGet('dh4-ctxlogs',[]);
  logs.unshift(entry);
  _lsSave('dh4-ctxlogs',logs.slice(0,500)); // cap at 500
  showBackupToast('⇄ Switch logged: '+(from?from+' → ':'')+to);
  renderContent();
}

function clearDayCtx(date){
  if(!confirm('Clear all switches for '+_fmtFull(date)+'?')) return;
  var logs=_lsGet('dh4-ctxlogs',[]);
  _lsSave('dh4-ctxlogs',logs.filter(function(l){ return l.date!==date; }));
  renderContent();
}
