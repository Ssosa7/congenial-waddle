// ── WORKLOAD VIEW ─────────────────────────────────────────
function buildWorkload(){
  var h2 = renderHelpTip('workload');
  var todos = DB.todos().filter(function(t){ return !t.done; });
  var cards = DB.cards().filter(function(c){ return c.status!=='done'; });
  var deliverables = DB.deliverables().filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; });
  var comms = DB.comms().filter(function(c){ return c.status!=='sent'; });

  // Build week buckets
  var today = new Date(new Date().toDateString());
  var weeks = [];
  for(var w=0;w<6;w++){
    var wStart = new Date(today); wStart.setDate(today.getDate() - today.getDay() + (w*7));
    var wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+6);
    weeks.push({start:wStart,end:wEnd,items:[]});
  }
  var overdue = [];
  var nodate = [];

  function bucket(dateStr, item){
    if(!dateStr){ nodate.push(item); return; }
    var d = new Date(dateStr+'T00:00:00');
    if(d < today){ overdue.push(item); return; }
    for(var i=0;i<weeks.length;i++){
      if(d >= weeks[i].start && d <= weeks[i].end){ weeks[i].items.push(item); return; }
    }
    nodate.push(item);
  }

  todos.forEach(function(t){ bucket(t.date,{label:t.text,type:'task',ws:t.workstream||'',date:t.date,pri:t.priority||'normal'}); });
  deliverables.forEach(function(d){ bucket(d.dueDate,{label:d.title,type:'deliverable',ws:d.workstream||'',date:d.dueDate,pri:d.priority||'normal'}); });
  comms.forEach(function(c){ bucket(c.sendDate,{label:c.title,type:'comms',ws:c.workstream||'',date:c.sendDate,pri:'normal'}); });

  var typeIcon = {task:'✓',deliverable:'◫',comms:'✉',card:'▦'};
  var typeColor = {task:'var(--blue)',deliverable:'var(--accent)',comms:'var(--purple)',card:'var(--green)'};

  function renderWeekItems(items){
    if(!items.length) return '<div style="font-size:11.5px;color:var(--t3);padding:8px 0">Nothing due</div>';
    var h='';
    items.sort(function(a,b){ return (a.date||'9').localeCompare(b.date||'9'); }).forEach(function(item){
      h += '<div style="display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)">';
      h += '<span style="font-size:10px;padding:2px 5px;border-radius:4px;background:'+typeColor[item.type]+'18;color:'+typeColor[item.type]+';flex-shrink:0;margin-top:1px">'+typeIcon[item.type]+' '+item.type+'</span>';
      h += '<div style="flex:1"><div style="font-size:12px;font-weight:500">'+_esc(item.label)+'</div>';
      if(item.ws) h += '<div style="font-size:10.5px;color:'+wsColor(item.ws)+'">'+_esc(item.ws)+'</div>';
      h += '</div>';
      if(item.date) h += '<span style="font-size:10.5px;color:var(--t3);flex-shrink:0">'+_fmt(item.date)+'</span>';
      h += '</div>';
    });
    return h;
  }

  var h = h2 + '<div style="max-width:1060px">';

  // Summary stats
  var totalOpen = todos.length + deliverables.length + comms.length;
  h += '<div class="g4" style="margin-bottom:20px">';
  h += '<div class="stat"><div class="stat-n">'+totalOpen+'</div><div class="stat-l">Total open items</div></div>';
  h += '<div class="stat" style="'+(overdue.length?'border-color:var(--red)':'')+'"><div class="stat-n" style="'+(overdue.length?'color:var(--red)':'')+'">'+overdue.length+'</div><div class="stat-l">Overdue</div></div>';
  h += '<div class="stat"><div class="stat-n">'+weeks[0].items.length+'</div><div class="stat-l">Due this week</div></div>';
  h += '<div class="stat"><div class="stat-n">'+cards.length+'</div><div class="stat-l">Active cards</div></div>';
  h += '</div>';

  // Overdue
  if(overdue.length){
    h += '<div class="card" style="margin-bottom:14px;border-color:var(--red)">';
    h += '<div class="card-head" style="background:#fdf0ee"><span style="color:var(--red)">⚠</span><span class="card-title" style="color:var(--red)">Overdue ('+overdue.length+')</span></div>';
    h += '<div class="card-body" style="padding:8px 16px">'+renderWeekItems(overdue)+'</div></div>';
  }

  // Weekly columns
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px">';
  weeks.slice(0,6).forEach(function(wk,i){
    var label = i===0?'This Week':i===1?'Next Week':'Week of '+_fmt(wk.start.toISOString().split('T')[0]);
    var heavy = wk.items.length >= 5;
    h += '<div class="card" style="'+(heavy?'border-color:var(--yellow)':'')+'">';
    h += '<div class="card-head">';
    h += '<span class="card-title" style="font-size:12px">'+label+'</span>';
    h += '<span class="pill '+(wk.items.length===0?'gray':heavy?'yellow':'green')+'" style="margin-left:auto">'+wk.items.length+'</span>';
    if(heavy) h += '<span style="font-size:10px;color:var(--yellow);margin-left:4px">heavy</span>';
    h += '</div>';
    h += '<div class="card-body" style="padding:6px 14px;max-height:220px;overflow-y:auto">'+renderWeekItems(wk.items)+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // No date
  if(nodate.length){
    h += '<div class="card">';
    h += '<div class="card-head"><span class="card-title" style="color:var(--t3)">No date set ('+nodate.length+')</span></div>';
    h += '<div class="card-body" style="padding:6px 14px">'+renderWeekItems(nodate)+'</div></div>';
  }

  h += '</div>';
  return h;
}

// ── ALERTS / NUDGES (Dashboard panel) ─────────────────────
function buildAlerts(){
  var alerts = [];
  var td = _today();

  // Overdue tasks
  var odTodos = DB.todos().filter(function(t){ return !t.done&&t.date&&t.date<td; });
  if(odTodos.length) alerts.push({level:'red',icon:'✓',msg:odTodos.length+' overdue task'+(odTodos.length>1?'s':'')+'. Oldest: '+_esc(odTodos[0].text.slice(0,50))});

  // Stuck cards
  var stuckCards = DB.cards().filter(function(c){ var d=_daysAgo(c.statusChangedAt); return d!==null&&d>7&&c.status!=='done'; });
  if(stuckCards.length) alerts.push({level:'yellow',icon:'▦',msg:stuckCards.length+' card'+(stuckCards.length>1?'s':'')+' stuck for 7+ days. Oldest stuck: '+_esc(stuckCards[0].title.slice(0,50))});

  // Old escalations
  var oldEsc = DB.tickets().filter(function(t){ return t.escalated&&(t.status==='open'||t.status==='pending')&&zdDaysAgo(t.escalatedAt)>14; });
  if(oldEsc.length) alerts.push({level:'red',icon:'🎫',msg:oldEsc.length+' escalation'+(oldEsc.length>1?'s':'')+' over 14 days old. Oldest: '+_esc(oldEsc[0].title.slice(0,50))});

  // Deliverables due in 3 days
  var urgDel = DB.deliverables().filter(function(d){ var du=_daysUntil(d.dueDate); return du!==null&&du>=0&&du<=3&&d.phase!=='done'&&d.phase!=='sent'; });
  if(urgDel.length) alerts.push({level:'yellow',icon:'◫',msg:urgDel.length+' deliverable'+(urgDel.length>1?'s':'')+' due within 3 days'});

  // Comms overdue to send
  var odComms = DB.comms().filter(function(c){ return c.sendDate&&c.sendDate<td&&c.status!=='sent'; });
  if(odComms.length) alerts.push({level:'red',icon:'✉',msg:odComms.length+' comms piece'+(odComms.length>1?'s':'')+' past planned send date'});

  // Active OOO with conflicts
  var oooBlocks=DB_ooo();
  var activeOOO=oooBlocks.filter(function(o){ return o.end>=td; });
  activeOOO.forEach(function(ooo){
    var conflicts=[];
    DB.events().forEach(function(e){ if(e.date>=ooo.start&&e.date<=ooo.end) conflicts.push(e.title); });
    DB.deliverables().filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; }).forEach(function(d){ if(d.dueDate>=ooo.start&&d.dueDate<=ooo.end) conflicts.push('DUE: '+d.title); });
    DB.todos().filter(function(t){ return !t.done; }).forEach(function(t){ if(t.date&&t.date>=ooo.start&&t.date<=ooo.end) conflicts.push(t.text); });
    if(conflicts.length) alerts.push({level:'yellow',icon:'✈',msg:'OOO "'+ooo.label+'" ('+_fmt(ooo.start)+' – '+_fmt(ooo.end)+'): '+conflicts.length+' item'+(conflicts.length>1?'s overlap':' overlaps')+' — '+_esc(conflicts[0].slice(0,40))+(conflicts.length>1?'…':'')});
  });

  if(!alerts.length) return '';

  var h = '<div class="card" style="margin-bottom:16px;border-color:var(--yellow)">';
  h += '<div class="card-head" style="background:linear-gradient(135deg,#fef8ec,#fdf3ee)"><span>⚡</span><span class="card-title">Nudges ('+alerts.length+')</span><span style="font-size:11px;color:var(--t3);margin-left:auto">Things that need attention</span></div>';
  h += '<div class="card-body" style="padding:6px 16px">';
  alerts.forEach(function(a){
    var bg = a.level==='red'?'#fdf0ee':'#fef8ec';
    var color = a.level==='red'?'var(--red)':'var(--yellow)';
    h += '<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)">';
    h += '<span style="font-size:14px">'+a.icon+'</span>';
    h += '<div style="flex:1;font-size:12.5px;color:var(--text)">'+a.msg+'</div>';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0"></div>';
    h += '</div>';
  });
  h += '</div></div>';
  return h;
}

function buildSearch(){
  var q=window.globalSearchQ||'';
  var h='<div style="max-width:760px">';
  h+='<div style="margin-bottom:18px"><div class="sbar" style="max-width:100%;padding:10px 14px">';
  h+='<span style="color:var(--t3);font-size:16px">🔍</span>';
  h+='<input type="text" id="global-q" class="inp" placeholder="Search notes, cards, deliverables, decisions, comms…" style="font-size:14px;width:100%;background:transparent;border:none;padding:0" value="'+_esc(q)+'" oninput="globalSearch(this.value)"/>';
  h+='</div></div>';
  if(!q){ h+='<div style="color:var(--t3);font-size:13px;text-align:center;padding:40px 0">Start typing to search everything…</div></div>'; return h; }
  var results=doGlobalSearch(q);
  if(!results.length){ h+='<div style="color:var(--t3);font-size:13px;text-align:center;padding:40px 0">No results for "'+_esc(q)+'"</div></div>'; return h; }
  h+='<div style="font-size:12px;color:var(--t3);margin-bottom:12px">'+results.length+' result'+(results.length>1?'s':'')+' for "'+_esc(q)+'"</div>';
  results.forEach(function(r){
    h+='<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer" onclick="'+r.action+'">';
    h+='<div style="width:30px;height:30px;border-radius:7px;background:'+r.color+';display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff">'+r.icon+'</div>';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+_esc(r.title)+'</div>';
    h+='<div style="font-size:11.5px;color:var(--t3);margin-top:2px">'+r.type+(r.sub?' · '+_esc(r.sub):'')+(r.date?' · '+_fmt(r.date):'')+'</div>';
    if(r.preview) h+='<div style="font-size:12px;color:var(--t2);margin-top:3px">'+_esc(r.preview.slice(0,120))+'</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}
window.globalSearchQ='';
function globalSearch(q){ window.globalSearchQ=q; renderContent(); }

function doGlobalSearch(q){
  var ql=q.toLowerCase(); var results=[];
  function match(s){ return s&&s.toLowerCase().indexOf(ql)>-1; }
  DB.notes().forEach(function(n){
    if(match(n.title)||match(n.agenda)||match(n.actions)||match(n.decisions))
      results.push({title:n.title,type:'Meeting Note',icon:'◎',color:'var(--blue)',sub:n.workstream,date:n.date,preview:n.agenda||n.actions||'',action:"navigate('notes')"});
  });
  DB.cards().forEach(function(c){
    if(match(c.title)||match(c.desc)||match(c.actions))
      results.push({title:c.title,type:'Card',icon:'▦',color:wsColor(c.workstream||'Other'),sub:c.workstream,date:c.due,preview:c.desc||'',action:"openCardModal('"+c.id+"')"});
  });
  DB.deliverables().forEach(function(d){
    if(match(d.title)||match(d.notes))
      results.push({title:d.title,type:'Deliverable',icon:'◫',color:wsColor(d.workstream||'Other'),sub:d.workstream,date:d.dueDate,preview:d.notes||'',action:"openDelivModal('"+d.id+"')"});
  });
  DB.decisions().forEach(function(dec){
    if(match(dec.title)||match(dec.why)||match(dec.impacts))
      results.push({title:dec.title,type:'Decision',icon:'⊕',color:'var(--purple)',sub:dec.workstream,date:dec.date,preview:dec.why||'',action:"openDecisionModal('"+dec.id+"')"});
  });
  DB.comms().forEach(function(c){
    if(match(c.title)||match(c.notes)||match(c.draft))
      results.push({title:c.title,type:'Comms',icon:'✉',color:wsColor(c.workstream||'Other'),sub:c.workstream,date:c.sendDate,preview:c.notes||'',action:"openCommsModal('"+c.id+"')"});
  });
  DB.releases().forEach(function(r){
    if(match(r.title)||match(r.notes))
      results.push({title:r.title,type:'Release',icon:'⬡',color:wsColor(r.product||'Other'),sub:r.product,date:r.releaseDate,preview:r.notes||'',action:"openReleaseModal('"+r.id+"')"});
  });
  DB.todos().forEach(function(t){
    if(match(t.text)||match(t.notes))
      results.push({title:t.text,type:'Task',icon:'✓',color:'var(--green)',sub:t.workstream,date:t.date,preview:t.notes||'',action:"openTodoModal('"+t.id+"')"});
  });
  _lsGet('dh4-learning',[]).forEach(function(e){
    if(match(e.title)||match(e.takeaway)||match(e.unclear))
      results.push({title:e.title,type:'Learning',icon:'⟡',color:'var(--accent)',sub:e.topic,date:e.date,preview:e.takeaway||'',action:"openLearningModal('"+e.id+"')"});
  });
  return results;
}

// ── OVERALL GANTT VIEW ────────────────────────────────────
function buildGanttView(){
  var releases=DB.releases();
  var deliverables=DB.deliverables();
  var h='<div style="max-width:1100px">';

  var items=[];
  releases.filter(function(r){ return r.startDate&&r.releaseDate; }).forEach(function(r){
    items.push({label:r.title,start:r.startDate,end:r.releaseDate,color:wsColor(r.product||'Other'),type:'release',sub:r.phase||r.product,id:r.id});
  });
  deliverables.filter(function(d){ return d.startDate&&d.dueDate; }).forEach(function(d){
    items.push({label:d.title,start:d.startDate,end:d.dueDate,color:wsColor(d.workstream||'Other'),type:'deliverable',sub:d.workstream,id:d.id});
  });

  if(!items.length){
    h+='<div class="empty"><div class="empty-ico">▬</div><div style="font-size:13px">Add <strong>start dates + end dates</strong> to your Releases and Deliverables to see the Gantt.</div></div>';
    h+='</div>'; return h;
  }

  items.sort(function(a,b){ return a.start.localeCompare(b.start); });
  var minD=items[0].start;
  var maxD=items.reduce(function(m,r){ return r.end>m?r.end:m; },items[0].end);
  var totalDays=Math.max(1,Math.round((new Date(maxD+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000))+14;
  var td=_today();
  var todayOff=Math.round((new Date(td+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000);
  var todayPct=(todayOff/totalDays*100).toFixed(1);

  var ganttFilter=window.ganttFilter||'all';
  h+='<div class="row wrap" style="margin-bottom:14px;gap:6px">';
  [{id:'all',l:'All'},{id:'release',l:'Releases'},{id:'deliverable',l:'Deliverables'}].forEach(function(f){
    h+='<button class="btn sm'+(ganttFilter===f.id?' active-filter':'')+'" onclick="setGanttFilter(\''+f.id+'\')">'+f.l+'</button>';
  });
  h+='</div>';

  var filtered=ganttFilter==='all'?items:items.filter(function(i){ return i.type===ganttFilter; });

  h+='<div class="card" style="margin-bottom:20px;overflow-x:auto">';
  h+='<div class="card-head"><span>▬</span><span class="card-title">Full Timeline</span>';
  h+='<span style="font-size:11px;color:var(--t3);margin-left:auto">'+filtered.length+' items · '+_fmt(minD)+' → '+_fmt(maxD)+'</span></div>';
  h+='<div class="card-body" style="padding:12px 16px;min-width:640px">';

  filtered.forEach(function(item){
    var startOff=Math.max(0,Math.round((new Date(item.start+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000));
    var dur=Math.max(2,Math.round((new Date(item.end+'T00:00:00')-new Date(item.start+'T00:00:00'))/86400000));
    var leftPct=(startOff/totalDays*100).toFixed(1);
    var widthPct=Math.max(1.5,(dur/totalDays*100)).toFixed(1);
    var isOd=item.end<td;
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
    h+='<div style="width:170px;flex-shrink:0;font-size:11px;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="'+(item.type==='release'?"openReleaseModal('"+item.id+"')":'openDelivModal(\''+item.id+'\')')+'" title="'+_esc(item.label)+'">'+_esc(item.label.slice(0,24))+'</div>';
    h+='<div style="flex:1;position:relative;height:24px;background:var(--border);border-radius:5px">';
    if(todayOff>=0&&todayOff<=totalDays) h+='<div style="position:absolute;left:'+todayPct+'%;top:-3px;bottom:-3px;width:2px;background:var(--red);z-index:3;border-radius:2px"></div>';
    h+='<div style="position:absolute;left:'+leftPct+'%;width:'+widthPct+'%;height:100%;background:'+item.color+(isOd?';opacity:.5':'')+';border-radius:5px;display:flex;align-items:center;padding:0 6px;overflow:hidden;z-index:1;cursor:pointer" onclick="'+(item.type==='release'?"openReleaseModal('"+item.id+"')":'openDelivModal(\''+item.id+'\')')+'">';
    h+='<span style="font-size:9px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(item.sub||'')+'</span>';
    h+='</div></div>';
    h+='<div style="font-size:10px;color:var(--t3);flex-shrink:0;width:52px;text-align:right">'+(isOd?'<span class="overdue">':'')+(item.type==='release'?'🚀 ':'')+_fmt(item.end)+(isOd?'</span>':'')+'</div>';
    h+='</div>';
  });

  h+='<div style="font-size:10.5px;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:6px"><div style="width:14px;height:2px;background:var(--red);border-radius:2px"></div>Today — '+_fmtFull(td)+'</div>';
  h+='</div></div>';

  // Drill-in cards
  h+='<div class="section-label" style="margin-bottom:10px">Drill into a Release</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px">';
  releases.forEach(function(r){
    var relDels=deliverables.filter(function(d){ return d.workstream===r.product||d.linkedRelease===r.id; });
    var done=relDels.filter(function(d){ return d.phase==='done'||d.phase==='sent'; }).length;
    h+='<div class="card" style="cursor:pointer" onclick="showReleaseDrill(\''+r.id+'\')">';
    h+='<div style="height:3px;border-radius:3px 3px 0 0;background:'+wsColor(r.product||'Other')+'"></div>';
    h+='<div class="card-body" style="padding:9px 12px">';
    h+='<div style="font-size:12.5px;font-weight:600;margin-bottom:3px">'+_esc(r.title)+'</div>';
    h+='<div style="font-size:11px;color:var(--t3)">'+_esc(r.phase||'—')+'</div>';
    if(relDels.length) h+='<div style="margin-top:6px;background:var(--border);border-radius:4px;height:5px"><div style="height:100%;background:'+wsColor(r.product||'Other')+';border-radius:4px;width:'+(relDels.length?Math.round(done/relDels.length*100):0)+'%"></div></div><div style="font-size:10px;color:var(--t3);margin-top:3px">'+done+'/'+relDels.length+' deliverables done</div>';
    if(r.releaseDate) h+='<div style="font-size:11px;margin-top:4px;'+(r.releaseDate<td?'color:var(--red)':'color:var(--t3)')+'">📅 '+_fmt(r.releaseDate)+'</div>';
    h+='</div></div>';
  });
  if(!releases.length) h+='<div style="color:var(--t3);font-size:12.5px">No releases yet.</div>';
  h+='</div></div>';
  return h;
}

window.ganttFilter='all';
function setGanttFilter(f){ window.ganttFilter=f; renderContent(); }

function showReleaseDrill(releaseId){
  var r=DB.releases().filter(function(x){ return x.id===releaseId; })[0];
  if(!r) return;
  var dels=DB.deliverables().filter(function(d){ return d.workstream===r.product||d.linkedRelease===releaseId; });
  var body='<div style="margin-bottom:12px"><span class="pill" style="background:'+wsColor(r.product||'Other')+'18;color:'+wsColor(r.product||'Other')+'">'+_esc(r.product||'')+'</span> <span style="font-size:12px;color:var(--t3)">'+_esc(r.phase||'')+(r.releaseDate?' · Release: '+_fmt(r.releaseDate):'')+'</span></div>';
  if(!dels.length){ body+='<div style="color:var(--t3);font-size:12.5px">No deliverables linked. Add deliverables with workstream <strong>'+_esc(r.product||'')+'</strong>.</div>'; }
  else{
    if(dels.filter(function(d){ return d.startDate&&d.dueDate; }).length)
      body+=buildGantt(dels.filter(function(d){ return d.startDate&&d.dueDate; }).map(function(d){ return {title:d.title,product:d.workstream,startDate:d.startDate,releaseDate:d.dueDate,phase:d.phase}; }));
    body+='<table class="tbl" style="margin-top:12px;width:100%"><thead><tr><th>Deliverable</th><th>Phase</th><th>Due</th><th>Reviewer</th></tr></thead><tbody>';
    dels.forEach(function(d){ body+='<tr onclick="closeModal();openDelivModal(\''+d.id+'\')" style="cursor:pointer"><td style="font-size:12px;font-weight:600">'+_esc(d.title)+'</td><td style="font-size:11px">'+_esc(d.phase||'—')+'</td><td style="font-size:11px">'+_fmt(d.dueDate)+'</td><td style="font-size:11px">'+_esc(d.reviewer||'—')+'</td></tr>'; });
    body+='</tbody></table>';
  }
  showModal({title:r.title,wide:true,body:body,saveLabel:'Edit Release',onSave:function(){ closeModal(); openReleaseModal(releaseId); }});
}

// ── OUT-OF-OFFICE BLOCKS ──────────────────────────────────
function DB_ooo(){ return _lsGet('dh4-ooo',[]); }

function isOOO(dateStr){
  return DB_ooo().some(function(o){ return dateStr>=o.start&&dateStr<=o.end; });
}

function getOOOBlock(dateStr){
  return DB_ooo().find(function(o){ return dateStr>=o.start&&dateStr<=o.end; })||null;
}

function openOOOModal(editId){
  var all=DB_ooo();
  var o=editId?all.find(function(x){ return x.id===editId; }):null;
  showModal({title:o?'Edit OOO Block':'Add Out-of-Office',body:
    '<div style="font-size:12.5px;color:var(--t2);margin-bottom:14px">Mark date ranges when you\'re away. The calendar will shade those days and warn you about conflicts.</div>'+
    '<div class="field"><label>Label</label><input class="inp" type="text" id="m-ooo-label" placeholder="e.g. Vacation, Conference, Sick leave…" value="'+_esc(o?o.label:'')+'"/></div>'+
    '<div class="g2">'+
      '<div class="field"><label>Start date</label><input class="inp" type="date" id="m-ooo-start" value="'+(o?o.start:_today())+'"/></div>'+
      '<div class="field"><label>End date</label><input class="inp" type="date" id="m-ooo-end" value="'+(o?o.end:_today())+'"/></div>'+
    '</div>'+
    '<div class="field"><label>Notes <span style="font-weight:400;color:var(--t3)">(optional)</span></label><input class="inp" type="text" id="m-ooo-notes" placeholder="Coverage, contact, reason…" value="'+_esc(o?o.notes||'':'')+'"/></div>',
  onSave:function(){
    var label=document.getElementById('m-ooo-label').value.trim();
    var start=document.getElementById('m-ooo-start').value;
    var end=document.getElementById('m-ooo-end').value;
    if(!label||!start||!end){ alert('Label, start, and end date are required.'); return; }
    if(end<start){ alert('End date must be on or after start date.'); return; }
    var obj={id:editId||_uid(),label:label,start:start,end:end,notes:document.getElementById('m-ooo-notes').value.trim()};
    if(editId) _lsSave('dh4-ooo',all.map(function(x){ return x.id===editId?obj:x; }));
    else _lsSave('dh4-ooo',[obj].concat(all));
    closeModal();
    _checkOOOConflicts(obj);
    renderContent();
  }});
}

function deleteOOO(id){
  if(!confirm('Remove this OOO block?')) return;
  _lsSave('dh4-ooo',DB_ooo().filter(function(o){ return o.id!==id; }));
  renderContent();
}

function _checkOOOConflicts(ooo){
  var conflicts=[];
  DB.events().forEach(function(e){ if(e.date>=ooo.start&&e.date<=ooo.end) conflicts.push('Meeting: '+e.title+' ('+_fmt(e.date)+')'); });
  DB.deliverables().filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; }).forEach(function(d){ if(d.dueDate>=ooo.start&&d.dueDate<=ooo.end) conflicts.push('Deliverable due: '+d.title+' ('+_fmt(d.dueDate)+')'); });
  DB.todos().filter(function(t){ return !t.done; }).forEach(function(t){ if(t.date&&t.date>=ooo.start&&t.date<=ooo.end) conflicts.push('Task due: '+t.text+' ('+_fmt(t.date)+')'); });
  if(conflicts.length){
    var msg='⚠ OOO conflict — '+conflicts.length+' item'+(conflicts.length>1?'s':'')+' overlap your '+_fmt(ooo.start)+' – '+_fmt(ooo.end)+' block:\n\n'+conflicts.slice(0,8).join('\n')+(conflicts.length>8?'\n…and '+(conflicts.length-8)+' more':'');
    alert(msg);
  }
}

function buildOOOPanel(){
  var all=DB_ooo();
  var td=_today();
  var active=all.filter(function(o){ return o.end>=td; });
  var h='<div class="card" style="margin-bottom:14px">';
  h+='<div class="card-head"><span>✈</span><span class="card-title">Out-of-Office Blocks</span><button class="btn sm primary" onclick="openOOOModal(\'\')">+ Add OOO</button></div>';
  h+='<div class="card-body" style="padding:6px 16px">';
  if(!active.length){
    h+='<div style="font-size:12px;color:var(--t3);padding:6px 0">No OOO blocks. Add one to shade those days on your calendar and get conflict warnings.</div>';
  } else {
    active.forEach(function(o){
      var isNow=o.start<=td&&o.end>=td;
      h+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">';
      h+='<div style="width:10px;height:10px;border-radius:50%;background:'+(isNow?'var(--red)':'var(--yellow)')+';flex-shrink:0"></div>';
      h+='<div style="flex:1">';
      h+='<div style="font-size:13px;font-weight:600">'+_esc(o.label)+(isNow?' <span style="font-size:10px;color:var(--red);font-weight:700">ACTIVE</span>':'')+'</div>';
      h+='<div style="font-size:11.5px;color:var(--t3)">'+_fmt(o.start)+' → '+_fmt(o.end)+(o.notes?' · '+_esc(o.notes):'')+'</div>';
      h+='</div>';
      h+='<button class="btn sm ghost" onclick="openOOOModal(\''+o.id+'\')">✏</button>';
      h+='<button class="btn sm ghost" onclick="deleteOOO(\''+o.id+'\')">✕</button>';
      h+='</div>';
    });
  }
  h+='</div></div>';
  return h;
}

        var type=ext==='ics'||ext==='ical'?'📆 iCal':f.name.toLowerCase().includes('deliverable')?'◫ Deliverables':f.name.toLowerCase().includes('task')?'✓ Tasks':'📅 Calendar CSV';
        return type+': '+f.name;
      });
      prev.innerHTML='<strong>Ready to import:</strong><br>'+names.join('<br>');
    });
  },100);
}

function _importFilesSequentially(files,idx,totals,done){
  if(idx>=files.length){ done(totals); return; }
  var file=files[idx];
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result;
    if(ext==='ics'||ext==='ical'){
      var imported=parseIcal(text);
      var existing=DB.events(); var added=0;
      imported.forEach(function(e){
        if(!existing.find(function(x){ return x.title===e.title&&x.date===e.date; })){ existing.unshift(e); added++; }
        else totals.skipped++;
      });
      DB.save('events',existing); totals.events+=added;
    } else if(ext==='csv'){
      var name=file.name.toLowerCase();
      if(name.includes('task')||name.includes('todo')){
        var imported=parseTasksCsv(text); var todos=DB.todos(); var added=0;
        imported.forEach(function(t){
          if(!todos.find(function(x){ return x.text===t.text&&x.date===t.date; })){ todos.unshift(t); added++; }
          else totals.skipped++;
        });
        DB.save('todos',todos); totals.tasks+=added;
      } else if(name.includes('deliverable')){
        var imported=parseDeliverablesCsv(text); var dels=DB.deliverables(); var added=0;
        imported.forEach(function(d){
          if(!dels.find(function(x){ return x.title===d.title&&x.dueDate===d.dueDate; })){ dels.unshift(d); added++; }
          else totals.skipped++;
        });
        DB.save('deliverables',dels); totals.deliverables+=added;
      } else {
        // Default: Outlook calendar CSV
        var imported=parseOutlookCsv(text); var events=DB.events(); var added=0;
        imported.forEach(function(e){
          if(!events.find(function(x){ return x.title===e.title&&x.date===e.date; })){ events.unshift(e); added++; }
          else totals.skipped++;
        });
        DB.save('events',events); totals.events+=added;
      }
    }
    _importFilesSequentially(files,idx+1,totals,done);
  };
  reader.readAsText(file);
}

function parseTasksCsv(csv){
  var lines=csv.split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  var headers=parseCsvLine(lines[0]).map(function(h){ return h.trim().toLowerCase().replace(/"/g,''); });
  var ti=headers.indexOf('text'),di=headers.indexOf('date'),wi=headers.indexOf('workstream'),pi=headers.indexOf('priority'),ni=headers.indexOf('notes');
  if(ti===-1) return [];
  var tasks=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCsvLine(lines[i]);
    var text=cols[ti]?cols[ti].replace(/^"|"$/g,'').trim():'';
    if(!text) continue;
    tasks.push({id:_uid(),text:text,date:di>-1&&cols[di]?cols[di].replace(/^"|"$/g,'').trim():'',
      workstream:wi>-1&&cols[wi]?cols[wi].replace(/^"|"$/g,'').trim():'',
      priority:pi>-1&&cols[pi]?cols[pi].replace(/^"|"$/g,'').trim():'normal',
      notes:ni>-1&&cols[ni]?cols[ni].replace(/^"|"$/g,'').trim():'',done:false,createdAt:_now()});
  }
  return tasks;
}

function parseDeliverablesCsv(csv){
  var lines=csv.split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  var headers=parseCsvLine(lines[0]).map(function(h){ return h.trim().toLowerCase().replace(/"/g,''); });
  var cols={title:headers.indexOf('title'),type:headers.indexOf('type'),ws:headers.indexOf('workstream'),
    phase:headers.indexOf('phase'),pri:headers.indexOf('priority'),start:headers.indexOf('startdate'),
    due:headers.indexOf('duedate'),rev:headers.indexOf('reviewer')};
  if(cols.title===-1) return [];
  var dels=[];
  for(var i=1;i<lines.length;i++){
    var c=parseCsvLine(lines[i]);
    var get=function(idx){ return idx>-1&&c[idx]?c[idx].replace(/^"|"$/g,'').trim():''; };
    var title=get(cols.title);
    if(!title) continue;
    dels.push({id:_uid(),title:title,type:get(cols.type),workstream:get(cols.ws),
      phase:get(cols.phase)||'not started',priority:get(cols.pri)||'normal',
      startDate:get(cols.start),dueDate:get(cols.due),reviewer:get(cols.rev),createdAt:_now()});
  }
  return dels;
}

function fetchIcal(url){
  fetch(url).then(function(r){ return r.text(); }).then(function(text){
    var imported=parseIcal(text);
    if(!imported.length){ alert('No events found. Try downloading the ICS file and using ⬆ Import Files.'); return; }
    var existing=DB.events(); var added=0;
    imported.forEach(function(ev){
      if(!existing.find(function(x){ return x.title===ev.title&&x.date===ev.date; })){ existing.unshift(ev); added++; }
    });
    DB.save('events',existing);
    alert('Imported '+added+' event'+(added!==1?'s':'')+' from Outlook.');
    if(currentView==='calendar'||currentView==='dashboard') renderContent();
  }).catch(function(){ alert('CORS blocked. Download the ICS file and use ⬆ Import Files instead.'); });
}

function parseIcal(text){
  var events=[]; var cur=null;
  var lines=text.replace(/\r\n /g,'').replace(/\r\n/g,'\n').split('\n');
  lines.forEach(function(line){
    if(line==='BEGIN:VEVENT'){ cur={}; }
    else if(line==='END:VEVENT'&&cur){ if(cur.title&&cur.date) events.push(cur); cur=null; }
    else if(cur){
      if(line.startsWith('SUMMARY:')) cur.title=line.slice(8).trim();
      else if(line.startsWith('DTSTART')){
        var v=line.split(':').pop().trim();
        cur.date=v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6,8);
        cur.time=v.length>8?v.slice(9,11)+':'+v.slice(11,13):'';
      }
      else if(line.startsWith('LOCATION:')) cur.location=line.slice(9).trim();
      else if(line.startsWith('DESCRIPTION:')) cur.notes=line.slice(12).trim();
    }
  });
  return events.map(function(e){ return {id:_uid(),title:e.title,date:e.date,time:e.time||'',notes:e.notes||'',workstream:'',attendees:'',prepNotes:'',source:'ical'}; });
}

function parseOutlookCsv(csv){
  var lines=csv.split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  var headers=parseCsvLine(lines[0]).map(function(h){ return h.trim().toLowerCase().replace(/"/g,''); });
  var si=headers.indexOf('subject'),di=headers.indexOf('start date'),ti=headers.indexOf('start time'),dsi=headers.indexOf('description');
  if(si===-1||di===-1) return [];
  var events=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCsvLine(lines[i]);
    var subj=cols[si]?cols[si].replace(/^"|"$/g,''):'';
    var sd=cols[di]?cols[di].replace(/^"|"$/g,''):'';
    if(!subj||!sd) continue;
    var parts=sd.split('/');
    var dateStr=parts.length===3?parts[2].trim()+'-'+parts[0].trim().padStart(2,'0')+'-'+parts[1].trim().padStart(2,'0'):sd;
    var time=ti>-1&&cols[ti]?cols[ti].replace(/^"|"$/g,'').trim():'';
    events.push({id:_uid(),title:subj.trim(),date:dateStr,time:time,
      notes:dsi>-1&&cols[dsi]?cols[dsi].replace(/^"|"$/g,'').trim():'',
      workstream:'',attendees:'',prepNotes:'',source:'outlook'});
  }
  return events;
}

function parseCsvLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ inQ=!inQ; } else if(c===','&&!inQ){ result.push(cur); cur=''; } else cur+=c;
  }
  result.push(cur); return result;
}

    h+='<div class="card-head"><span>◫</span><span class="card-title">Upcoming Deliverables</span>';
    h+='<button class="btn sm ghost ml-auto" onclick="exportDeliverables()" style="color:var(--t3)">⬇ CSV</button>';
    h+='<button class="btn sm ghost" onclick="navigate(\'deliverables\')">All →</button></div>';
    h+='<div class="card-body" style="padding:6px 14px">';
    urgDel.forEach(function(d){
      var du=_daysUntil(d.dueDate);
      var dc=du===null?'':du<0?'overdue':du<=3?'soon':'';
      h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">';
      h+='<div style="width:4px;height:22px;border-radius:2px;background:'+wsColor(d.workstream||'Other')+';flex-shrink:0"></div>';
      h+='<div style="flex:1"><div style="font-size:12.5px;font-weight:600">'+_esc(d.title)+'</div>';
      h+='<div style="font-size:11px;color:var(--t3)">'+_esc(d.workstream||'')+(d.type?' · '+d.type:'')+'</div></div>';
      if(d.dueDate) h+='<span class="'+dc+'" style="font-size:11.5px;font-weight:600">'+_fmt(d.dueDate)+'</span>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // Blocked
  if(blocked.length){
    h+='<div class="card" style="border-color:var(--red)">';
    h+='<div class="card-head" style="background:#fdf0ee"><span>⛔</span><span class="card-title" style="color:var(--red)">Blocked ('+blocked.length+')</span><button class="btn sm ghost ml-auto" onclick="navigate(\'cards\')">View →</button></div>';
    h+='<div class="card-body" style="padding:6px 14px">';
    blocked.forEach(function(c){
      h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">';
      if(c.workstream) h+='<span class="pill" style="background:'+wsColor(c.workstream)+'18;color:'+wsColor(c.workstream)+'">'+_esc(c.workstream)+'</span>';
      h+='<span style="font-size:12.5px;flex:1">'+_esc(c.title)+'</span>';
      if(c.blockerNote) h+='<span style="font-size:11px;color:var(--t3)">'+_esc(c.blockerNote.slice(0,55))+'</span>';
      h+='<button class="btn sm ghost" onclick="openCardModal(\''+c.id+'\')">Edit</button></div>';
    });
    h+='</div></div>';
  }

  h+='</div>';
  return h;
}

function buildDashWeekStrip(events,todos,deliverables,cards,td){
  var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var today=new Date(new Date().toDateString());
  var sow=new Date(today); sow.setDate(today.getDate()-today.getDay());
  var oooBlocks=DB_ooo();
  var allItems=[];
  events.forEach(function(e){ allItems.push({date:e.date,title:e.title,time:e.time||'',type:'event',color:wsColor(e.workstream||'Other')}); });
  todos.forEach(function(t){ if(t.date&&!t.done) allItems.push({date:t.date,title:t.text,time:'',type:'task',color:wsColor(t.workstream||'Other')}); });
  deliverables.forEach(function(d){ if(d.dueDate&&d.phase!=='done'&&d.phase!=='sent') allItems.push({date:d.dueDate,title:'◫ '+d.title,time:'',type:'deliverable',color:wsColor(d.workstream||'Other')}); });
  var h='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  for(var d=0;d<7;d++){
    var day=new Date(sow); day.setDate(sow.getDate()+d);
    var ds=day.toISOString().split('T')[0];
    var isToday=ds===td;
    var oooBlock=oooBlocks.find(function(o){ return ds>=o.start&&ds<=o.end; });
    var di=allItems.filter(function(e){ return e.date===ds; }).sort(function(a,b){ return (a.time||'z').localeCompare(b.time||'z'); });
    var bg=isToday?'var(--accent)':oooBlock?'linear-gradient(135deg,#fef8ec,#fffbf0)':'var(--bg)';
    h+='<div style="background:'+bg+';border-radius:8px;padding:6px 5px;min-height:88px;cursor:pointer;'+(oooBlock&&!isToday?'border:1px solid var(--yellow)':'')+'" onclick="navigate(\'calendar\')">';
    h+='<div style="font-size:9px;font-weight:700;text-transform:uppercase;color:'+(isToday?'rgba(255,255,255,.75)':oooBlock?'var(--yellow)':'var(--t3)')+';margin-bottom:1px">'+DAYS[d]+(oooBlock?' ✈':'')+'</div>';
    h+='<div style="font-size:14px;font-weight:700;color:'+(isToday?'#fff':'var(--text)')+';margin-bottom:3px">'+day.getDate()+'</div>';
    if(oooBlock) h+='<div style="font-size:8px;color:'+(isToday?'rgba(255,255,255,.8)':'var(--yellow)')+';font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_esc(oooBlock.label.slice(0,12))+'</div>';
    di.slice(0,3).forEach(function(item){
      h+='<div style="font-size:9px;border-radius:3px;padding:1px 4px;margin-bottom:2px;background:'+(isToday?'rgba(255,255,255,.22)':item.color)+';color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'+(oooBlock?'opacity:.65':'')+'" title="'+_esc(item.title)+(oooBlock?' ⚠ OOO':'')+'">';
      if(item.time) h+=item.time.slice(0,5)+' ';
      h+=_esc(item.title)+'</div>';
    });
    if(di.length>3) h+='<div style="font-size:9px;color:'+(isToday?'rgba(255,255,255,.6)':'var(--t3)')+'">+'+(di.length-3)+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function buildPrioritiesWidget(saved){
  var lines=saved?saved.split('\n').filter(function(l){ return l.trim(); }):[];
  var h='';
  if(!lines.length) h+='<div style="font-size:11px;color:var(--t3);margin-bottom:6px">What are your top 3 priorities today?</div>';
  for(var i=0;i<3;i++){
    h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">';
    h+='<div style="width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>';
    h+='<input type="text" class="inp" style="flex:1;padding:5px 9px;font-size:12px" placeholder="Priority '+(i+1)+'…" id="dash-p'+(i+1)+'" value="'+_esc(lines[i]||'')+'" onchange="savePriorities()"/>';
    h+='</div>';
  }
  return h;
}

function savePriorities(){
  var lines=[];
  for(var i=1;i<=3;i++){ var el=document.getElementById('dash-p'+i); if(el&&el.value.trim()) lines.push(el.value.trim()); }
  _lsSave('dh4-p1-'+_today(),lines.join('\n'));
}

var helpExpanded = {};

function renderHelpTip(viewId) {
  var tip = HELP_TIPS[viewId];
  if(!tip) return '';
  var isOpen = helpExpanded[viewId] || false;
  var h = '<div class="help-tip">';
  h += '<div class="help-tip-head" onclick="toggleHelp(\''+viewId+'\')">';
  h += '<span class="help-tip-icon">'+tip.icon+'</span>';
  h += '<span class="help-tip-title">How to use: '+tip.title+'</span>';
  h += '<span class="help-tip-toggle'+(isOpen?' open':'')+'">▾</span>';
  h += '</div>';
  h += '<div class="help-tip-body'+(isOpen?' visible':'')+'" id="help-body-'+viewId+'">';
  h += '<ul>';
  tip.tips.forEach(function(t){
    h += '<li>'+t+'</li>';
  });
  h += '</ul>';
  h += '</div>';
  h += '</div>';
  return h;
}

function toggleHelp(viewId){
  helpExpanded[viewId] = !helpExpanded[viewId];
  var body = document.getElementById('help-body-'+viewId);
  var toggle = body ? body.previousElementSibling.querySelector('.help-tip-toggle') : null;
  if(body){
    body.classList.toggle('visible', helpExpanded[viewId]);
    if(toggle) toggle.classList.toggle('open', helpExpanded[viewId]);
  }
}
