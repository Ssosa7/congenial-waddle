<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Daily Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f0e8;--surface:#faf7f2;--card:#ffffff;
  --border:#e8e0d0;--border2:#d4c9b5;
  --text:#2c2416;--t2:#6b5d4f;--t3:#9e8f82;
  --accent:#b85c38;--accent2:#d4754e;
  --green:#4a7c59;--blue:#3d6b8e;--purple:#7c5c8e;
  --yellow:#c4952a;--red:#c44a3a;
  --radius:12px;--shadow:0 2px 12px rgba(44,36,22,.08);--shadow-lg:0 8px 32px rgba(44,36,22,.14);
}

/* ── THEMES ── */
body.theme-terracotta-dark{
  --bg:#1e1710;--surface:#251f16;--card:#2e2619;
  --border:#3d3328;--border2:#52453a;
  --text:#f0e8dc;--t2:#c4b09a;--t3:#8a7868;
  --accent:#d4754e;--accent2:#e8926e;
  --green:#5a9e6e;--blue:#5a8eb5;--purple:#9e7ab5;
  --yellow:#d4a83a;--red:#d45a4a;
  --shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.5);
}
body.theme-lavender{
  --bg:#f5f2fa;--surface:#faf8fd;--card:#ffffff;
  --border:#e2d9f3;--border2:#c9b8e8;
  --text:#2a1f3d;--t2:#6b5a8e;--t3:#a090b8;
  --accent:#7c5c8e;--accent2:#9e7ab0;
  --green:#5a8e6e;--blue:#5a7ab0;--purple:#7c5c8e;
  --yellow:#b89a3a;--red:#c44a5a;
  --shadow:0 2px 12px rgba(42,31,61,.08);--shadow-lg:0 8px 32px rgba(42,31,61,.14);
}
body.theme-sage{
  --bg:#f2f5f0;--surface:#f8faf6;--card:#ffffff;
  --border:#d8e8d4;--border2:#b8d4b0;
  --text:#1e2e1a;--t2:#4a6844;--t3:#8aaa84;
  --accent:#4a7c59;--accent2:#6a9e78;
  --green:#4a7c59;--blue:#4a7a8e;--purple:#7c6a8e;
  --yellow:#a8922a;--red:#b84a3a;
  --shadow:0 2px 12px rgba(30,46,26,.08);--shadow-lg:0 8px 32px rgba(30,46,26,.14);
}
body.theme-midnight{
  --bg:#111827;--surface:#1a2235;--card:#1e2840;
  --border:#2d3a52;--border2:#3d4f6e;
  --text:#e8edf5;--t2:#9aaac0;--t3:#5a6a82;
  --accent:#5a8eb5;--accent2:#7aaed5;
  --green:#4a9e6e;--blue:#5a8eb5;--purple:#7a6ab5;
  --yellow:#d4aa3a;--red:#d45a4a;
  --shadow:0 2px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.6);
}
body.theme-linen{
  --bg:#fdf8f0;--surface:#fffcf8;--card:#ffffff;
  --border:#ede4d4;--border2:#ddd0bb;
  --text:#3a3020;--t2:#7a6a54;--t3:#aaa090;
  --accent:#9e7a4a;--accent2:#c09a6a;
  --green:#5a8e5a;--blue:#4a7a9e;--purple:#8a6a9e;
  --yellow:#c4a030;--red:#c44a3a;
  --shadow:0 2px 12px rgba(58,48,32,.06);--shadow-lg:0 8px 32px rgba(58,48,32,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LAYOUT */
.shell{display:flex;height:100vh}
.sidebar{width:215px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;transition:width .2s;overflow:hidden}
.sidebar.collapsed{width:50px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;min-height:52px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px}

/* SIDEBAR */
.sb-head{padding:14px 10px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:9px}
.sb-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.sb-title-wrap{overflow:hidden}
.sb-title{font-family:'Lora',serif;font-size:13px;font-weight:600;white-space:nowrap}
.sb-sub{font-size:9px;color:var(--t3)}
.sb-nav{flex:1;overflow-y:auto;padding:6px}
.sb-section{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.08em;padding:10px 8px 3px;white-space:nowrap;overflow:hidden;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;border:none;background:transparent;color:var(--t2);width:100%;text-align:left;font-size:12px;transition:all .12s;white-space:nowrap;overflow:hidden}
.sb-btn:hover{background:var(--border);color:var(--text)}
.sb-btn.active{background:var(--accent);color:#fff;font-weight:600}
.sb-btn .ico{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.sb-btn .lbl{flex:1;overflow:hidden;text-overflow:ellipsis}
.sb-btn .bdg{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;background:var(--red);color:#fff;flex-shrink:0}
.sb-btn.active .bdg{background:rgba(255,255,255,.3);color:#fff}
.sb-foot{padding:8px 6px;border-top:1px solid var(--border);flex-shrink:0}
.sb-collapse{width:100%;padding:6px;border:none;background:transparent;color:var(--t3);border-radius:6px;font-size:13px}
.sb-collapse:hover{background:var(--border)}
.sidebar.collapsed .lbl,.sidebar.collapsed .sb-section,.sidebar.collapsed .sb-title-wrap{display:none}

/* TOPBAR */
.page-title{font-family:'Lora',serif;font-size:17px;font-weight:600;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--t2);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--border);color:var(--text)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.sm{padding:5px 10px;font-size:11.5px}
.btn.ghost{background:transparent;border-color:transparent;padding-left:6px;padding-right:6px}
.btn.ghost:hover{background:var(--border)}
.btn.active-filter{background:var(--accent);color:#fff;border-color:var(--accent)}
.ml-auto{margin-left:auto}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-head{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-body{padding:12px 16px}
.card-title{font-family:'Lora',serif;font-size:14px;font-weight:600}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1000px){.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── RESPONSIVE LAYOUT ── */
@media(max-width:900px){
  .sidebar{ width:52px; }
  .sidebar .sb-label{ display:none; }
  .sidebar .sb-section{ display:none; }
  .sidebar .sb-foot button span:not(.icon){ display:none; }
  #sync-footer{ display:none; }
  .dash-main-grid{ grid-template-columns:1fr !important; }
}
@media(max-width:700px){
  .sidebar{ display:none; }
  .main{ width:100%; }
  .topbar{ padding:8px 12px; gap:6px; }
  .topbar #topbar-actions{ flex-wrap:wrap; gap:4px; }
  .topbar #topbar-actions .btn{ font-size:10.5px; padding:4px 8px; }
  .content{ padding:10px 10px 20px; }
  .now-card{ padding:18px 16px; }
  .now-number{ font-size:42px; }
  .now-task{ font-size:17px; }
  .kanban{ grid-template-columns:1fr 1fr; }
  .pipeline{ grid-template-columns:repeat(3,1fr); }
  .cal-grid{ gap:1px; }
  .cal-day{ min-height:54px; font-size:10px; }
  .dash-main-grid{ grid-template-columns:1fr !important; }
}
@media(max-width:480px){
  .kanban{ grid-template-columns:1fr; }
  .pipeline{ grid-template-columns:repeat(2,1fr); }
  .cal-week{ grid-template-columns:36px repeat(7,1fr); }
}

/* FORMS */
.field{margin-bottom:12px}
.field label{display:block;font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.06em;margin-bottom:4px;text-transform:uppercase}
.inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .12s}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6}
select.inp{cursor:pointer}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(44,36,22,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .15s}
.modal{background:var(--card);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:540px;max-height:92vh;display:flex;flex-direction:column;animation:su .18s}
.modal.wide{max-width:700px}
.modal-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.modal-head h2{font-family:'Lora',serif;font-size:15px;font-weight:600;flex:1}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;letter-spacing:.01em}
.pill.green{background:#e8f5ed;color:var(--green)}
.pill.red{background:#fdf0ee;color:var(--red)}
.pill.yellow{background:#fef8ec;color:var(--yellow)}
.pill.blue{background:#eaf1f7;color:var(--blue)}
.pill.purple{background:#f3eef7;color:var(--purple)}
.pill.gray{background:var(--border);color:var(--t2)}
.pill.orange{background:#fdf3ee;color:var(--accent)}

/* TODO */
.todo-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:9px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;transition:border-color .12s}
.todo-item:hover{border-color:var(--border2)}
.todo-item.done{opacity:.5}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--t3)}
.todo-cb{width:17px;height:17px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;font-size:10px}
.todo-cb.chk{background:var(--green);border-color:var(--green);color:#fff}
.todo-text{flex:1;font-size:13px;line-height:1.5}
.todo-meta{font-size:10.5px;color:var(--t3);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.todo-actions{display:flex;gap:3px;opacity:0;transition:opacity .1s;flex-shrink:0}
.todo-item:hover .todo-actions{opacity:1}
.dg{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;padding:10px 0 4px;text-transform:uppercase}
.dg.od{color:var(--red)}

/* NOTES */
.note-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:all .12s}
.note-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.note-title{font-family:'Lora',serif;font-size:13.5px;font-weight:600;margin-bottom:3px}
.note-meta{font-size:11px;color:var(--t3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.note-preview{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* PROJECT CARDS */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;cursor:pointer;transition:all .12s;position:relative}
.pcard:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.pcard .bar{height:3px;border-radius:3px;margin-bottom:10px}
.pcard .pt{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:5px}
.pcard .pm{font-size:11px;color:var(--t3);display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.pcard .pa{position:absolute;top:9px;right:9px;display:flex;gap:3px;opacity:0;transition:opacity .1s}
.pcard:hover .pa{opacity:1}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.05em;padding:4px 0;text-transform:uppercase}
.cal-day{min-height:80px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 6px;cursor:pointer;transition:border-color .12s;overflow:hidden}
.cal-day:hover{border-color:var(--border2)}
.cal-day.today{border-color:var(--accent);border-width:2px}
.cal-day.om{opacity:.4}
.cal-day.ooo{background:repeating-linear-gradient(135deg,#fef8ec,#fef8ec 5px,#fffdf5 5px,#fffdf5 10px);border-color:var(--yellow)}
.cal-dn{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:2px}
.cal-day.today .cal-dn{color:var(--accent);font-weight:700}
.cal-ev{font-size:9px;border-radius:3px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.cal-week{display:grid;grid-template-columns:60px repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-week-time{font-size:10px;color:var(--t3);text-align:right;padding-right:6px;padding-top:4px}
.cal-week-cell{min-height:60px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px;overflow:hidden;cursor:pointer}
.cal-week-cell:hover{border-color:var(--border2)}
.cal-week-cell.today{border-color:var(--accent)}

/* STATS */
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-n{font-family:'Lora',serif;font-size:28px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--t3);margin-top:3px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-ico{font-size:36px;margin-bottom:10px;opacity:.4}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;max-width:260px}
.sbar input{border:none;background:transparent;outline:none;font-size:12.5px;color:var(--text);width:100%}
.sbar input::placeholder{color:var(--t3)}

/* TABLE */
.tbl-wrap{overflow:auto;border-radius:var(--radius);border:1px solid var(--border)}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;padding:7px 10px;border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tbody tr:hover td{background:var(--bg)}
.tbl tbody tr:last-child td{border-bottom:none}

/* MISC */
.overdue{color:var(--red)!important}
.soon{color:var(--yellow)!important}
.row{display:flex;align-items:center;gap:8px}
.row.wrap{flex-wrap:wrap}
.mono{font-family:'DM Mono',monospace;font-size:11px}
.section-label{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:14px 0}

@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* FOCUS MODE */
body.focus-mode .sb-section { opacity: .35 }
body.focus-mode .sb-btn:not(.focus-active):not(.active) { opacity: .3 }
.focus-banner { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 8px 16px; font-size: 12px; display: flex; align-items: center; gap: 10px; }
.focus-banner button { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer; }

/* NOW VIEW */
.now-card { background: linear-gradient(135deg, #fef8f5, #fdf0e8); border: 2px solid var(--accent); border-radius: 16px; padding: 28px 32px; margin-bottom: 16px; }
.now-number { font-family: 'Lora', serif; font-size: 64px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 6px; }
.now-label { font-size: 13px; color: var(--t2); margin-bottom: 20px; }
.now-task { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
.now-meta { font-size: 12px; color: var(--t3); }

/* SNOOZE */
.snoozed-badge { font-size: 9.5px; background: var(--yellow); color: #fff; border-radius: 4px; padding: 1px 5px; margin-left: 4px; }

/* PROGRESS BARS */
.prog-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .3s; }

/* BRAIN DUMP */
.dump-area { width: 100%; min-height: 320px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); resize: vertical; line-height: 1.7; }
.dump-area:focus { outline: none; border-color: var(--accent); }
.dump-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 6px; }
.dump-item-text { flex: 1; font-size: 13px; line-height: 1.5; }
.dump-item-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity .1s; }
.dump-item:hover .dump-item-actions { opacity: 1; }

/* PRINT MODE */
@media print {
  .sidebar, .topbar, .qc-float, #modal-root, .focus-banner, #focus-mode-btn { display: none !important; }
  .main { width: 100%; }
  .content { overflow: visible; padding: 0; }
  body { background: white; font-size: 12px; }
  .card { break-inside: avoid; }
}

/* CONFLICT WEEK */
.conflict-week { border-color: var(--red) !important; }
.conflict-badge { background: var(--red); color: #fff; border-radius: 4px; font-size: 9px; padding: 1px 5px; }

/* WAITING ON */
.waiting-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
.waiting-person { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* HELP TIPS */
.help-tip{background:linear-gradient(135deg,#fef8f5 0%,#fdf3ee 100%);border:1px solid #e8d4c8;border-radius:12px;padding:13px 16px;margin-bottom:18px;position:relative}
.help-tip-head{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.help-tip-icon{font-size:15px}
.help-tip-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.03em;flex:1}
.help-tip-toggle{font-size:11px;color:var(--t3);transition:transform .15s}
.help-tip-toggle.open{transform:rotate(180deg)}
.help-tip-body{margin-top:10px;display:none}
.help-tip-body.visible{display:block}
.help-tip-body ul{padding-left:16px;margin:0}
.help-tip-body li{font-size:12px;color:var(--t2);line-height:1.8;margin-bottom:1px}
.help-tip-body li strong{color:var(--text)}
.help-tip-body .tip-shortcut{display:inline-block;background:var(--border);border-radius:4px;padding:1px 6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);margin:0 2px}
.help-tip-body .tip-section{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin:8px 0 4px}

<script>
// =============================================================
//  DAILY HUB  |  Full build  |  vanilla JS
// =============================================================

// ── UTILS ─────────────────────────────────────────────────
var _today=function(){ return new Date().toISOString().split('T')[0]; };
var _now=function(){ return new Date().toISOString(); };
var _uid=function(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); };
var _fmt=function(d){ if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
var _fmtFull=function(d){ if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); };
var _isOD=function(d){ return d && new Date(d+'T00:00:00')<new Date(new Date().toDateString()); };
var _isSoon=function(d){ if(!d) return false; var diff=(new Date(d+'T00:00:00')-new Date(new Date().toDateString()))/86400000; return diff>=0&&diff<=3; };
var _esc=function(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
var _lsGet=function(k,fb){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch(e){ return fb; } };
var _lsSave=function(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };

// ── GITHUB SYNC ───────────────────────────────────────────
var GH={
  cfg:function(){ return _lsGet('dh4-gh-cfg',null); },
  isConfigured:function(){ var c=this.cfg(); return !!(c&&c.token&&c.repo&&c.owner); },
  DATA_KEYS:['todos','notes','cards','events','tickets','deliverables','decisions',
    'stakeholders','comms','releases','eod','flags','ooo','dump','snoozes',
    'custom-ws','jira-base','jira-bases','focus-ws','recurring-events','nudge-last','theme'],

  buildBlob:function(){
    var blob={v:2,saved:new Date().toISOString(),data:{}};
    var self=this;
    self.DATA_KEYS.forEach(function(k){ blob.data[k]=_lsGet('dh4-'+k,null); });
    var all=Object.keys(localStorage);
    all.forEach(function(k){
      if(k.startsWith('dh4-p1-')||k.startsWith('dh4-sow-')){
        var sk=k.slice(4);
        blob.data[sk]=_lsGet(k,null);
      }
    });
    return JSON.stringify(blob,null,2);
  },

  applyBlob:function(jsonStr){
    try{
      var blob=JSON.parse(jsonStr);
      var data=blob.data||blob;
      Object.keys(data).forEach(function(k){
        if(data[k]!==null&&data[k]!==undefined){
          _lsSave('dh4-'+k,data[k]);
        }
      });
      return true;
    }catch(e){ console.error('GH apply blob error',e); return false; }
  },

  getSHA:async function(){
    var c=this.cfg(); if(!c) return null;
    try{
      var r=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+c.path,{
        headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json'}
      });
      if(r.status===404) return '';
      if(!r.ok) return null;
      var j=await r.json(); return j.sha||null;
    }catch(e){ return null; }
  },

  push:async function(silent){
    var c=this.cfg(); if(!c) return;
    try{
      var sha=await this.getSHA();
      if(sha===null){ if(!silent) showBackupToast('Warning: GitHub sync error - check your token'); return; }
      var content=btoa(unescape(encodeURIComponent(this.buildBlob())));
      var body={message:'Hub sync '+new Date().toISOString(),content:content};
      if(sha) body.sha=sha;
      var r=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+c.path,{
        method:'PUT',
        headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(r.ok){
        _lsSave('dh4-gh-last-push',new Date().toISOString());
        updateSyncBadge('synced');
        if(!silent) showBackupToast('Synced to GitHub');
      } else {
        var err=await r.json();
        updateSyncBadge('error');
        if(!silent) showBackupToast('Sync failed: '+(err.message||r.status));
      }
    }catch(e){ updateSyncBadge('error'); if(!silent) showBackupToast('Sync error: '+e.message); }
  },

  pull:async function(silent){
    var c=this.cfg(); if(!c) return false;
    try{
      var r=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+c.path+'?t='+Date.now(),{
        headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json'}
      });
      if(r.status===404){ if(!silent) showBackupToast('No data file yet - will create on first save.'); return false; }
      if(!r.ok){ updateSyncBadge('error'); return false; }
      var j=await r.json();
      var decoded=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
      var ok=this.applyBlob(decoded);
      if(ok){
        _lsSave('dh4-gh-last-pull',new Date().toISOString());
        updateSyncBadge('synced');
        if(!silent) showBackupToast('Pulled latest data from GitHub');
        return true;
      }
    }catch(e){ updateSyncBadge('error'); if(!silent) showBackupToast('Pull error: '+e.message); }
    return false;
  }
};

var _ghPushTimer=null;
function ghSchedulePush(){
  if(!GH.isConfigured()) return;
  updateSyncBadge('pending');
  clearTimeout(_ghPushTimer);
  _ghPushTimer=setTimeout(function(){ GH.push(true); },3000);
}

function updateSyncBadge(state){
  var el=document.getElementById('sync-badge');
  if(!el) return;
  if(state==='synced'){ el.textContent='Synced'; el.style.color='var(--green)'; }
  else if(state==='pending'){ el.textContent='Saving...'; el.style.color='var(--yellow)'; }
  else if(state==='error'){ el.textContent='Sync error'; el.style.color='var(--red)'; }
  else if(state==='offline'){ el.textContent='Not connected'; el.style.color='var(--t3)'; }
}

function openGitHubSetup(){
  var cfg=GH.cfg()||{};
  showModal({title:'Connect GitHub Sync',wide:true,body:
    '<div style="font-size:12.5px;color:var(--t2);margin-bottom:16px;line-height:1.8">'+
    'Your data will be saved as a file in a GitHub repo you own. Any device that opens the hub will automatically load the same data.<br><br>'+
    '<strong>What you need:</strong> A GitHub Personal Access Token with <em>repo</em> scope. '+
    '<a href="https://github.com/settings/tokens/new?description=Daily+Hub+Sync&scopes=repo" target="_blank" style="color:var(--accent)">Click here to create one</a> '+
    '(check the repo box, set no expiration, copy the token).'+
    '</div>'+
    '<div class="field"><label>Personal Access Token</label>'+
    '<input class="inp" type="password" id="m-gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value="'+_esc(cfg.token||'')+'"/></div>'+
    '<div class="g2">'+
      '<div class="field"><label>GitHub username</label>'+
      '<input class="inp" type="text" id="m-gh-owner" placeholder="e.g. ssosa7" value="'+_esc(cfg.owner||'')+'"/></div>'+
      '<div class="field"><label>Repository name</label>'+
      '<input class="inp" type="text" id="m-gh-repo" placeholder="e.g. checkin-system" value="'+_esc(cfg.repo||'')+'"/></div>'+
    '</div>'+
    '<div class="field"><label>File path in repo</label>'+
    '<input class="inp" type="text" id="m-gh-path" placeholder="hub-data.json" value="'+_esc(cfg.path||'hub-data.json')+'"/></div>'+
    '<div style="padding:10px 12px;background:#f0f8f0;border-radius:8px;font-size:12px;color:#3a6b3a;margin-top:4px">'+
    'Your token is stored only in this browser - it never leaves your device except to call GitHub API directly. Never sent to any other server.'+
    '</div>',
  saveLabel:'Connect and sync',onSave:async function(){
    var token=document.getElementById('m-gh-token').value.trim();
    var owner=document.getElementById('m-gh-owner').value.trim();
    var repo=document.getElementById('m-gh-repo').value.trim();
    var path=document.getElementById('m-gh-path').value.trim()||'hub-data.json';
    if(!token||!owner||!repo){ alert('Fill in token, username, and repo name.'); return; }
    _lsSave('dh4-gh-cfg',{token:token,owner:owner,repo:repo,path:path});
    closeModal();
    showBackupToast('Testing connection...');
    try{
      var r=await fetch('https://api.github.com/repos/'+owner+'/'+repo,{
        headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
      });
      if(!r.ok){ showBackupToast('Could not reach that repo. Check owner/repo and token permissions.'); return; }
    }catch(e){ showBackupToast('Network error: '+e.message); return; }
    var pulled=await GH.pull(true);
    if(pulled){
      renderNav(); renderContent();
      showBackupToast('Connected! Your data has been loaded from GitHub.');
    } else {
      await GH.push(false);
    }
    updateSyncBadge('synced');
    renderSyncFooter();
  }});
}

function renderSyncFooter(){
  var el=document.getElementById('sync-footer');
  if(!el) return;
  if(GH.isConfigured()){
    var last=_lsGet('dh4-gh-last-push','');
    var lastStr=last?'Last sync: '+new Date(last).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Not yet synced';
    el.innerHTML='<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">'+
      '<span id="sync-badge" style="font-size:10px">Checking...</span>'+
      '</div>'+
      '<div style="font-size:9.5px;color:var(--t3);margin-bottom:5px">'+lastStr+'</div>'+
      '<div style="display:flex;gap:4px">'+
      '<button class="btn ghost" onclick="GH.pull(false).then(function(ok){ if(ok){renderNav();renderContent();} })" style="flex:1;font-size:10px;color:var(--t3)">Down Pull</button>'+
      '<button class="btn ghost" onclick="GH.push(false)" style="flex:1;font-size:10px;color:var(--t3)">Up Push</button>'+
      '</div>'+
      '<button class="btn ghost" onclick="openGitHubSetup()" style="width:100%;font-size:10px;color:var(--t3);margin-top:3px">Settings GitHub</button>';
    updateSyncBadge(last?'synced':'offline');
  } else {
    el.innerHTML='<button class="btn ghost" onclick="openGitHubSetup()" style="width:100%;font-size:11px;color:var(--accent);font-weight:600;padding:8px 6px;border:1px solid var(--accent)30;border-radius:8px;margin-bottom:4px">Connect GitHub Sync</button>'+
      '<div style="font-size:9.5px;color:var(--t3);text-align:center;line-height:1.5">Sync data across all devices</div>';
  }
}
var _daysAgo=function(iso){ if(!iso) return null; return Math.floor((new Date()-new Date(iso))/86400000); };
var _daysUntil=function(d){ if(!d) return null; return Math.round((new Date(d+'T00:00:00')-new Date(new Date().toDateString()))/86400000); };

// ── WORKSTREAM COLORS ─────────────────────────────────────
var WS_COLORS_BASE={
  'SQR':'#b85c38','NSS':'#3d6b8e','SPS':'#4a7c59','Insight':'#7c5c8e',
  'Accountability':'#c4952a','ISA':'#c44a3a','OPE':'#5c8e6b',
  'OSP Ops':'#8e7c5c','CCR':'#8e5c3d','PPR':'#3d5c8e','Other':'#9e8f82'
};
// Auto-generate colors for custom workstreams
var WS_COLOR_POOL=['#5b7fa6','#6b9e6b','#a6715b','#7a6ba6','#9e7a3d','#5b9e8e','#a65b7a','#6b8e5b','#8e5b9e','#9e8e5b'];
function wsColor(ws){
  if(WS_COLORS_BASE[ws]) return WS_COLORS_BASE[ws];
  // Check custom colors saved in settings
  var saved=_lsGet('dh4-ws-colors',{});
  if(saved[ws]) return saved[ws];
  // Auto-assign from pool based on name hash
  var hash=0; for(var i=0;i<ws.length;i++) hash=(hash+ws.charCodeAt(i))%WS_COLOR_POOL.length;
  return WS_COLOR_POOL[hash];
}

function toggleOtherLabel(selectId, inputId){
  var sel=document.getElementById(selectId);
  var wrap=document.getElementById(selectId+'-other-wrap');
  if(wrap) wrap.style.display=(sel&&sel.value==='Other')?'block':'none';
}

function saveWsIfCustom(ws){
  if(!ws||ws==='Other') return ws;
  var existing=getWorkstreams();
  if(existing.indexOf(ws)===-1){ addCustomWorkstream(ws); }
  return ws;
}

function getWsValue(selectId){
  var sel=document.getElementById(selectId);
  if(!sel) return '';
  if(sel.value==='Other'){
    var other=document.getElementById(selectId+'-other');
    if(other&&other.value.trim()) return other.value.trim();
  }
  return sel.value;
}

function getWorkstreams(){
  var base=['SQR','NSS','SPS','Insight','Accountability','ISA','OPE','OSP Ops','CCR','PPR'];
  var custom=_lsGet('dh4-custom-ws',[]);
  return base.concat(custom).concat(['Other']);
}

function addCustomWorkstream(name){
  name=name.trim();
  if(!name) return;
  var existing=getWorkstreams();
  if(existing.indexOf(name)>-1){ alert('"'+name+'" is already in your workstreams.'); return; }
  var custom=_lsGet('dh4-custom-ws',[]);
  custom.push(name);
  _lsSave('dh4-custom-ws',custom);
}

function removeCustomWorkstream(name){
  var custom=_lsGet('dh4-custom-ws',[]);
  _lsSave('dh4-custom-ws',custom.filter(function(w){ return w!==name; }));
}

function openManageWorkstreams(){
  function render(){
    var custom=_lsGet('dh4-custom-ws',[]);
    var base=['SQR','NSS','SPS','Insight','Accountability','ISA','OPE','OSP Ops','CCR','PPR','Other'];
    var body='<div style="font-size:12.5px;color:var(--t2);margin-bottom:14px">Add workstreams that aren\'t in the default list. They\'ll appear in every dropdown, filter, and color system across the hub.</div>';
    body+='<div style="margin-bottom:14px"><div class="section-label" style="margin-bottom:8px">Built-in workstreams</div>';
    body+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
    base.forEach(function(w){
      body+='<span style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:'+wsColor(w)+'18;border:1px solid '+wsColor(w)+'40;font-size:12px;font-weight:600;color:'+wsColor(w)+'">'+_esc(w)+'</span>';
    });
    body+='</div></div>';
    if(custom.length){
      body+='<div style="margin-bottom:14px"><div class="section-label" style="margin-bottom:8px">Your custom workstreams</div>';
      body+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
      custom.forEach(function(w){
        body+='<span style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:'+wsColor(w)+'18;border:1px solid '+wsColor(w)+'40;font-size:12px;font-weight:600;color:'+wsColor(w)+'">';
        body+=_esc(w);
        body+='<button onclick="removeCustomWorkstream(\''+_esc(w)+'\');openManageWorkstreams()" style="background:none;border:none;cursor:pointer;color:'+wsColor(w)+';font-size:11px;padding:0;line-height:1">✕</button>';
        body+='</span>';
      });
      body+='</div></div>';
    }
    body+='<div class="field"><label>Add a workstream</label>';
    body+='<div style="display:flex;gap:8px">';
    body+='<input class="inp" type="text" id="m-ws-new" placeholder="e.g. Athletics, Title I, SESIS…" style="flex:1;font-size:13px"/>';
    body+='<button class="btn primary" style="padding:8px 18px;font-size:13px;font-weight:700" onclick="var n=document.getElementById(\'m-ws-new\').value;addCustomWorkstream(n);openManageWorkstreams()">+ Add</button>';
    body+='</div></div>';
    return body;
  }
  showModal({title:'Manage Workstreams',wide:true,body:render(),hideFooter:true});
}

// ── DATA ──────────────────────────────────────────────────
var DB={
  todos:       function(){ return _lsGet('dh4-todos',[]); },
  notes:       function(){ return _lsGet('dh4-notes',[]); },
  cards:       function(){ return _lsGet('dh4-cards',[]); },
  events:      function(){ return _lsGet('dh4-events',[]); },
  tickets:     function(){ return _lsGet('dh4-tickets',[]); },
  deliverables:function(){ return _lsGet('dh4-deliverables',[]); },
  decisions:   function(){ return _lsGet('dh4-decisions',[]); },
  stakeholders:function(){ return _lsGet('dh4-stakeholders',[]); },
  comms:       function(){ return _lsGet('dh4-comms',[]); },
  releases:    function(){ return _lsGet('dh4-releases',[]); },
  eod:         function(){ return _lsGet('dh4-eod',[]); },
  settings:    function(){
    var base=['SQR','NSS','SPS','Insight','Accountability','ISA','OPE','OSP Ops','CCR','PPR','Other'];
    var custom=_lsGet('dh4-custom-ws',[]);
    // Merge custom before Other
    var merged=base.filter(function(w){ return w!=='Other'; }).concat(custom).concat(['Other']);
    return {
      workstreams: merged,
      functions:['Project Management','Management','Engagement','Communication','Operations']
    };
  },

  var todos=DB.todos(); var cards=DB.cards(); var tickets=DB.tickets();
  if(id==='todo')    return todos.filter(function(t){ return !t.done&&t.date<=_today(); }).length||'';

// ── ACTION INBOX ──────────────────────────────────────────
function buildActionItems(){
  var items=[];
  var notes=DB.notes();
  var cards=DB.cards();
  var tickets=DB.tickets();
  var deliverables=DB.deliverables();

  // From meeting notes
  notes.forEach(function(n){
    if(!n.actions) return;
    var lines=n.actions.split('\n').filter(function(l){ return l.trim(); });
    lines.forEach(function(line){
      items.push({id:'note-'+n.id+'-'+_uid(),source:'note',sourceId:n.id,
        text:line.trim(),workstream:n.workstream||'',date:n.date,
        sourceLabel:'Meeting: '+n.title,done:false});
    });
  });

  // From cards
  cards.forEach(function(c){
    if(!c.actions) return;
    var lines=c.actions.split('\n').filter(function(l){ return l.trim(); });
    lines.forEach(function(line){
      items.push({id:'card-'+c.id+'-'+_uid(),source:'card',sourceId:c.id,
        text:line.trim(),workstream:c.workstream||'',date:c.due||'',
        sourceLabel:'Card: '+c.title,done:false});
    });
  });

  // Zendesk waiting on me
  tickets.forEach(function(t){
    if(t.myAction&&(t.status==='open'||t.status==='waiting')){
      items.push({id:'ticket-'+t.id,source:'ticket',sourceId:t.id,
        text:t.myAction,workstream:'',date:'',
        sourceLabel:'Ticket #'+(t.ticketId||t.id),done:false});
    }
  });

  // Deliverables not started
  deliverables.forEach(function(d){
    if(d.phase==='not started'){
      items.push({id:'del-'+d.id,source:'deliverable',sourceId:d.id,
        text:'Start: '+d.title,workstream:d.workstream||'',date:d.dueDate||'',
        sourceLabel:'Deliverable',done:false});
    }
  });

  return items.sort(function(a,b){ return (a.date||'9').localeCompare(b.date||'9'); });
}

function buildInbox(){
  var h2=renderHelpTip('inbox');
  var items=buildActionItems();
  var open=items.filter(function(a){ return !a.done; });

  var h=h2+'<div style="max-width:700px">';
  h+='<div style="font-size:12.5px;color:var(--t3);margin-bottom:14px">Everything that needs your attention — pulled from meeting notes, cards, Zendesk, and deliverables.</div>';

  if(!open.length){
    h+='<div class="empty"><div class="empty-ico">✅</div><div style="font-size:13px">No open action items. You\'re all caught up.</div></div>';
    h+='</div>'; return h;
  }

  open.forEach(function(item){
    var dc=_isOD(item.date)?'overdue':_isSoon(item.date)?'soon':'';
    h+='<div class="todo-item">';
    h+='<div class="todo-cb" onclick="aiDone(\''+item.sourceId+'\',\''+item.source+'\')"></div>';
    h+='<div style="flex:1">';
    h+='<div class="todo-text">'+_esc(item.text)+'</div>';
    h+='<div class="todo-meta">';
    h+='<span style="color:var(--t3)">'+_esc(item.sourceLabel)+'</span>';
    if(item.workstream) h+='<span style="color:'+wsColor(item.workstream)+'">'+_esc(item.workstream)+'</span>';
    if(item.date) h+='<span class="'+dc+'">'+_fmt(item.date)+'</span>';
    h+='</div></div>';
    h+='<button class="btn sm ghost" onclick="goToSource(\''+item.source+'\',\''+item.sourceId+'\')">View →</button>';
    h+='</div>';
  });

  h+='</div>';
  return h;
}

function aiDone(sourceId, source){
  if(source==='note'){
    navigate('notes');
  } else if(source==='card'){
    openCardModal(sourceId);
  } else if(source==='ticket'){
    openTicketModal(sourceId);
  } else if(source==='deliverable'){
    openDelivModal(sourceId);
  }
}

function goToSource(source, sourceId){
  if(source==='note')        { currentView='notes'; renderNav(); renderTopbar(); renderContent(); }
  else if(source==='card')   { currentView='cards'; renderNav(); renderTopbar(); renderContent(); }
  else if(source==='ticket') { currentView='zendesk'; renderNav(); renderTopbar(); renderContent(); }
  else if(source==='deliverable'){ currentView='deliverables'; renderNav(); renderTopbar(); renderContent(); }
}

// ── DELIVERABLES ──────────────────────────────────────────
var DEL_TYPES=['Draft','Review','Send','Submit','Follow-up','Meeting'];
var DEL_PHASES=['not started','in progress','in review','sent','done'];
var DEL_PRIS=['urgent','high','normal','low'];

function buildDeliverables(){
  var h2=renderHelpTip('deliverables');
  var all=DB.deliverables();
  var q=''; var qEl=document.getElementById('del-q');
  if(qEl) q=qEl.value.toLowerCase();
  var dels=q?all.filter(function(d){ return d.title.toLowerCase().indexOf(q)>-1||(d.workstream||'').toLowerCase().indexOf(q)>-1; }):all;

  var open=all.filter(function(d){ return d.phase!=='done'&&d.phase!=='sent'; });
  var od=open.filter(function(d){ return _isOD(d.dueDate); });
  var soon=open.filter(function(d){ return _isSoon(d.dueDate)&&!_isOD(d.dueDate); });

  var h=h2+'<div style="max-width:1060px">';

  // Stats
  h+='<div class="g4" style="margin-bottom:16px">';
  h+='<div class="stat"><div class="stat-n">'+open.length+'</div><div class="stat-l">Open</div></div>';
  h+='<div class="stat" style="'+(od.length?'border-color:var(--red)':'')+'"><div class="stat-n" style="'+(od.length?'color:var(--red)':'')+'">'+od.length+'</div><div class="stat-l">Overdue</div></div>';
  h+='<div class="stat" style="'+(soon.length?'border-color:var(--yellow)':'')+'"><div class="stat-n" style="'+(soon.length?'color:var(--yellow)':'')+'">'+soon.length+'</div><div class="stat-l">Due this week</div></div>';
  h+='<div class="stat"><div class="stat-n">'+all.filter(function(d){ return d.phase==='done'||d.phase==='sent'; }).length+'</div><div class="stat-l">Done</div></div>';
  h+='</div>';

  // Filter tabs
  h+='<div class="tabs">';
  var dTabs=['all','not started','in progress','in review','sent','done'];
  var dTabAct=window.delTabActive||'all';
  dTabs.forEach(function(t){
    h+='<button class="tab'+(dTabAct===t?' active':'')+'" onclick="delTab(\''+t+'\')">'+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';
  });
  h+='</div>';

  if(dTabAct!=='all') dels=dels.filter(function(d){ return d.phase===dTabAct; });
  dels=dels.slice().sort(function(a,b){ return (a.dueDate||'9').localeCompare(b.dueDate||'9'); });

  if(!dels.length){
    h+='<div class="empty"><div class="empty-ico">◫</div><div style="font-size:13px">No deliverables here yet.<br/>Hit <strong>+ Add Deliverable</strong> to get started.</div></div>';
    h+='</div>'; return h;
  }

  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  h+='<th>Title</th><th>Type</th><th>Workstream</th><th>Phase</th><th>Priority</th><th>Start</th><th>Due</th><th>Reviewer</th><th>Jira</th><th></th>';
  h+='</tr></thead><tbody>';

  dels.forEach(function(d){
    var du=_daysUntil(d.dueDate);
    var dc=du===null?'':du<0?'overdue':du<=3?'soon':'';
    var phaseColor={'not started':'var(--t3)','in progress':'var(--blue)','in review':'var(--yellow)','sent':'var(--green)','done':'var(--green)'}[d.phase]||'var(--t3)';
    h+='<tr onclick="openDelivModal(\''+d.id+'\')" style="cursor:pointer">';
    h+='<td><div style="font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:6px">';
    if(d.workstream) h+='<div style="width:4px;height:16px;border-radius:2px;background:'+wsColor(d.workstream)+';flex-shrink:0"></div>';
    h+=_esc(d.title)+'</div>';
    if(d.notes) h+='<div style="font-size:11px;color:var(--t3);margin-top:1px">'+_esc(d.notes.slice(0,60))+'…</div>';
    h+='</td>';
    h+='<td><span class="pill gray">'+_esc(d.type||'—')+'</span></td>';
    h+='<td style="font-size:12px">'+_esc(d.workstream||'—')+'</td>';
    h+='<td><span style="font-size:11px;font-weight:600;color:'+phaseColor+'">'+_esc(d.phase||'—')+'</span></td>';
    h+='<td><span style="font-size:11px;color:var(--t2)">'+_esc(d.priority||'—')+'</span></td>';
    h+='<td style="font-size:11px;color:var(--t3)">'+_fmt(d.startDate)+'</td>';
    h+='<td style="font-size:11px;font-weight:600" class="'+dc+'">'+_fmt(d.dueDate)+'</td>';
    h+='<td style="font-size:12px">'+_esc(d.reviewer||'—')+'</td>';
    h+='<td>'+(d.jira?jiraLink(d.jira):'')+'</td>';
    h+='<td onclick="event.stopPropagation()" style="white-space:nowrap">';
    h+='<button class="btn sm ghost" onclick="deleteDeliv(\''+d.id+'\')">✕</button>';
    h+='</td></tr>';
  });

  h+='</tbody></table></div></div>';
  return h;
}

var REL_PRODUCTS=['SQR','NSS','SPS','ISA','State Accountability','CCR','PPR','Insight','Other'];

function buildReleases(){
  var h2=renderHelpTip('releases');

  var h=h2+'<div style="max-width:1060px">';

  // Pipeline view
  h+='<div style="margin-bottom:20px">';

    var inPhase=releases.filter(function(r){ return r.phase===phase; });
    h+='<div class="pipe-col">';
    h+='<div class="pipe-col-title">'+_esc(phase)+' <span style="font-weight:400;color:var(--t3)">('+inPhase.length+')</span></div>';
    inPhase.forEach(function(r){
      h+='<div class="pipe-item" onclick="openReleaseModal(\''+r.id+'\')">';
      h+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">';
      h+='<div style="width:6px;height:6px;border-radius:50%;background:'+wsColor(r.product||'Other')+'"></div>';
      h+='<span style="font-size:11.5px;font-weight:600">'+_esc(r.title)+'</span></div>';
      if(r.releaseDate) h+='<div style="font-size:10px;color:var(--t3)">'+_fmt(r.releaseDate)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='</div></div>';

  // Gantt-style timeline
  if(releases.length){
    h+='<div class="card" style="margin-bottom:16px">';
    h+='<div class="card-head"><span>◫</span><span class="card-title">Timeline</span></div>';
    h+='<div class="card-body" style="overflow-x:auto">';
    h+=buildGantt(releases);
    h+='</div></div>';
  }

  // Full list
  h+='<div class="section-label">All Releases</div>';
  if(!releases.length){
    h+='<div class="empty"><div class="empty-ico">⬡</div><div style="font-size:13px">No releases yet.<br/>Hit <strong>+ New Release</strong> to add one.</div></div>';
    h+='</div>'; return h;
  }

  var sorted=releases.slice().sort(function(a,b){ return (a.releaseDate||'9').localeCompare(b.releaseDate||'9'); });
  h+='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  h+='<th>Release</th><th>Product</th><th>Phase</th><th>Release Date</th><th>Embargo Date</th><th>Notes</th><th></th>';
  h+='</tr></thead><tbody>';
  sorted.forEach(function(r){
    var du=_daysUntil(r.releaseDate);
    var dc=du===null?'':du<0?'overdue':du<=7?'soon':'';
    h+='<tr onclick="openReleaseModal(\''+r.id+'\')" style="cursor:pointer">';
    h+='<td><div style="font-weight:600;display:flex;align-items:center;gap:6px"><div style="width:4px;height:16px;border-radius:2px;background:'+wsColor(r.product||'Other')+'"></div>'+_esc(r.title)+'</div></td>';
    h+='<td><span class="pill" style="background:'+wsColor(r.product||'Other')+'18;color:'+wsColor(r.product||'Other')+'">'+_esc(r.product||'—')+'</span></td>';
    h+='<td style="font-size:12px">'+_esc(r.phase||'—')+'</td>';
    h+='<td class="'+dc+'" style="font-size:12px;font-weight:600">'+_fmt(r.releaseDate)+'</td>';
    h+='<td style="font-size:12px;color:var(--t3)">'+_fmt(r.embargoDate)+'</td>';
    h+='<td style="font-size:11px;color:var(--t3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_esc(r.notes||'')+'</td>';
    h+='<td onclick="event.stopPropagation()"><button class="btn sm ghost" onclick="deleteRelease(\''+r.id+'\')">✕</button></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function buildGantt(releases){
  var sorted=releases.filter(function(r){ return r.startDate&&r.releaseDate; }).sort(function(a,b){ return a.startDate.localeCompare(b.startDate); });
  if(!sorted.length) return '<div style="color:var(--t3);font-size:12px">Add start dates and release dates to see the timeline.</div>';

  var minD=sorted[0].startDate;
  var maxD=sorted.reduce(function(m,r){ return r.releaseDate>m?r.releaseDate:m; },sorted[0].releaseDate);
  var totalDays=Math.max(1,Math.round((new Date(maxD+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000))+7;

  var h='<div style="min-width:600px">';
  sorted.forEach(function(r){
    var startOff=Math.round((new Date(r.startDate+'T00:00:00')-new Date(minD+'T00:00:00'))/86400000);
    var dur=Math.max(1,Math.round((new Date(r.releaseDate+'T00:00:00')-new Date(r.startDate+'T00:00:00'))/86400000));
    var leftPct=(startOff/totalDays*100).toFixed(1);
    var widthPct=(dur/totalDays*100).toFixed(1);
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
    h+='<div style="width:120px;flex-shrink:0;font-size:11px;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_esc(r.title)+'</div>';
    h+='<div style="flex:1;position:relative;height:22px;background:var(--border);border-radius:4px">';
    h+='<div style="position:absolute;left:'+leftPct+'%;width:'+widthPct+'%;height:100%;background:'+wsColor(r.product||'Other')+';border-radius:4px;display:flex;align-items:center;padding:0 6px;overflow:hidden">';
    h+='<span style="font-size:9px;color:#fff;white-space:nowrap">'+_esc(r.phase||'')+'</span>';
    h+='</div></div></div>';
  });
  h+='</div>';
  return h;
}

var calYear=new Date().getFullYear();
var calMonth=new Date().getMonth();
var calViewMode='month';
var calShowSY=true;
function toggleSYEvents(){ calShowSY=!calShowSY; renderTopbar(); renderContent(); }

function calToggleView(){ calViewMode=calViewMode==='month'?'week':'month'; renderTopbar(); renderContent(); }

function buildCalendar(){
  var h2=renderHelpTip('calendar');
  var events=DB.events();
  var todos=DB.todos();
  var deliverables=DB.deliverables();
  var cards=DB.cards();
  var oooBlocks=DB_ooo();

  // Combine all date-able items into calendar items
  var allItems=[];
  events.forEach(function(e){ allItems.push({date:e.date,title:e.title,time:e.time||'',type:'event',ws:e.workstream||'',color:wsColor(e.workstream||'Other'),id:e.id,prepNotes:e.prepNotes||'',attendees:e.attendees||''}); });
  todos.forEach(function(t){ if(t.date&&!t.done) allItems.push({date:t.date,title:t.text,time:'',type:'task',ws:t.workstream||'',color:wsColor(t.workstream||'Other'),id:t.id}); });
  deliverables.forEach(function(d){ if(d.dueDate&&d.phase!=='done'&&d.phase!=='sent') allItems.push({date:d.dueDate,title:'DUE: '+d.title,time:'',type:'deliverable',ws:d.workstream||'',color:wsColor(d.workstream||'Other'),id:d.id}); });
  cards.forEach(function(c){ if(c.due&&c.status!=='done') allItems.push({date:c.due,title:'[Card] '+c.title,time:'',type:'card',ws:c.workstream||'',color:wsColor(c.workstream||'Other'),id:c.id}); });
  // School year events
  if(calShowSY) getSYEvents().forEach(function(e){ allItems.push({date:e.date,title:e.title,time:'',type:'sy',ws:'',color:e.color,id:'sy-'+e.date}); });

  if(calViewMode==='week') return h2+buildOOOPanel()+buildWeekView(allItems,oooBlocks);
  return h2+buildOOOPanel()+buildMonthView(allItems,oooBlocks);
}

function buildMonthView(allItems,oooBlocks){
  oooBlocks=oooBlocks||[];
  var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var td=_today();
  var first=new Date(calYear,calMonth,1).getDay();
  var dim=new Date(calYear,calMonth+1,0).getDate();
  var diPrev=new Date(calYear,calMonth,0).getDate();
  var total=Math.ceil((first+dim)/7)*7;

  var h='<div style="max-width:1060px">';
  h+='<div class="row" style="margin-bottom:14px">';
  h+='<button class="btn" onclick="calNav(-1)">‹</button>';
  h+='<span style="font-family:Lora,serif;font-size:17px;font-weight:600;flex:1;text-align:center">'+MONTHS[calMonth]+' '+calYear+'</span>';
  h+='<button class="btn" onclick="calNav(1)">›</button>';
  h+='<button class="btn sm ghost" onclick="calGoToday()">Today</button>';
  h+='</div>';

  h+='<div class="g2" style="align-items:start;gap:20px">';

  // Grid
  h+='<div>';
  h+='<div class="cal-grid" style="margin-bottom:4px">';
  DAYS.forEach(function(d){ h+='<div class="cal-dh">'+d+'</div>'; });
  h+='</div><div class="cal-grid">';

  var dayCount=1,nextCount=1;
  for(var i=0;i<total;i++){
    var d, om=false;
    if(i<first){ d=diPrev-first+i+1; om=true; }
    else if(dayCount>dim){ d=nextCount++; om=true; }
    else{ d=dayCount++; }
    var ds=om?'':calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=ds===td;
    var oooBlock=ds?oooBlocks.find(function(o){ return ds>=o.start&&ds<=o.end; }):null;
    var dayItems=ds?allItems.filter(function(e){ return e.date===ds; }):[];
    var dayBg=oooBlock?'background:repeating-linear-gradient(135deg,#fef8ec,#fef8ec 4px,#fff9f0 4px,#fff9f0 8px)':isToday?'background:var(--accent)':'';
    h+='<div class="cal-day'+(om?' om':'')+(isToday?' today':'')+'"'+(ds?' onclick="openEventModal(\'\',\''+ds+'\')"':'')+' style="cursor:'+(ds?'pointer':'default')+';'+dayBg+'">';
    h+='<div class="cal-dn" style="'+(oooBlock?'color:var(--yellow);font-weight:700':'')+'">'+d+(oooBlock?' ✈':'')+'</div>';
    if(oooBlock&&!om) h+='<div style="font-size:8px;background:var(--yellow);color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_esc(oooBlock.label)+'</div>';
    dayItems.slice(0,3).forEach(function(e){
      h+='<div class="cal-ev" style="background:'+e.color+';'+(oooBlock?'opacity:.6':'')+'" title="'+_esc(e.title)+(oooBlock?' ⚠ OOO overlap':'')+'">';
      if(e.type==='task') h+='✓ ';
      else if(e.type==='deliverable') h+='◫ ';
      else if(e.type==='card') h+='▦ ';
      h+=_esc(e.title)+(oooBlock?' ⚠':'')+'</div>';
    });
    if(dayItems.length>3) h+='<div style="font-size:9px;color:var(--t3)">+'+(dayItems.length-3)+' more</div>';
    h+='</div>';
  }
  h+='</div></div>';

  // Upcoming
  var upcoming=allItems.filter(function(e){ return e.date>=_today(); }).sort(function(a,b){ return a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''); }).slice(0,12);
  h+='<div>';
  h+='<div class="section-label">Upcoming</div>';
  if(!upcoming.length) h+='<div style="color:var(--t3);font-size:12.5px">Nothing upcoming</div>';
  upcoming.forEach(function(e){
    var dt=new Date(e.date+'T00:00:00');
    h+='<div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)">';
    h+='<div style="text-align:center;min-width:34px;flex-shrink:0">';
    h+='<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase">'+dt.toLocaleDateString('en-US',{month:'short'})+'</div>';
    h+='<div style="font-size:16px;font-weight:700;line-height:1">'+dt.getDate()+'</div>';
    h+='</div>';
    h+='<div style="flex:1">';
    h+='<div style="display:flex;align-items:center;gap:5px">';
    h+='<div style="width:4px;height:14px;border-radius:2px;background:'+e.color+'"></div>';
    h+='<div style="font-size:12.5px;font-weight:600">'+_esc(e.title)+'</div>';
    h+='</div>';
    if(e.time) h+='<div style="font-size:11px;color:var(--t3)">'+_esc(e.time)+'</div>';
    if(e.type==='event'&&e.prepNotes) h+='<div style="font-size:11px;color:var(--t2)">📋 '+_esc(e.prepNotes)+'</div>';
    h+='</div>';
    if(e.type==='event') h+='<div onclick="event.stopPropagation()" style="display:flex;gap:3px;flex-shrink:0"><button class="btn sm" onclick="_lsSave(\'dh4-agenda-sel\',\''+e.id+'\');navigate(\'agenda\')" style="font-size:10px;background:var(--accent)18;color:var(--accent);border:1px solid var(--accent)30">📋 Agenda</button><button class="btn sm ghost" onclick="openEventModal(\''+e.id+'\',\'\')">✏</button><button class="btn sm ghost" onclick="deleteEvent(\''+e.id+'\')">✕</button></div>';
    h+='</div>';
  });
  h+='</div></div></div>';
  return h;
}

function buildWeekView(allItems,oooBlocks){
  oooBlocks=oooBlocks||[];
  var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var td=_today();
  var todayD=new Date();
  var startOfWeek=new Date(todayD);
  startOfWeek.setDate(todayD.getDate()-todayD.getDay());

  var h='<div style="max-width:1060px">';
  h+='<div class="row" style="margin-bottom:14px">';
  h+='<button class="btn" onclick="calNav(-1)">‹ Prev</button>';
  h+='<span style="font-family:Lora,serif;font-size:17px;font-weight:600;flex:1;text-align:center">Week of '+_fmt(startOfWeek.toISOString().split('T')[0])+'</span>';
  h+='<button class="btn" onclick="calNav(1)">Next ›</button>';
  h+='<button class="btn sm ghost" onclick="calGoToday()">Today</button>';
  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:50px repeat(7,1fr);gap:3px;margin-bottom:4px">';
  h+='<div></div>';
  for(var d=0;d<7;d++){
    var day=new Date(startOfWeek); day.setDate(startOfWeek.getDate()+d);
    var ds=day.toISOString().split('T')[0];
    var isToday=ds===td;
    var oooBlock=oooBlocks.find(function(o){ return ds>=o.start&&ds<=o.end; });
    h+='<div style="text-align:center;padding:4px;'+(isToday?'background:var(--accent);border-radius:6px;color:#fff':oooBlock?'background:var(--yellow);border-radius:6px;color:#fff':'')+'">'+
      '<div style="font-size:9px;font-weight:700;text-transform:uppercase;opacity:.7">'+DAYS[d]+(oooBlock?' ✈':'')+'</div>'+
      '<div style="font-size:14px;font-weight:700">'+day.getDate()+'</div></div>';
  }
  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:50px repeat(7,1fr);gap:3px">';
  h+='<div></div>';
  for(var d=0;d<7;d++){
    var day=new Date(startOfWeek); day.setDate(startOfWeek.getDate()+d);
    var ds=day.toISOString().split('T')[0];
    var isToday=ds===td;
    var oooBlock=oooBlocks.find(function(o){ return ds>=o.start&&ds<=o.end; });
    var dayItems=allItems.filter(function(e){ return e.date===ds; }).sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
    var cellBg=oooBlock?'repeating-linear-gradient(135deg,#fef8ec,#fef8ec 4px,#fffbf0 4px,#fffbf0 8px)':isToday?'var(--surface)':'var(--card)';
    h+='<div style="min-height:120px;background:'+cellBg+';border:1px solid '+(isToday?'var(--accent)':oooBlock?'var(--yellow)':'var(--border)')+';border-radius:8px;padding:5px;cursor:pointer" onclick="openEventModal(\'\',\''+ds+'\')">';
    if(oooBlock) h+='<div style="font-size:8.5px;color:var(--yellow);font-weight:700;margin-bottom:3px">✈ '+_esc(oooBlock.label)+'</div>';
    dayItems.forEach(function(e){
      var warn=oooBlock?' title="⚠ OOO overlap"':'';
      h+='<div style="font-size:9.5px;border-radius:3px;padding:2px 4px;margin-bottom:2px;background:'+e.color+';color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+(oooBlock?'opacity:.65':'')+'"'+warn+'>';
      if(e.time) h+=e.time+' ';
      if(e.type==='task') h+='✓ ';
      h+=_esc(e.title)+(oooBlock?' ⚠':'')+'</div>';
    });
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

function calNav(dir){
  if(calViewMode==='week'){
    var td=new Date();
    td.setDate(td.getDate()+(dir*7));
    calYear=td.getFullYear(); calMonth=td.getMonth();
  } else {
    calMonth+=dir;
    if(calMonth>11){ calMonth=0; calYear++; }
    if(calMonth<0){ calMonth=11; calYear--; }
  }
  renderContent();
}
function calGoToday(){ calYear=new Date().getFullYear(); calMonth=new Date().getMonth(); renderContent(); }

// ── TO-DO ─────────────────────────────────────────────────
var todoGroupBy='date';

function toggleTodoGroup(){ todoGroupBy=todoGroupBy==='date'?'workstream':'date'; renderContent(); }

function buildTodo(){
  var h2=renderHelpTip('todo');
  var todos=DB.todos().slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var open=todos.filter(function(t){ return !t.done; }).length;
  var done=todos.filter(function(t){ return t.done; }).length;
  var td=_today();

  var h=h2+'<div style="max-width:660px">';
  h+='<div class="row wrap" style="margin-bottom:12px">';
  h+='<button class="btn sm" onclick="todoToggleGroup()">Group by: '+(todoGroupBy==='date'?'Date':'Workstream')+'</button>';
  h+='<span class="pill gray">'+open+' open</span>';
  if(done) h+='<span class="pill green">'+done+' done</span>';
  if(done) h+='<button class="btn sm ghost" onclick="clearDone()" style="color:var(--t3)">Clear done</button>';
  h+='</div>';

  if(!todos.length){
    h+='<div class="empty"><div class="empty-ico">✓</div><div style="font-size:13px">No tasks yet.</div></div>';
    h+='</div>'; return h;
  }

  var groups={};
  todos.forEach(function(t){
    var k=todoGroupBy==='workstream'?(t.workstream||'No workstream'):(t.date||'No date');
    if(!groups[k]) groups[k]=[];
    groups[k].push(t);
  });

  var keys=Object.keys(groups).sort();
  keys.forEach(function(key){
    var label=key, od=false;
    if(todoGroupBy==='date'){
      if(key==='No date') label='No date';
      else if(key===td) label='Today';
      else{
        var diff=Math.round((new Date(key+'T00:00:00')-new Date(new Date().toDateString()))/86400000);
        if(diff===1) label='Tomorrow';
        else if(diff===-1) label='Yesterday';
        else if(diff<0){ label='Overdue — '+_fmt(key); od=true; }
        else label=_fmtFull(key);
      }
    }
    h+='<div class="dg'+(od?' od':'')+'">'+label+'</div>';
    groups[key].forEach(function(t){
      h+='<div class="todo-item'+(t.done?' done':'')+'">';
      h+='<div class="todo-cb'+(t.done?' chk':'')+'" onclick="toggleTodo(\''+t.id+'\')">'+(t.done?'✓':'')+'</div>';
      h+='<div style="flex:1;cursor:pointer" onclick="toggleTodo(\''+t.id+'\')">';
      h+='<div class="todo-text">'+_esc(t.text)+(isSnoozed(t.id)?'<span class="snoozed-badge">💤 until '+_fmt(getSnoozeUntil(t.id))+'</span>':'')+'</div>';
      h+='<div class="todo-meta">';
      if(t.workstream&&todoGroupBy==='date') h+='<span style="color:'+wsColor(t.workstream)+'">'+_esc(t.workstream)+'</span>';
      if(t.waitingOn) h+='<span style="color:var(--yellow)">⏳ '+_esc(t.waitingOn)+'</span>';
      if(t.linkedCard){
        var c=DB.cards().filter(function(x){ return x.id===t.linkedCard; })[0];
        if(c) h+='<span style="color:var(--blue)">▦ '+_esc(c.title.slice(0,30))+'</span>';
      }
      if(t.priority==='urgent') h+='<span class="pill red" style="font-size:9px">urgent</span>';
      if(t.priority==='high')   h+='<span class="pill orange" style="font-size:9px">high</span>';
      if(t.recurring) h+='<span style="font-size:9px;color:var(--t3)">↻ recurring</span>';
      h+='</div></div>';
      h+='<div class="todo-actions">';
      if(!t.done) h+='<button class="btn sm ghost" onclick="openSnoozeModal(\'todo\',\''+t.id+'\',\''+_esc(t.text.slice(0,40))+'\')" title="Snooze">💤</button>';
      h+='<button class="btn sm ghost" onclick="openTodoModal(\''+t.id+'\')">✏</button>';
      h+='<button class="btn sm ghost" onclick="deleteTodo(\''+t.id+'\')">✕</button>';
      h+='</div></div>';
    });
  });

  h+='</div>';
  return h;
}

  var todos=DB.todos();
  for(var i=0;i<todos.length;i++) if(todos[i].id===id){ todos[i].done=!todos[i].done; break; }
  DB.save('todos',todos); renderNav(); renderContent();

var CARD_STATS=[{id:'pending',label:'Pending',color:'var(--yellow)'},{id:'inprogress',label:'In Progress',color:'var(--blue)'},{id:'blocked',label:'Blocked',color:'var(--red)'},{id:'done',label:'Done',color:'var(--green)'}];
var CARD_PRIS=[{id:'urgent',label:'Urgent',color:'var(--red)'},{id:'high',label:'High',color:'var(--accent)'},{id:'normal',label:'Normal',color:'var(--blue)'},{id:'low',label:'Low',color:'var(--t3)'}];
var cardViewMode='list';

function getCrdStat(id){ for(var i=0;i<CARD_STATS.length;i++) if(CARD_STATS[i].id===id) return CARD_STATS[i]; return CARD_STATS[0]; }
function getCrdPri(id){ for(var i=0;i<CARD_PRIS.length;i++) if(CARD_PRIS[i].id===id) return CARD_PRIS[i]; return CARD_PRIS[2]; }

function toggleCardView(){ cardViewMode=cardViewMode==='list'?'kanban':'list'; renderContent(); }

function buildCards(){
  var h2=renderHelpTip('cards');
  var allCards=DB.cards();
  var q=''; var qEl=document.getElementById('cards-q');
  if(qEl) q=qEl.value.toLowerCase();
  var cards=q?allCards.filter(function(c){ return c.title.toLowerCase().indexOf(q)>-1||(c.workstream||'').toLowerCase().indexOf(q)>-1; }):allCards;

  var h='<div style="max-width:1060px">';
  h+=h2;
  // Filter pills
  h+='<div class="row wrap" style="margin-bottom:12px;gap:6px">';
  var cFilters=[{id:'all',label:'All'},{id:'pending',label:'Pending'},{id:'inprogress',label:'In Progress'},{id:'blocked',label:'Blocked'},{id:'done',label:'Done'}];
  var cf=window.cardFilter||'all';
  cFilters.forEach(function(f){
    h+='<button class="btn sm'+(cf===f.id?' active-filter':'')+'" onclick="setCardFilter(\''+f.id+'\')">'+f.label+'</button>';
  });
  h+='</div>';

  if(cf!=='all') cards=cards.filter(function(c){ return c.status===cf; });

  if(!cards.length){
    h+='<div class="empty"><div class="empty-ico">▦</div><div style="font-size:13px">No cards here.</div></div>';
    h+='</div>'; return h;
  }

  if(cardViewMode==='kanban'){
    h+=buildKanban(cards);
  } else {
    h+=buildCardList(cards);
  }

  h+='</div>';
  return h;
}

window.cardFilter='all';
function setCardFilter(f){ window.cardFilter=f; renderContent(); }

function buildKanban(cards){
  var h='<div class="kanban">';
  CARD_STATS.forEach(function(st){
    var col=cards.filter(function(c){ return c.status===st.id; });
    h+='<div class="kanban-col">';
    h+='<div class="kanban-col-title"><div style="width:8px;height:8px;border-radius:50%;background:'+st.color+'"></div>'+st.label+' <span style="font-weight:400">('+col.length+')</span></div>';
    col.forEach(function(c){
      var pri=getCrdPri(c.priority);
      h+='<div class="kanban-card" onclick="openCardModal(\''+c.id+'\')">';
      h+='<div style="height:2px;border-radius:2px;background:'+pri.color+';margin-bottom:7px"></div>';
      h+='<div style="font-size:12.5px;font-weight:600;margin-bottom:4px">'+_esc(c.title)+'</div>';
      if(c.workstream) h+='<div style="font-size:10.5px;color:'+wsColor(c.workstream)+'">'+_esc(c.workstream)+'</div>';
      if(c.due) h+='<div style="font-size:10.5px;color:var(--t3);margin-top:3px">📅 '+_fmt(c.due)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function buildCardList(cards){
  var groups={};
  var order=[];
  cards.forEach(function(c){
    var k=c.workstream||'Other';
    if(!groups[k]){ groups[k]=[]; order.push(k); }
    groups[k].push(c);
  });

  var h='';
  order.forEach(function(ws){
    h+='<div style="margin-bottom:20px">';
    h+='<div class="section-label" style="display:flex;align-items:center;gap:7px"><div style="width:8px;height:8px;border-radius:50%;background:'+wsColor(ws)+'"></div>'+_esc(ws)+'</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px">';
    groups[ws].forEach(function(c){
      var st=getCrdStat(c.status); var pri=getCrdPri(c.priority);
      var stuckDays=_daysAgo(c.statusChangedAt);
      var isStuck=stuckDays!==null&&stuckDays>7&&c.status!=='done';
      h+='<div class="pcard'+(isStuck?' stuck':'')+'" onclick="openCardModal(\''+c.id+'\')"'+(isStuck?' style="border-color:var(--yellow)"':'')+' >';
      h+='<div class="bar" style="background:'+pri.color+'"></div>';
      h+='<div class="row" style="align-items:flex-start">';
      h+='<div class="pt" style="flex:1">'+_esc(c.title)+'</div>';
      h+='<div class="pa" onclick="event.stopPropagation()">';
      h+='<button class="btn sm ghost" data-flag-type="Card" data-flag-text="'+_esc(c.title)+'" data-flag-ws="'+_esc(c.workstream||'')+'" onclick="flagFromBtn(this)">⚑</button>';
      h+='<button class="btn sm ghost" onclick="cycleCardStatus(\''+c.id+'\')">↻</button>';
      h+='<button class="btn sm ghost" onclick="deleteCard(\''+c.id+'\')">✕</button>';
      h+='</div></div>';
      h+='<div class="pm">';
      h+='<span class="pill" style="background:'+st.color+'18;color:'+st.color+'">'+st.label+'</span>';
      if(c.owner) h+='<span>👤 '+_esc(c.owner)+'</span>';
      if(c.due) h+='<span class="'+(_isOD(c.due)?'overdue':_isSoon(c.due)?'soon':'')+'">📅 '+_fmt(c.due)+'</span>';
      if(c.jira) h+='<span>'+jiraLink(c.jira)+'</span>';
      if(isStuck) h+='<span style="color:var(--yellow);font-size:9.5px">⚠ '+stuckDays+'d in '+st.label+'</span>';
      h+='</div>';
      if(c.blockerNote&&c.status==='blocked') h+='<div style="font-size:11px;color:var(--red);margin-top:6px;padding:4px 8px;background:#fdf0ee;border-radius:6px">⛔ '+_esc(c.blockerNote)+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  });
  return h;
}

function cycleCardStatus(id){
  var cards=DB.cards();
  var order=['pending','inprogress','blocked','done'];
  for(var i=0;i<cards.length;i++) if(cards[i].id===id){
    var idx=order.indexOf(cards[i].status);
    cards[i].status=order[(idx+1)%order.length];
    cards[i].statusChangedAt=_now();
    break;
  }
  DB.save('cards',cards); renderNav(); renderContent();
}

function buildNotes(){

  var q=''; var qEl=document.getElementById('notes-q');
  if(qEl) q=qEl.value.toLowerCase();
  var wsF=window.noteWsFilter||'';
  if(q) notes=notes.filter(function(n){ return n.title.toLowerCase().indexOf(q)>-1||(n.agenda||'').toLowerCase().indexOf(q)>-1||(n.actions||'').toLowerCase().indexOf(q)>-1; });

  var ws=DB.settings().workstreams;
  var h=h2+'<div style="max-width:800px">';

  // WS filter
  h+='<div class="row wrap" style="margin-bottom:12px;gap:5px">';
  h+='<button class="btn sm'+(wsF===''?' active-filter':'')+'" onclick="noteWsFilter(\'\')">All</button>';
  ws.forEach(function(w){
    var cnt=DB.notes().filter(function(n){ return n.workstream===w; }).length;
    if(cnt) h+='<button class="btn sm'+(wsF===w?' active-filter':'')+'" onclick="noteWsFilter(\''+_esc(w)+'\')" style="border-left:3px solid '+wsColor(w)+'">'+_esc(w)+'</button>';
  });
  h+='</div>';

  if(!notes.length){
    h+='<div class="empty"><div class="empty-ico">◎</div><div style="font-size:13px">No notes yet.</div></div>';
    h+='</div>'; return h;
  }

  notes.forEach(function(n){
    h+='<div class="note-card" onclick="viewNote(\''+n.id+'\')">';

    h+='<button class="btn sm ghost" onclick="openNoteModal(\''+n.id+'\')">✏</button>';

    h+='</div></div>';
    h+='<div class="note-meta"><span>'+_fmt(n.date)+'</span>';
    if(n.workstream) h+='<span class="pill" style="background:'+wsColor(n.workstream)+'18;color:'+wsColor(n.workstream)+'">'+_esc(n.workstream)+'</span>';
    if(n.attendees) h+='<span>👥 '+_esc(n.attendees)+'</span>';
