          <button onClick={()=>{if(e.title?.trim())onSave(e);}} style={{flex:2,padding:"9px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:13,fontWeight:600}}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

// ── STAKEHOLDERS ──────────────────────────────────────────────────────────────
function Stakeholders(){
  const C=useC();
  const blank={id:null,name:"",role:"",type:"internal",workstream:"",email:"",lastContact:"",health:"green",notes:""};
  const [data,setData]=useState(()=>lsGet("dh-stakeholders",SAMPLE_STAKEHOLDERS));
  const [form,setForm]=useState(blank);
  const [editing,setEditing]=useState(false);
  function save(d){lsSave("dh-stakeholders",d);setData(d);}
  function submit(){
    if(!form.name.trim())return;
    const obj={...form,id:form.id||Date.now()};
    const next=form.id?data.map(s=>s.id===form.id?obj:s):[obj,...data];
    save(next);setForm(blank);setEditing(false);
  }
  function del(id){save(data.filter(s=>s.id!==id));}
  function edit(s){setForm(s);setEditing(true);}
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};
  const hColors={green:C.green,yellow:C.yellow,red:C.red};
  const hLabels={green:"Strong",yellow:"Needs attention",red:"At risk"};
  const byType={internal:data.filter(s=>s.type==="internal"),executive:data.filter(s=>s.type==="executive")};
  return(
    <div style={{maxWidth:900}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>👥 Stakeholder Tracker</div>
        <div style={{fontSize:12,color:C.t3}}>Track relationships, last contact, and health across your network</div></div>
        <button onClick={()=>{setForm(blank);setEditing(true);}} style={{padding:"8px 16px",borderRadius:9,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>+ Add</button>
      </div>
      {editing&&(
        <div style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:14,padding:"16px",marginBottom:16,boxShadow:"0 4px 20px #0001"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:12}}>{form.id?"✎ Edit":"+ New"} Stakeholder</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:9}}>
            <div><Lbl>NAME</Lbl><input style={inp} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Full name"/></div>
            <div><Lbl>ROLE / TITLE</Lbl><input style={inp} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} placeholder="e.g. Director"/></div>
            <div><Lbl>TYPE</Lbl><select style={inp} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
              <option value="internal">Internal / DOE</option><option value="executive">Executive / Leadership</option>
            </select></div>
            <div><Lbl>WORKSTREAM</Lbl><select style={inp} value={form.workstream} onChange={e=>setForm(f=>({...f,workstream:e.target.value}))}>
              <option value="">All</option>{WORKSTREAMS.map(w=><option key={w.id} value={w.id}>{w.label}</option>)}
            </select></div>
            <div><Lbl>EMAIL</Lbl><input style={inp} value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="email@schools.nyc.gov"/></div>
            <div><Lbl>LAST CONTACT</Lbl><input type="date" style={inp} value={form.lastContact} onChange={e=>setForm(f=>({...f,lastContact:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:9}}><Lbl>RELATIONSHIP HEALTH</Lbl>
            <div style={{display:"flex",gap:8}}>
              {["green","yellow","red"].map(h=><button key={h} onClick={()=>setForm(f=>({...f,health:h}))}
                style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${form.health===h?hColors[h]:C.border}`,background:form.health===h?hColors[h]+"18":"transparent",color:form.health===h?hColors[h]:C.t2,fontSize:11,fontWeight:form.health===h?700:400}}>
                ● {hLabels[h]}</button>)}
            </div>
          </div>
          <div style={{marginBottom:12}}><Lbl>NOTES</Lbl><textarea style={{...inp,resize:"none"}} rows={2} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Context, last discussion, follow-ups…"/></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={submit} style={{padding:"8px 20px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>Save</button>
            <button onClick={()=>{setForm(blank);setEditing(false);}} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}
      {["executive","internal"].map(type=>{
        const group=byType[type]||[];
        if(!group.length)return null;
        return(<div key={type} style={{marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t3,letterSpacing:"0.08em",marginBottom:8}}>{type==="executive"?"🏛 EXECUTIVE / LEADERSHIP":"🏢 INTERNAL / DOE"}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
            {group.map(s=>{
              const daysAgo=s.lastContact?Math.floor((new Date()-new Date(s.lastContact+"T00:00:00"))/86400000):null;
              const stale=daysAgo!==null&&daysAgo>14;
              return(<div key={s.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 15px",borderLeft:`3px solid ${hColors[s.health]||C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.t3}}>{s.role}</div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>edit(s)} style={{background:"transparent",border:"none",color:C.t3,fontSize:12,padding:"2px 4px"}}>✎</button>
                    <button onClick={()=>del(s.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:11,padding:"2px 4px"}}>✕</button>
                  </div>
                </div>
                {s.workstream&&<div style={{fontSize:10,color:C.t3,marginBottom:4}}>📁 {WORKSTREAMS.find(w=>w.id===s.workstream)?.label||s.workstream}</div>}
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:9,fontWeight:700,color:hColors[s.health],background:hColors[s.health]+"18",padding:"2px 7px",borderRadius:20}}>● {hLabels[s.health]}</span>
                  {daysAgo!==null&&<span style={{fontSize:9,color:stale?C.orange:C.t3,background:stale?"#fff7ed":C.cream,padding:"2px 7px",borderRadius:20,border:`1px solid ${stale?C.orange+"44":C.border}`,fontWeight:stale?700:400}}>{stale?"⏰ ":""}{daysAgo===0?"Today":daysAgo===1?"Yesterday":`${daysAgo}d ago`}</span>}
                  {s.email&&<a href={`mailto:${s.email}`} style={{fontSize:9,color:C.accent,background:C.accent+"10",padding:"2px 7px",borderRadius:20,border:`1px solid ${C.accent}33`}}>✉ Email</a>}
                </div>
                {s.notes&&<div style={{fontSize:11,color:C.t2,marginTop:7,padding:"6px 8px",background:C.cream,borderRadius:7,lineHeight:1.5}}>{s.notes}</div>}
              </div>);
            })}
          </div>
        </div>);
      })}
      {!data.length&&!editing&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}>
        <div style={{fontSize:32,marginBottom:8}}>👥</div>
        <div style={{fontSize:13,fontWeight:600}}>No stakeholders yet</div>
        <div style={{fontSize:12,marginTop:4}}>Add your key contacts to track relationships</div>
      </div>}
    </div>
  );
}

// ── RISK LOG ──────────────────────────────────────────────────────────────────
function RiskLog(){
  const C=useC();
  const blank={id:null,title:"",description:"",likelihood:"medium",impact:"medium",level:"medium",status:"open",owner:"",due:"",workstream:"",mitigation:""};
  const [risks,setRisks]=useState(()=>lsGet("dh-risks",SAMPLE_RISKS));
  const [form,setForm]=useState(blank);
  const [editing,setEditing]=useState(false);
  function save(d){lsSave("dh-risks",d);setRisks(d);}
  function submit(){
    if(!form.title.trim())return;
    const obj={...form,id:form.id||Date.now()};
    const next=form.id?risks.map(r=>r.id===form.id?obj:r):[obj,...risks];
    save(next);setForm(blank);setEditing(false);
  }
  function del(id){save(risks.filter(r=>r.id!==id));}
  function edit(r){setForm(r);setEditing(true);}
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};
  const LH={low:1,medium:2,high:3};
  const matrixColor=(l,i)=>{const s=LH[l]*LH[i];return s>=6?C.red:s>=3?C.orange:C.green;};
  const statusColors={open:C.orange,mitigated:C.blue,escalated:C.red,closed:C.green};
  const [filterStatus,setFilterStatus]=useState("all");
  const [filterWs,setFilterWs]=useState("all");
  const shown=risks.filter(r=>(filterStatus==="all"||r.status===filterStatus)&&(filterWs==="all"||r.workstream===filterWs));
  return(
    <div style={{maxWidth:960}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>⚠️ Risk Log</div>
        <div style={{fontSize:12,color:C.t3}}>Track risks with likelihood × impact matrix</div></div>
        <button onClick={()=>{setForm(blank);setEditing(true);}} style={{padding:"8px 16px",borderRadius:9,border:"none",background:C.red,color:"#fff",fontSize:12,fontWeight:700}}>+ Add Risk</button>
      </div>
      {/* Matrix legend */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{fontSize:11,fontWeight:700,color:C.t2}}>RISK MATRIX:</div>
        {[["High × High","red"],["Med × High or High × Med","orange"],["Low × Low or Med × Med","green"]].map(([l,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:C[c],display:"inline-block"}}/><span style={{fontSize:10,color:C.t2}}>{l}</span></div>
        ))}
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <select style={{...inp,width:"auto",fontSize:11}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="all">All statuses</option><option value="open">Open</option><option value="mitigated">Mitigated</option><option value="escalated">Escalated</option><option value="closed">Closed</option>
          </select>
          <select style={{...inp,width:"auto",fontSize:11}} value={filterWs} onChange={e=>setFilterWs(e.target.value)}>
            <option value="all">All workstreams</option>{WORKSTREAMS.map(w=><option key={w.id} value={w.id}>{w.label}</option>)}
          </select>
        </div>
      </div>
      {editing&&(
        <div style={{background:C.card,border:`1px solid ${C.red}33`,borderRadius:14,padding:"16px",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:12}}>{form.id?"✎ Edit":"+ New"} Risk</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:9}}>
            <div style={{gridColumn:"1/-1"}}><Lbl>RISK TITLE</Lbl><input style={inp} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="What could go wrong?"/></div>
            <div><Lbl>LIKELIHOOD</Lbl><select style={inp} value={form.likelihood} onChange={e=>setForm(f=>({...f,likelihood:e.target.value}))}>
              <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
            <div><Lbl>IMPACT</Lbl><select style={inp} value={form.impact} onChange={e=>setForm(f=>({...f,impact:e.target.value}))}>
              <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
            <div><Lbl>STATUS</Lbl><select style={inp} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
              <option value="open">Open</option><option value="mitigated">Mitigated</option><option value="escalated">Escalated</option><option value="closed">Closed</option></select></div>
            <div><Lbl>OWNER</Lbl><input list="team" style={inp} value={form.owner} onChange={e=>setForm(f=>({...f,owner:e.target.value}))} placeholder="Who owns this?"/></div>
            <div><Lbl>DUE DATE</Lbl><input type="date" style={inp} value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))}/></div>
            <div><Lbl>WORKSTREAM</Lbl><select style={inp} value={form.workstream} onChange={e=>setForm(f=>({...f,workstream:e.target.value}))}>
              <option value="">General</option>{WORKSTREAMS.map(w=><option key={w.id} value={w.id}>{w.label}</option>)}</select></div>
            <div style={{gridColumn:"1/-1"}}><Lbl>MITIGATION PLAN</Lbl><textarea style={{...inp,resize:"none"}} rows={2} value={form.mitigation} onChange={e=>setForm(f=>({...f,mitigation:e.target.value}))} placeholder="How will you address this risk?"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={submit} style={{padding:"8px 20px",borderRadius:8,border:"none",background:C.red,color:"#fff",fontSize:12,fontWeight:700}}>Save Risk</button>
            <button onClick={()=>{setForm(blank);setEditing(false);}} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {shown.map(r=>{
          const mColor=matrixColor(r.likelihood,r.impact);
          const ws=WORKSTREAMS.find(w=>w.id===r.workstream);
          return(<div key={r.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 15px",borderLeft:`4px solid ${mColor}`,display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{textAlign:"center",flexShrink:0,background:mColor+"15",border:`1px solid ${mColor}33`,borderRadius:9,padding:"8px 10px",minWidth:64}}>
              <div style={{fontSize:9,fontWeight:700,color:mColor,letterSpacing:"0.05em"}}>RISK</div>
              <div style={{fontSize:11,fontWeight:600,color:C.t2,marginTop:2}}>{r.likelihood?.charAt(0).toUpperCase()}×{r.impact?.charAt(0).toUpperCase()}</div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:3}}>{r.title}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:r.mitigation?6:0}}>
                <span style={{fontSize:9,fontWeight:700,color:statusColors[r.status]||C.t3,background:(statusColors[r.status]||C.t3)+"15",padding:"2px 7px",borderRadius:20}}>{r.status?.charAt(0).toUpperCase()+r.status?.slice(1)}</span>
                {r.owner&&<span style={{fontSize:9,color:C.t2,background:C.cream,padding:"2px 7px",borderRadius:20,border:`1px solid ${C.border}`}}>👤 {r.owner}</span>}
                {r.due&&<span style={{fontSize:9,color:isOD(r.due)?C.red:C.t3,padding:"2px 7px",borderRadius:20,background:C.cream,border:`1px solid ${C.border}`,fontWeight:isOD(r.due)?700:400}}>{isOD(r.due)?"⏰ ":""}{fmt(r.due)}</span>}
                {ws&&<span style={{fontSize:9,color:ws.color,background:ws.color+"15",padding:"2px 7px",borderRadius:20}}>{ws.icon} {ws.label}</span>}
              </div>
              {r.mitigation&&<div style={{fontSize:11,color:C.t2,background:C.cream,padding:"6px 9px",borderRadius:7,lineHeight:1.5}}>🛡 {r.mitigation}</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <button onClick={()=>edit(r)} style={{background:"transparent",border:"none",color:C.t3,fontSize:12,padding:"3px 5px"}}>✎</button>
              <button onClick={()=>del(r.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:11,padding:"3px 5px"}}>✕</button>
            </div>
          </div>);
        })}
        {!shown.length&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}>
          <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
          <div style={{fontSize:13,fontWeight:600}}>{risks.length?"No risks match filter":"No risks logged yet"}</div>
        </div>}
      </div>
    </div>
  );
}

// ── ACTION INBOX ──────────────────────────────────────────────────────────────
function ActionInbox({items}{
  const C=useC();
  const [filterWs,setFilterWs]=useState("all");
  const [filterOwner,setFilterOwner]=useState("all");
  const [filterDone,setFilterDone]=useState(false);
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",color:C.text,fontSize:12,outline:"none"};

  // Parse action items from meeting notes fields
  const actions=useMemo(()=>{
    const result=[];
    items.filter(i=>i.status!=="archived").forEach(item=>{
      const raw=(item.actions||"").trim();
      if(!raw)return;
      raw.split("\n").filter(l=>l.trim()).forEach(line=>{
        result.push({
          id:`${item.id}-${line}`,
          text:line.trim(),
          source:item.title,
          sourceDate:item.date,
          workstream:item.workstream||"",
          section:item.section,
          done:item.status==="done",
          itemId:item.id,
        });
      });
    });
    return result.sort((a,b)=>(b.sourceDate||"").localeCompare(a.sourceDate||""));
  },[items]);

  const owners=[...new Set(actions.map(a=>{const m=a.text.match(/^([A-Z]{2,4})\s*[—\-–]/);return m?m[1]:null;}).filter(Boolean))];
  const shown=actions.filter(a=>
    (filterWs==="all"||(a.workstream||"")=== filterWs)&&
    (filterOwner==="all"||a.text.startsWith(filterOwner))&&
    (filterDone||!a.done)
  );
  const wsCounts={};
  actions.forEach(a=>{if(!a.done)wsCounts[a.workstream||"general"]=(wsCounts[a.workstream||"general"]||0)+1;});

  return(
    <div style={{maxWidth:900}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>📥 Action Item Inbox</div>
        <div style={{fontSize:12,color:C.t3}}>Every action item from every meeting — parsed from your notes automatically</div>
      </div>
      {/* Workstream summary chips */}
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
        <div onClick={()=>setFilterWs("all")} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${filterWs==="all"?C.accent:C.border}`,background:filterWs==="all"?C.accent+"12":"transparent",color:filterWs==="all"?C.accent:C.t2,fontSize:11,fontWeight:filterWs==="all"?700:400,cursor:"pointer"}}>
          All <span style={{fontWeight:700}}>{actions.filter(a=>!a.done).length}</span>
        </div>
        {WORKSTREAMS.filter(w=>wsCounts[w.id]).map(w=>(
          <div key={w.id} onClick={()=>setFilterWs(filterWs===w.id?"all":w.id)}
            style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${filterWs===w.id?w.color:C.border}`,background:filterWs===w.id?w.color+"12":"transparent",color:filterWs===w.id?w.color:C.t2,fontSize:11,fontWeight:filterWs===w.id?700:400,cursor:"pointer"}}>
            {w.icon} {w.label} <span style={{fontWeight:700}}>{wsCounts[w.id]}</span>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {owners.length>0&&<select style={{...inp,width:"auto"}} value={filterOwner} onChange={e=>setFilterOwner(e.target.value)}>
          <option value="all">All owners</option>{owners.map(o=><option key={o} value={o}>{o}</option>)}
        </select>}
        <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.t2,cursor:"pointer"}}>
          <input type="checkbox" checked={filterDone} onChange={e=>setFilterDone(e.target.checked)}/> Show completed
        </label>
        <span style={{fontSize:11,color:C.t3,marginLeft:"auto"}}>{shown.length} action{shown.length!==1?"s":""}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {shown.map(a=>{
          const sec=getSec(a.section);
          const ws=WORKSTREAMS.find(w=>w.id===a.workstream);
          return(<div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start",opacity:a.done?0.6:1}}>
            <span style={{color:sec.color,fontSize:12,flexShrink:0,marginTop:1}}>{sec.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,color:a.done?C.t3:C.text,textDecoration:a.done?"line-through":"none",lineHeight:1.5}}>{a.text}</div>
              <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                <span style={{fontSize:9,color:C.t3,background:C.cream,padding:"1px 6px",borderRadius:20,border:`1px solid ${C.border}`}}>📝 {a.source?.slice(0,40)}</span>
                {ws&&<span style={{fontSize:9,color:ws.color,background:ws.color+"10",padding:"1px 6px",borderRadius:20}}>{ws.icon} {ws.label}</span>}
                {a.sourceDate&&<span style={{fontSize:9,color:C.t3}}>{fmt(a.sourceDate)}</span>}
              </div>
            </div>
          </div>);
        })}
        {!shown.length&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}>
          <div style={{fontSize:32,marginBottom:8}}>📥</div>
          <div style={{fontSize:13,fontWeight:600}}>No action items {filterWs!=="all"?"in this workstream":""}</div>
          <div style={{fontSize:12,marginTop:4}}>Action items are parsed from the "Action Items" field in your meeting notes</div>
        </div>}
      </div>
    </div>
  );
}

// ── LINK HUB ──────────────────────────────────────────────────────────────────
function LinkHub({customize,setCustomize}{
  const C=useC();
  const [editWs,setEditWs]=useState(null);
  const [newLink,setNewLink]=useState({name:"",url:""});
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};
  const allWs=[...WORKSTREAMS,...(customize.workstreams||[])];
  function getLinks(wsId){return (customize.links||{})[wsId]||[];}
  function setLinks(wsId,links){setCustomize(c=>({...c,links:{...(c.links||{}),[wsId]:links}}));}
  function addLink(wsId){
    if(!newLink.name.trim()||!newLink.url.trim())return;
    const url=newLink.url.startsWith("http")?newLink.url:"https://"+newLink.url;
    setLinks(wsId,[...getLinks(wsId),{id:Date.now(),name:newLink.name.trim(),url}]);
    setNewLink({name:"",url:""});
  }
  function delLink(wsId,id){setLinks(wsId,getLinks(wsId).filter(l=>l.id!==id));}
  const QUICK=[
    {name:"Jira Board",url:"https://jira.com",icon:"⬡"},
    {name:"SharePoint",url:"https://sharepoint.com",icon:"📁"},
    {name:"Teams Channel",url:"https://teams.microsoft.com",icon:"💬"},
    {name:"Outlook",url:"https://outlook.office.com",icon:"📧"},
  ];
  return(
    <div style={{maxWidth:900}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>🔗 Link Hub</div>
        <div style={{fontSize:12,color:C.t3}}>All your SharePoint, Jira, Teams, and other links organized by workstream</div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:700,color:C.t3,marginBottom:10}}>⚡ QUICK LINKS</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {QUICK.map(q=><a key={q.name} href={q.url} target="_blank" rel="noopener noreferrer"
            style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:C.cream,color:C.accent,fontSize:12,fontWeight:600,textDecoration:"none"}}>
            <span>{q.icon}</span>{q.name}
          </a>)}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {allWs.map(ws=>{
          const links=[...(ws.defaultLinks||[]),...getLinks(ws.id)];
          const isOpen=editWs===ws.id;
          return(<div key={ws.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"11px 14px",background:ws.color+"0d",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:14}}>{ws.icon}</span>
              <div style={{flex:1,fontSize:12,fontWeight:700,color:C.text}}>{ws.label}</div>
              <button onClick={()=>setEditWs(isOpen?null:ws.id)} style={{background:"transparent",border:"none",color:C.accent,fontSize:11,fontWeight:600}}>+ Link</button>
            </div>
            <div style={{padding:"10px 14px"}}>
              {links.map((l,i)=><div key={l.id||i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                <a href={l.url} target="_blank" rel="noopener noreferrer"
                  style={{flex:1,fontSize:12,color:C.accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{l.name}</a>
                {l.id&&<button onClick={()=>delLink(ws.id,l.id)} style={{background:"transparent",border:"none",color:C.t3,fontSize:10,flexShrink:0}}>✕</button>}
              </div>)}
              {!links.length&&<div style={{fontSize:11,color:C.t3}}>No links yet</div>}
              {isOpen&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                <input style={{...inp,marginBottom:5}} value={newLink.name} onChange={e=>setNewLink(l=>({...l,name:e.target.value}))} placeholder="Link name (e.g. Jira Board)"/>
                <input style={{...inp,marginBottom:6}} value={newLink.url} onChange={e=>setNewLink(l=>({...l,url:e.target.value}))} placeholder="https://…"/>
                <button onClick={()=>addLink(ws.id)} style={{padding:"5px 12px",borderRadius:7,border:"none",background:C.accent,color:"#fff",fontSize:11,fontWeight:600}}>Add</button>
              </div>}
            </div>
          </div>);
        })}
      </div>
    </div>
  );
}

// ── DEPENDENCIES ──────────────────────────────────────────────────────────────
function Dependencies({items,onEdit}{
  const C=useC();
  const active=items.filter(i=>i.status!=="archived");
  const [sel,setSel]=useState(null);
  const [newDep,setNewDep]=useState("");
  const [myItems,setMyItems]=useState(()=>lsGet("dh-deps",{}));
  function saveDeps(d){lsSave("dh-deps",d);setMyItems(d);}
  function addDep(fromId,toId){
    if(!toId||fromId===toId)return;
    const curr=myItems[fromId]||[];
    if(curr.includes(toId))return;
    saveDeps({...myItems,[fromId]:[...curr,toId]});
    setNewDep("");
  }
  function removeDep(fromId,toId){saveDeps({...myItems,[fromId]:(myItems[fromId]||[]).filter(id=>id!==toId)});}
  const blocked=active.filter(i=>i.status==="blocked");
  const withDeps=active.filter(i=>(myItems[i.id]||[]).length>0);
  const selItem=active.find(i=>i.id===sel);
  const selDeps=(myItems[sel]||[]).map(id=>active.find(i=>i.id===id)).filter(Boolean);
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};
  return(
    <div style={{maxWidth:900}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>🕸️ Dependencies</div>
        <div style={{fontSize:12,color:C.t3}}>See what's blocking what across your workstreams</div>
      </div>
      <div className="two-col" style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:14,alignItems:"start"}}>
        {/* Item picker */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t3,marginBottom:8}}>SELECT ITEM</div>
          <div style={{maxHeight:400,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {active.map(i=>{
              const sec=getSec(i.section);
              const depCount=(myItems[i.id]||[]).length;
              const isBlocking=Object.entries(myItems).filter(([k,v])=>v.includes(i.id)&&k!==String(i.id)).length;
              return(<button key={i.id} onClick={()=>setSel(i.id===sel?null:i.id)}
                style={{textAlign:"left",padding:"7px 9px",borderRadius:8,border:`1px solid ${sel===i.id?C.accent:C.border}`,background:sel===i.id?C.accent+"0f":"transparent",display:"flex",gap:7,alignItems:"center"}}>
                <span style={{color:sec.color,fontSize:11,flexShrink:0}}>{sec.icon}</span>
                <span style={{fontSize:11,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.title}</span>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  {depCount>0&&<span style={{fontSize:8,fontWeight:700,background:C.orange+"18",color:C.orange,padding:"1px 4px",borderRadius:9}} title="Blocks">↓{depCount}</span>}
                  {isBlocking>0&&<span style={{fontSize:8,fontWeight:700,background:C.red+"18",color:C.red,padding:"1px 4px",borderRadius:9}} title="Blocked by">⛔{isBlocking}</span>}
                </div>
              </button>);
            })}
          </div>
        </div>
        {/* Dependency detail */}
        <div>
          {!selItem&&(
            <div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px",textAlign:"center",color:C.t3,marginBottom:14}}>
                <div style={{fontSize:24,marginBottom:6}}>🕸️</div>
                <div style={{fontSize:12}}>Select an item on the left to view or add dependencies</div>
              </div>
              {blocked.length>0&&<div style={{background:C.card,border:`1px solid ${C.red}33`,borderRadius:12,padding:"14px 16px",borderLeft:`3px solid ${C.red}`}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:10}}>⛔ Currently Blocked ({blocked.length})</div>
                {blocked.map(i=>{const sec=getSec(i.section);return(<div key={i.id} onClick={()=>onEdit(i)} style={{display:"flex",gap:7,alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                  <span style={{color:sec.color}}>{sec.icon}</span>
                  <span style={{fontSize:12,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.title}</span>
                  <span style={{fontSize:9,color:C.t3}}>{i.workstream||""}</span>
                </div>);})}
              </div>}
            </div>
          )}
          {selItem&&(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px"}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:3}}>{selItem.title}</div>
              <div style={{fontSize:11,color:C.t3,marginBottom:14}}>{getSec(selItem.section).icon} {getSec(selItem.section).label} · {selItem.workstream||"No workstream"}</div>
              <div style={{fontSize:11,fontWeight:700,color:C.t2,marginBottom:8}}>🔗 This item depends on / is blocked by:</div>
              {selDeps.map(dep=>{
                const sec=getSec(dep.section);
                return(<div key={dep.id} style={{display:"flex",gap:8,alignItems:"center",padding:"7px 9px",background:dep.status==="blocked"?"#fef2f2":C.cream,borderRadius:8,marginBottom:5,border:`1px solid ${dep.status==="blocked"?C.red+"33":C.border}`}}>
                  <span style={{color:sec.color,fontSize:11}}>{sec.icon}</span>
                  <span style={{fontSize:12,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dep.title}</span>
                  <Tag c={getStat(dep.status).dot} label={getStat(dep.status).label}/>
                  <button onClick={()=>onEdit(dep)} style={{background:"transparent",border:"none",color:C.t3,fontSize:11,padding:"2px 4px"}}>✎</button>
                  <button onClick={()=>removeDep(sel,dep.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:11,padding:"2px 4px"}}>✕</button>
                </div>);
              })}
              {!selDeps.length&&<div style={{fontSize:11,color:C.t3,marginBottom:10}}>No dependencies linked yet</div>}
              <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,fontWeight:700,color:C.t3,marginBottom:6}}>ADD DEPENDENCY</div>
                <div style={{display:"flex",gap:7}}>
                  <select style={{...inp}} value={newDep} onChange={e=>setNewDep(e.target.value)}>
                    <option value="">Select an item this depends on…</option>
                    {active.filter(i=>i.id!==sel&&!(myItems[sel]||[]).includes(i.id)).map(i=><option key={i.id} value={i.id}>{i.title?.slice(0,60)}</option>)}
                  </select>
                  <button onClick={()=>addDep(sel,parseInt(newDep)||newDep)} style={{padding:"7px 14px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>Link</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SPRINT TRACKER ────────────────────────────────────────────────────────────
function SprintTracker({items,onConfetti}){
  const C=useC();
  const [sprints,setSprints]=useState(()=>lsGet("dh-sprints",[]));
  const [showNew,setShowNew]=useState(false);
  const [form,setForm]=useState({name:"",start:today(),end:"",goal:""});
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};

  function save(d){lsSave("dh-sprints",d);setSprints(d);}
  function addSprint(){
    if(!form.name.trim())return;
    // auto end = start + 14 days if blank
    let end=form.end;
    if(!end){const d=new Date(form.start+"T00:00:00");d.setDate(d.getDate()+13);end=ymdFromDateLocal(d);}
    save([...sprints,{id:Date.now(),...form,end,items:[],status:"active"}]);
    setForm({name:"",start:today(),end:"",goal:""});setShowNew(false);
  }
  function deleteSprint(id){save(sprints.filter(s=>s.id!==id));}
  function toggleItem(sprintId,itemId){
    save(sprints.map(s=>{
      if(s.id!==sprintId)return s;
      const has=s.items.includes(itemId);
      return{...s,items:has?s.items.filter(i=>i!==itemId):[...s.items,itemId]};
    }));
  }
  function closeSprint(id){save(sprints.map(s=>s.id===id?{...s,status:"closed"}:s));}

  const active=items.filter(i=>i.status!=="archived");
  const td=today();

  return(
    <div style={{maxWidth:900}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>🏃 Sprint Tracker</div>
          <div style={{fontSize:12,color:C.t3}}>2-week sprints with progress tracking</div>
        </div>
        <button onClick={()=>setShowNew(true)} style={{padding:"8px 16px",borderRadius:9,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>+ New Sprint</button>
      </div>

      {showNew&&(
        <div style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:12}}>New Sprint</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:9}}>
            <div><Lbl>SPRINT NAME</Lbl><input style={inp} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Sprint 12 — SQR Push"/></div>
            <div><Lbl>START DATE</Lbl><input type="date" style={inp} value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))}/></div>
            <div><Lbl>END DATE <span style={{fontWeight:400,color:C.t3}}>(blank = +14 days)</span></Lbl><input type="date" style={inp} value={form.end} onChange={e=>setForm(f=>({...f,end:e.target.value}))}/></div>
            <div style={{gridColumn:"1/-1"}}><Lbl>SPRINT GOAL</Lbl><input style={inp} value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} placeholder="What does success look like?"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={addSprint} style={{padding:"7px 18px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>Create Sprint</button>
            <button onClick={()=>setShowNew(false)} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}

      {!sprints.length&&!showNew&&(
        <div style={{textAlign:"center",padding:"50px 0",color:C.t3}}>
          <div style={{fontSize:36,marginBottom:8}}>🏃</div>
          <div style={{fontSize:13,fontWeight:600}}>No sprints yet</div>
          <div style={{fontSize:12,marginTop:4}}>Create a sprint to group items into 2-week cycles</div>
        </div>
      )}

      {sprints.map(sprint=>{
        const sprintItems=sprint.items.map(id=>active.find(i=>i.id===id)).filter(Boolean);
        const done=sprintItems.filter(i=>i.status==="done").length;
        const total=sprintItems.length;
        const pct=total?Math.round((done/total)*100):0;
        const daysLeft=sprint.end?Math.ceil((new Date(sprint.end+"T00:00:00")-new Date(td+"T00:00:00"))/86400000):null;
        const isActive=sprint.status==="active";
        const inProgress=sprintItems.filter(i=>i.status==="inprogress").length;
        const blocked=sprintItems.filter(i=>i.status==="blocked").length;
        return(
          <div key={sprint.id} style={{background:C.card,border:`1px solid ${isActive?C.accent+"44":C.border}`,borderRadius:14,padding:16,marginBottom:14,borderTop:`3px solid ${isActive?C.accent:C.t3}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{sprint.name}</div>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,background:isActive?C.green+"18":C.t3+"18",color:isActive?C.green:C.t3}}>{isActive?"ACTIVE":"CLOSED"}</span>
                </div>
                {sprint.goal&&<div style={{fontSize:11,color:C.t3,marginTop:2}}>🎯 {sprint.goal}</div>}
                <div style={{fontSize:10,color:C.t3,marginTop:2}}>{fmt(sprint.start)} → {fmt(sprint.end)}{daysLeft!==null&&isActive&&<span style={{marginLeft:6,fontWeight:700,color:daysLeft<=2?C.red:daysLeft<=5?C.orange:C.t3}}>{daysLeft<=0?"Ended":daysLeft===1?"1 day left":`${daysLeft} days left`}</span>}</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {isActive&&<button onClick={()=>closeSprint(sprint.id)} style={{padding:"5px 11px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:11}}>Close Sprint</button>}
                <button onClick={()=>deleteSprint(sprint.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:12}}>✕</button>
              </div>
            </div>

            {/* Progress bar */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:C.t2,fontWeight:600}}>{done}/{total} done ({pct}%)</span>
                <div style={{display:"flex",gap:10,fontSize:10,color:C.t3}}>
                  {inProgress>0&&<span style={{color:C.blue}}>● {inProgress} in progress</span>}
                  {blocked>0&&<span style={{color:C.red}}>⛔ {blocked} blocked</span>}
                </div>
              </div>
              <div style={{height:8,background:C.bg,borderRadius:4,overflow:"hidden"}}>
                <div style={{height:8,width:`${pct}%`,background:`linear-gradient(90deg,${C.accent},${C.green})`,borderRadius:4,transition:"width .5s"}}/>
              </div>
            </div>

            {/* Sprint items */}
            {sprintItems.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                {sprintItems.map(item=>{
                  const sec=getSec(item.section);const pri=getPri(item.priority);const sta=getStat(item.status);
                  return(<div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:7,background:C.cream,border:`1px solid ${C.border}`}}>
                    <span style={{color:sec.color,fontSize:11,flexShrink:0}}>{sec.icon}</span>
                    <span style={{flex:1,fontSize:12,color:item.status==="done"?C.t3:C.text,textDecoration:item.status==="done"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</span>
                    <span style={{fontSize:9,color:sta.dot,background:sta.dot+"18",padding:"1px 6px",borderRadius:20,flexShrink:0}}>● {sta.label}</span>
                    <Tag c={pri.color} label={pri.label}/>
                    {isActive&&<button onClick={()=>toggleItem(sprint.id,item.id)} title="Remove from sprint" style={{background:"transparent",border:"none",color:C.t3,fontSize:10,flexShrink:0}}>✕</button>}
                  </div>);
                })}
              </div>
            )}

            {/* Add items to sprint */}
            {isActive&&(
              <details style={{fontSize:11}}>
                <summary style={{cursor:"pointer",color:C.accent,fontWeight:600,userSelect:"none"}}>+ Add items to sprint ({active.filter(i=>!sprint.items.includes(i.id)&&i.status!=="done").length} available)</summary>
                <div style={{marginTop:8,maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
                  {active.filter(i=>!sprint.items.includes(i.id)&&i.status!=="done").map(item=>{
                    const sec=getSec(item.section);
                    return(<div key={item.id} onClick={()=>toggleItem(sprint.id,item.id)}
                      style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",borderRadius:6,cursor:"pointer",background:C.bg,border:`1px solid ${C.border}`}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.accent+"0f"}
                      onMouseLeave={e=>e.currentTarget.style.background=C.bg}>
                      <span style={{color:sec.color,fontSize:11}}>{sec.icon}</span>
                      <span style={{flex:1,fontSize:11,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</span>
                      <span style={{fontSize:9,color:C.accent,fontWeight:700}}>+ Add</span>
                    </div>);
                  })}
                </div>
              </details>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── STATUS REPORT ─────────────────────────────────────────────────────────────
function StatusReport({items,decisions,todos}{
  const C=useC();
  const [from,setFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return ymdFromDateLocal(d);});
  const [to,setTo]=useState(today);
  const [copied,setCopied]=useState(false);
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none"};

  const report=useMemo(()=>{
    const active=items.filter(i=>i.status!=="archived");
    const inRange=i=>(i.date||i.startDate||"")>=from&&(i.date||i.startDate||"")<=to;

    const completed=active.filter(i=>i.status==="done"&&inRange(i));
    const carries=active.filter(i=>i.status!=="done"&&i.carryOver&&(i.startDate||i.date||"")<from);
    const decsMade=decisions.filter(d=>d.date>=from&&d.date<=to);
    const risks=lsGet("dh-risks",[]).filter(r=>r.status==="open"||(r.date||"")>=from);
    const newRisks=risks.filter(r=>r.status==="open");

    // Action items by owner from meeting notes in range
    const actionLines=[];
    active.filter(inRange).forEach(item=>{
      (item.actions||"").split("\n").filter(l=>l.trim()).forEach(line=>{
        const m=line.match(/^([A-Z]{2,5})\s*[—\-–:]/);
        actionLines.push({owner:m?m[1]:"Unassigned",text:line.trim(),source:item.title});
      });
    });
    const byOwner={};
    actionLines.forEach(a=>{if(!byOwner[a.owner])byOwner[a.owner]=[];byOwner[a.owner].push(a.text);});

    // Workstream health
    const wsHealth=WORKSTREAMS.map(ws=>{
      const wsItems=active.filter(i=>(i.workstream||"")===ws.id);
      const open=wsItems.filter(i=>i.status!=="done").length;
      const od=wsItems.filter(i=>i.status!=="done"&&isOD(i.due)).length;
      return{...ws,open,od,total:wsItems.length};
    }).filter(w=>w.total>0);

    return{completed,carries,decsMade,newRisks,byOwner,wsHealth};
  },[items,decisions,from,to]);

  function buildText(){
    const lines=[];
    const fmtRange=`${fmt(from)} – ${fmt(to)}`;
    lines.push(`📊 STATUS REPORT — ${fmtRange}`);
    lines.push("=".repeat(50));

    if(report.completed.length){
      lines.push("\n✅ COMPLETED");
      report.completed.forEach(i=>lines.push(`  • [${(WORKSTREAMS.find(w=>w.id===i.workstream)||{label:i.workstream||"General"}).label}] ${i.title}`));
    }

    if(report.decsMade.length){
      lines.push("\n⚖ DECISIONS MADE");
      report.decsMade.forEach(d=>lines.push(`  • ${d.text} (${d.meeting})`));
    }

    if(report.newRisks.length){
      lines.push("\n⚠️ OPEN RISKS");
      report.newRisks.forEach(r=>lines.push(`  • [${r.likelihood?.toUpperCase()}×${r.impact?.toUpperCase()}] ${r.title}${r.owner?` — Owner: ${r.owner}`:""}`));
    }

    if(Object.keys(report.byOwner).length){
      lines.push("\n⚡ ACTION ITEMS BY OWNER");
      Object.entries(report.byOwner).forEach(([owner,actions])=>{
        lines.push(`  ${owner}:`);
        actions.forEach(a=>lines.push(`    - ${a}`));
      });
    }

    if(report.carries.length){
      lines.push("\n↻ CARRY-OVERS (still open)");
      report.carries.forEach(i=>lines.push(`  • ${i.title}${i.due?` — Due: ${fmt(i.due)}`:""}`));
    }

    if(report.wsHealth.length){
      lines.push("\n🏥 WORKSTREAM HEALTH");
      report.wsHealth.forEach(w=>{
        const status=w.od>0?"⛔ Overdue":w.open>5?"⚠️ Busy":"✅ On track";
        lines.push(`  ${w.icon} ${w.label}: ${status} (${w.open} open${w.od>0?`, ${w.od} overdue`:""})`);
      });
    }

    lines.push(`\nGenerated ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}`);
    return lines.join("\n");
  }

  function copy(){
    navigator.clipboard?.writeText(buildText()).catch(()=>{});
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  }

  const r=report;
  return(
    <div style={{maxWidth:860}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>📋 Status Report</div>
          <div style={{fontSize:12,color:C.t3}}>Auto-generated from your cards, decisions, risks & notes</div>
        </div>
        <button onClick={copy} style={{padding:"9px 20px",borderRadius:9,border:"none",background:copied?C.green:C.accent,color:"#fff",fontSize:13,fontWeight:700,transition:"background .2s"}}>
          {copied?"✓ Copied!":"📋 Copy Plain Text"}
        </button>
      </div>

      {/* Date range picker */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:600,color:C.t2}}>Date range:</span>
        <input type="date" style={{...inp,width:"auto"}} value={from} onChange={e=>setFrom(e.target.value)}/>
        <span style={{color:C.t3,fontSize:12}}>→</span>
        <input type="date" style={{...inp,width:"auto"}} value={to} onChange={e=>setTo(e.target.value)}/>
        {[["Last 7 days",7],["Last 14 days",14],["Last 30 days",30]].map(([l,d])=>(
          <button key={l} onClick={()=>{const s=new Date();s.setDate(s.getDate()-d);setFrom(ymdFromDateLocal(s));setTo(today());}}
            style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.accent,fontSize:11,fontWeight:600}}>{l}</button>
        ))}
      </div>

      {/* Report preview */}
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        {[
          {icon:"✅",label:"Completed",count:r.completed.length,color:C.green,
            children:r.completed.map(i=><div key={i.id} style={{fontSize:12,color:C.text,padding:"4px 0",borderBottom:`1px solid ${C.border}`,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><span style={{color:C.t3,fontSize:10,marginRight:5}}>[{(WORKSTREAMS.find(w=>w.id===i.workstream)||{label:i.workstream||"General"}).label}]</span>{i.title}</div>)},
          {icon:"⚖",label:"Decisions Made",count:r.decsMade.length,color:C.purple,
            children:r.decsMade.map(d=><div key={d.id} style={{fontSize:12,color:C.text,padding:"3px 0",borderBottom:`1px solid ${C.border}`}}>{d.text}<span style={{color:C.t3,fontSize:10,marginLeft:5}}>— {d.meeting}</span></div>)},
          {icon:"⚠️",label:"Open Risks",count:r.newRisks.length,color:C.red,
            children:r.newRisks.map(r=><div key={r.id} style={{fontSize:12,color:C.text,padding:"3px 0",borderBottom:`1px solid ${C.border}`,display:"flex",gap:6}}><span style={{fontSize:9,fontWeight:700,color:C.red,background:C.red+"15",padding:"1px 6px",borderRadius:9,flexShrink:0}}>{r.likelihood?.charAt(0).toUpperCase()}×{r.impact?.charAt(0).toUpperCase()}</span>{r.title}</div>)},
          {icon:"↻",label:"Carry-overs",count:r.carries.length,color:C.orange,
            children:r.carries.map(i=><div key={i.id} style={{fontSize:12,color:C.text,padding:"3px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{i.title}</span>{i.due&&<span style={{fontSize:10,color:isOD(i.due)?C.red:C.t3,flexShrink:0,marginLeft:8}}>{isOD(i.due)?"⏰ ":""}{fmt(i.due)}</span>}</div>)},
        ].map(sec=>(
          <div key={sec.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:9,padding:"11px 16px",background:sec.color+"0a",borderBottom:sec.count?`1px solid ${C.border}`:"none"}}>
              <span style={{fontSize:14}}>{sec.icon}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.text,flex:1}}>{sec.label}</span>
              <span style={{fontSize:12,fontWeight:700,color:sec.color,background:sec.color+"15",padding:"2px 10px",borderRadius:20}}>{sec.count}</span>
            </div>
            {sec.count>0&&<div style={{padding:"8px 16px",maxHeight:180,overflowY:"auto"}}>{sec.children}</div>}
            {sec.count===0&&<div style={{padding:"10px 16px",fontSize:11,color:C.t3}}>Nothing in this period</div>}
          </div>
        ))}

        {/* Action items by owner */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,padding:"11px 16px",background:C.blue+"0a",borderBottom:Object.keys(r.byOwner).length?`1px solid ${C.border}`:"none"}}>
            <span style={{fontSize:14}}>⚡</span>
            <span style={{fontSize:13,fontWeight:700,color:C.text,flex:1}}>Action Items by Owner</span>
            <span style={{fontSize:12,fontWeight:700,color:C.blue,background:C.blue+"15",padding:"2px 10px",borderRadius:20}}>{Object.values(r.byOwner).flat().length}</span>
          </div>
          {Object.keys(r.byOwner).length>0?(
            <div style={{padding:"10px 16px",maxHeight:200,overflowY:"auto"}}>
              {Object.entries(r.byOwner).map(([owner,actions])=>(
                <div key={owner} style={{marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:3}}>👤 {owner}</div>
                  {actions.map((a,i)=><div key={i} style={{fontSize:11,color:C.text,padding:"2px 0 2px 12px",borderLeft:`2px solid ${C.accent}33`}}>— {a}</div>)}
                </div>
              ))}
            </div>
          ):<div style={{padding:"10px 16px",fontSize:11,color:C.t3}}>No action items in this period</div>}
        </div>

        {/* Workstream health */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"11px 16px",background:C.green+"0a",borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700,color:C.text}}>🏥 Workstream Health</div>
          <div style={{padding:"10px 16px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8}}>
            {r.wsHealth.map(w=>{
              const hColor=w.od>0?C.red:w.open>5?C.orange:C.green;
              const hLabel=w.od>0?"Overdue":w.open>5?"Busy":"On track";
              return(<div key={w.id} style={{background:hColor+"0a",border:`1px solid ${hColor}22`,borderRadius:8,padding:"8px 10px",borderLeft:`3px solid ${hColor}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.text,marginBottom:2}}>{w.icon} {w.label}</div>
                <div style={{fontSize:10,color:hColor,fontWeight:600}}>{hLabel} · {w.open} open{w.od>0?` · ${w.od} OD`:""}</div>
              </div>);
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── END-OF-DAY WRAP-UP ────────────────────────────────────────────────────────
function EndOfDay({items,todos,onClose,onCarryOver,onMarkDone}{
  const C=useC();
  const td=today();
  const active=items.filter(i=>i.status!=="archived"&&i.status!=="done");
  const todayTodos=todos.filter(t=>t.date===td);
  const doneTodos=todayTodos.filter(t=>t.done);
  const undoneTodos=todayTodos.filter(t=>!t.done);
  const urgentOpen=active.filter(i=>["urgent","high"].includes(i.priority));
  const [wins,setWins]=useState("");
  const [carries,setCarries]=useState(undoneTodos.map(t=>t.id));
  const [saved,setSaved]=useState(false);

  function toggleCarry(id){setCarries(c=>c.includes(id)?c.filter(x=>x!==id):[...c,id]);}

  function finish(){
    // Mark unchosen todos as done, carry chosen ones to tomorrow
    const tom=new Date();tom.setDate(tom.getDate()+1);
    const tomStr=ymdFromDateLocal(tom);
    const updated=todos.map(t=>{
      if(t.date!==td||t.done)return t;
      if(carries.includes(t.id))return{...t,date:tomStr,carriedFrom:td};
      return{...t,done:true};
    });
    onCarryOver(updated);
    setSaved(true);
    setTimeout(onClose,1400);
  }

  const hour=new Date().getHours();
  const greeting=hour>=17?"Great work today 🌆":"Wrapping up early? 🌤";

  return(
    <div style={{position:"fixed",inset:0,background:"#0000007a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:16}}>
      <div className="modal-in" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:0,width:"100%",maxWidth:520,boxShadow:"0 24px 60px #0003",overflow:"hidden"}}>
        {/* Header */}
        <div style={{background:`linear-gradient(135deg,${C.accent},${C.purple})`,padding:"22px 24px"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#fff",marginBottom:4}}>🌙 End of Day</div>
          <div style={{fontSize:13,color:"#ffffff99"}}>{greeting} — {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        </div>

        <div style={{padding:"20px 24px",maxHeight:"65vh",overflowY:"auto"}}>
          {/* Stats row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
            {[
              {label:"Tasks done",val:doneTodos.length,color:C.green},
              {label:"Tasks left",val:undoneTodos.length,color:C.orange},
              {label:"Open items",val:urgentOpen.length,color:C.red},
            ].map(s=>(
              <div key={s.label} style={{background:s.color+"0f",border:`1px solid ${s.color}33`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:s.color}}>{s.val}</div>
                <div style={{fontSize:10,color:C.t2,fontWeight:600}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Win of the day */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>🏆 Win of the day <span style={{fontWeight:400,color:C.t3}}>(optional)</span></div>
            <textarea value={wins} onChange={e=>setWins(e.target.value)} placeholder="What went well? What are you proud of?" rows={2}
              style={{width:"100%",background:C.cream,border:`1px solid ${C.border}`,borderRadius:9,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",resize:"none",lineHeight:1.6}}/>
          </div>

          {/* Carry over tasks */}
          {undoneTodos.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>↻ Carry to tomorrow? <span style={{fontWeight:400,color:C.t3}}>Unchecked = mark done</span></div>
              {undoneTodos.map(t=>(
                <div key={t.id} onClick={()=>toggleCarry(t.id)}
                  style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:8,marginBottom:4,background:carries.includes(t.id)?C.accent+"0f":C.cream,border:`1px solid ${carries.includes(t.id)?C.accent:C.border}`,cursor:"pointer"}}>
                  <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${carries.includes(t.id)?C.accent:C.border}`,background:carries.includes(t.id)?C.accent:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {carries.includes(t.id)&&<span style={{color:"#fff",fontSize:9}}>↻</span>}
                  </div>
                  <span style={{fontSize:12,color:C.text,flex:1}}>{t.text}</span>
                  <span style={{fontSize:10,color:carries.includes(t.id)?C.accent:C.t3,fontWeight:600}}>{carries.includes(t.id)?"Carry":"Done"}</span>
                </div>
              ))}
            </div>
          )}

          {/* Urgent still open */}
          {urgentOpen.length>0&&(
            <div style={{background:C.red+"0a",border:`1px solid ${C.red}22`,borderRadius:10,padding:"12px 14px",marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:C.red,marginBottom:8}}>⚠️ Still open tomorrow</div>
              {urgentOpen.slice(0,4).map(i=>(
                <div key={i.id} style={{fontSize:12,color:C.text,padding:"3px 0",borderBottom:`1px solid ${C.red}15`,display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{color:getSec(i.section).color}}>{getSec(i.section).icon}</span>
                  <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.title}</span>
                  <Tag c={getPri(i.priority).color} label={getPri(i.priority).label}/>
                </div>
              ))}
            </div>
          )}
        </div>

        {saved?(
          <div style={{padding:"16px 24px",textAlign:"center",fontSize:14,fontWeight:600,color:C.green}}>✅ All wrapped up — see you tomorrow!</div>
        ):(
          <div style={{padding:"16px 24px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10}}>
            <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:13}}>Skip</button>
            <button onClick={finish} style={{flex:2,padding:"10px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"#fff",fontSize:13,fontWeight:700}}>Wrap up & carry over ↻</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CUSTOMIZE ─────────────────────────────────────────────────────────────────
function Customize({customize, setCustomize}){
  const C=useC();
  // customize = { team:[], workstreams:[], sections:[], templates:[] }
  const C2 = C;
  const inp = { width:"100%", background:C2.cream, border:`1px solid ${C2.border}`, borderRadius:8, padding:"8px 11px", color:C2.text, fontSize:13, outline:"none" };
  const SECTION_COLORS = [C2.blue, C2.purple, C2.green, C2.yellow, C2.red, "#14b8a6", "#ec4899", "#64748b", C2.orange, "#8b5cf6"];
  const ICONS = ["◈","◉","◆","◇","◎","◑","◷","★","●","▲","♦","✦"];

  // ── TEAM ──
  const [newMember, setNewMember] = useState("");
  function addMember() {
    const v = newMember.trim();
    if (!v || customize.team.includes(v)) return;
    setCustomize(c => ({ ...c, team: [...c.team, v] }));
    setNewMember("");
  }
  function delMember(name) { setCustomize(c => ({ ...c, team: c.team.filter(t => t !== name) })); }

  // ── WORKSTREAMS ──
  const [wsForm, setWsForm] = useState({ id:"", label:"", icon:"📁", color:"#5b5bd6" });
  const [editWsId, setEditWsId] = useState(null);
  function saveWs() {
    const id = (wsForm.id || wsForm.label).toUpperCase().replace(/\s+/g,"_").slice(0,20);
    if (!wsForm.label.trim()) return;
    const obj = { id, label: wsForm.label.trim(), icon: wsForm.icon||"📁", color: wsForm.color||"#5b5bd6", defaultLinks:[] };
    if (editWsId) {
      setCustomize(c => ({ ...c, workstreams: c.workstreams.map(w => w.id===editWsId ? {...obj,id:editWsId} : w) }));
      setEditWsId(null);
    } else {
      setCustomize(c => ({ ...c, workstreams: [...c.workstreams, obj] }));
    }
    setWsForm({ id:"", label:"", icon:"📁", color:"#5b5bd6" });
  }
  function editWs(w) { setWsForm({ id:w.id, label:w.label, icon:w.icon, color:w.color }); setEditWsId(w.id); }
  function delWs(id) { setCustomize(c => ({ ...c, workstreams: c.workstreams.filter(w => w.id!==id) })); }

  // ── SECTIONS ──
  const [secForm, setSecForm] = useState({ id:"", label:"", icon:"◈", color:C2.blue, tag:"" });
  const [editSecId, setEditSecId] = useState(null);
  function saveSec() {
    const id = (secForm.id || secForm.label).toLowerCase().replace(/\s+/g,"_").slice(0,20);
    if (!secForm.label.trim()) return;
    const obj = { id, label:secForm.label.trim(), icon:secForm.icon||"◈", color:secForm.color||C2.blue, tag:secForm.tag||secForm.label };
    if (editSecId) {
      setCustomize(c => ({ ...c, sections: c.sections.map(s => s.id===editSecId ? {...obj,id:editSecId} : s) }));
      setEditSecId(null);
    } else {
      setCustomize(c => ({ ...c, sections: [...c.sections, obj] }));
    }
    setSecForm({ id:"", label:"", icon:"◈", color:C2.blue, tag:"" });
  }
  function editSec(s) { setSecForm({ id:s.id, label:s.label, icon:s.icon, color:s.color, tag:s.tag||"" }); setEditSecId(s.id); }
  function delSec(id) { setCustomize(c => ({ ...c, sections: c.sections.filter(s => s.id!==id) })); }

  // ── TEMPLATES ──
  const blankTmpl = { id:"", label:"", section:"supervisor", title:"", attendees:"", agenda:"" };
  const [tmplForm, setTmplForm] = useState(blankTmpl);
  const [editTmplId, setEditTmplId] = useState(null);
  function saveTmpl() {
    if (!tmplForm.label.trim()) return;
    const id = tmplForm.id || ("t_" + Date.now());
    const obj = { id, label:tmplForm.label.trim(), section:tmplForm.section, title:tmplForm.title.trim(), attendees:tmplForm.attendees.trim(), agenda:tmplForm.agenda.trim() };
    if (editTmplId) {
      setCustomize(c => ({ ...c, templates: c.templates.map(t => t.id===editTmplId ? obj : t) }));
      setEditTmplId(null);
    } else {
      setCustomize(c => ({ ...c, templates: [...c.templates, obj] }));
    }
    setTmplForm(blankTmpl);
  }
  function editTmpl(t) { setTmplForm({...t}); setEditTmplId(t.id); }
  function delTmpl(id) { setCustomize(c => ({ ...c, templates: c.templates.filter(t => t.id!==id) })); }
  function cancelTmpl() { setTmplForm(blankTmpl); setEditTmplId(null); }

  const allSections = [...SECTIONS.filter(s=>s.id!=="all"), ...customize.sections];

  const Panel = ({ title, icon, color, children }) => (
    <div style={{ background:C2.card, border:`1px solid ${C2.border}`, borderRadius:14, overflow:"hidden", marginBottom:16 }}>
      <div style={{ padding:"13px 16px", borderBottom:`1px solid ${C2.border}`, background:color+"0d", display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:16 }}>{icon}</span>
        <div style={{ fontSize:14, fontWeight:700, color:C2.text }}>{title}</div>
      </div>
      <div style={{ padding:"15px 16px" }}>{children}</div>
    </div>
  );

  const Chip = ({ label, color="#5b5bd6", onEdit, onDelete }) => (
    <div style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"4px 10px", borderRadius:20, background:color+"15", border:`1px solid ${color}33`, fontSize:12, color, margin:"0 4px 6px 0" }}>
      <span>{label}</span>
      {onEdit && <button onClick={onEdit} style={{ background:"transparent", border:"none", color, fontSize:10, cursor:"pointer", padding:"0 2px" }}>✎</button>}
      <button onClick={onDelete} style={{ background:"transparent", border:"none", color, fontSize:11, cursor:"pointer", padding:"0 2px" }}>✕</button>
    </div>
  );

  return (
    <div style={{ maxWidth:780 }}>
      <div style={{ marginBottom:18 }}>
        <div style={{ fontSize:16, fontWeight:700, color:C2.text, fontFamily:"'Lora',serif", marginBottom:4 }}>🎨 Customize</div>
        <div style={{ fontSize:12, color:C2.t3 }}>Add, edit, or remove team members, workstreams, sections, and meeting templates — no code needed. Changes save automatically.</div>
      </div>

      {/* ── TEAM MEMBERS ── */}
      <Panel title="Team Members" icon="👥" color={C2.blue}>
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:11, color:C2.t3, marginBottom:8 }}>These appear in the attendees and owner dropdowns.</div>
          <div style={{ display:"flex", flexWrap:"wrap", marginBottom:10 }}>
            {customize.team.map(name => (
              <Chip key={name} label={name} color={C2.blue} onDelete={()=>delMember(name)} />
            ))}
            {!customize.team.length && <div style={{ fontSize:12, color:C2.t3 }}>No custom members yet — using defaults.</div>}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <input value={newMember} onChange={e=>setNewMember(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()} placeholder="Add name (e.g. JD)…" style={{ ...inp, flex:1 }} />
            <button onClick={addMember} style={{ padding:"8px 16px", borderRadius:8, border:"none", background:C2.blue, color:"#fff", fontSize:13, fontWeight:600 }}>Add</button>
          </div>
        </div>
      </Panel>

      {/* ── WORKSTREAMS ── */}
      <Panel title="Workstreams" icon="📁" color={C2.purple}>
        <div style={{ fontSize:11, color:C2.t3, marginBottom:10 }}>Workstreams group your work. They show up in cards, notes, and filters.</div>
        <div style={{ display:"flex", flexWrap:"wrap", marginBottom:14 }}>
          {customize.workstreams.map(w => (
            <Chip key={w.id} label={`${w.icon} ${w.label}`} color={w.color} onEdit={()=>editWs(w)} onDelete={()=>delWs(w.id)} />
          ))}
          {!customize.workstreams.length && <div style={{ fontSize:12, color:C2.t3 }}>No custom workstreams yet.</div>}
        </div>
        <div style={{ background:C2.cream, border:`1px solid ${C2.border}`, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:11, fontWeight:700, color:C2.purple, marginBottom:10 }}>{editWsId ? "✎ Edit workstream" : "+ New workstream"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
            <div><Lbl>LABEL</Lbl><input value={wsForm.label} onChange={e=>setWsForm(f=>({...f,label:e.target.value}))} placeholder="e.g. Data Quality" style={inp}/></div>
            <div><Lbl>ICON (emoji)</Lbl><input value={wsForm.icon} onChange={e=>setWsForm(f=>({...f,icon:e.target.value}))} placeholder="📁" style={inp}/></div>

          <div style={{ marginBottom:10 }}>

                <div key={col} onClick={()=>setWsForm(f=>({...f,color:col}))} style={{ width:22, height:22, borderRadius:"50%", background:col, cursor:"pointer", border: wsForm.color===col ? `3px solid ${C2.text}` : "2px solid transparent" }}/>

        <div style={{ marginBottom:14 }}>
          {Object.values(TMPLS).map(t => {

            return (
              <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", background:C2.cream, border:`1px solid ${C2.border}`, borderRadius:8, marginBottom:5, opacity:0.65 }}>

                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:C2.text }}>{t.label}</div>
                  {t.attendees && <div style={{ fontSize:10, color:C2.t3 }}>👥 {t.attendees}</div>}
                </div>
                <span style={{ fontSize:9, color:C2.t3 }}>built-in</span>
              </div>
            );
          })}
          {customize.templates.map(t => {
            const s = allSections.find(sec=>sec.id===t.section)||allSections[0]||{icon:"◈",color:C2.accent};
            return (
              <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", background:C2.card, border:`1px solid ${C2.border}`, borderRadius:8, marginBottom:5 }}>
                <span style={{ color:s.color }}>{s.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:600, color:C2.text }}>{t.label}</div>
                  {t.attendees && <div style={{ fontSize:10, color:C2.t3 }}>👥 {t.attendees}</div>}
                </div>
                <button onClick={()=>editTmpl(t)} style={{ padding:"3px 8px", borderRadius:6, border:`1px solid ${C2.border}`, background:"transparent", color:C2.t2, fontSize:11 }}>✎ Edit</button>
                <button onClick={()=>delTmpl(t.id)} style={{ background:"transparent", border:"none", color:C2.red, fontSize:11, cursor:"pointer" }}>✕</button>
              </div>
            );
          })}
        </div>
        <div style={{ background:C2.cream, border:`1px solid ${C2.border}`, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:11, fontWeight:700, color:C2.orange, marginBottom:10 }}>{editTmplId ? "✎ Edit template" : "+ New template"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
            <div><Lbl>LABEL (sidebar name)</Lbl><input value={tmplForm.label} onChange={e=>setTmplForm(f=>({...f,label:e.target.value}))} placeholder="e.g. Weekly Standup" style={inp}/></div>
            <div><Lbl>SECTION</Lbl>
              <select value={tmplForm.section} onChange={e=>setTmplForm(f=>({...f,section:e.target.value}))} style={inp}>
                {allSections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
              </select>
            </div>
            <div style={{ gridColumn:"1/-1" }}><Lbl>FULL TITLE</Lbl><input value={tmplForm.title} onChange={e=>setTmplForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Weekly Standup — Team" style={inp}/></div>
            <div style={{ gridColumn:"1/-1" }}><Lbl>ATTENDEES</Lbl><input value={tmplForm.attendees} onChange={e=>setTmplForm(f=>({...f,attendees:e.target.value}))} placeholder="e.g. Salma, ZM, JE" style={inp}/></div>
            <div style={{ gridColumn:"1/-1" }}><Lbl>AGENDA (one item per line)</Lbl>
              <textarea value={tmplForm.agenda} onChange={e=>setTmplForm(f=>({...f,agenda:e.target.value}))} rows={4} placeholder={"1. Review last week\n2. Priorities for this week\n3. Blockers"} style={{ ...inp, resize:"vertical", lineHeight:1.7 }}/>
            </div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={saveTmpl} style={{ flex:1, padding:"8px", borderRadius:8, border:"none", background:C2.orange, color:"#fff", fontSize:13, fontWeight:600 }}>{editTmplId ? "Save changes" : "Add template"}</button>
            {editTmplId && <button onClick={cancelTmpl} style={{ padding:"8px 14px", borderRadius:8, border:`1px solid ${C2.border}`, background:"transparent", color:C2.t2, fontSize:13 }}>Cancel</button>}
          </div>
        </div>
      </Panel>
    </div>
  );
}
