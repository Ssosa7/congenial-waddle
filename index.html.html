function Todo({items,todos,onChange}{
  const C=useC();
  const [newTxt,setNewTxt]=useState("");
  const dragItem=useRef(null);
  const dragOver=useRef(null);
  const td=today();
  const tt=todos.filter(t=>t.date===td);
  const urgent=items.filter(i=>i.status!=="done"&&i.status!=="archived"&&["urgent","high"].includes(i.priority));

  function add(){
    if(!newTxt.trim())return;
    onChange([...todos,{id:Date.now(),text:newTxt.trim(),done:false,date:td}]);
    setNewTxt("");
  }

  // Drag to reorder
  function onDragStart(e,idx){dragItem.current=idx;e.dataTransfer.effectAllowed="move";}
  function onDragEnter(idx){dragOver.current=idx;}
  function onDrop(){
    const from=dragItem.current,to=dragOver.current;
    if(from===null||to===null||from===to)return;
    const reordered=[...todos];
    const ttIdxs=tt.map(t=>todos.indexOf(t));
    const fromTodo=reordered.splice(ttIdxs[from],1)[0];
    // recalculate after splice
    const toIdx=reordered.indexOf(tt[to>from?to:to]);
    reordered.splice(toIdx<0?0:toIdx,0,fromTodo);
    onChange(reordered);
    dragItem.current=null;dragOver.current=null;
  }

  return(
    <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:17,alignItems:"start"}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"17px"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:3}}>✅ Today's Quick Tasks</div>
        <div style={{fontSize:11,color:C.t3,marginBottom:13}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <input value={newTxt} onChange={e=>setNewTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add task… (Enter)" style={{flex:1,background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontSize:13,outline:"none"}}/>
          <button onClick={add} style={{padding:"8px 14px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:13,fontWeight:600,minHeight:36}}>+</button>
        </div>
        <div style={{fontSize:10,color:C.t3,marginBottom:8,fontStyle:"italic"}}>Drag ≡ to reorder</div>
        {!tt.length&&<div style={{fontSize:12,color:C.t3,textAlign:"center",padding:"16px 0"}}>No tasks yet today</div>}
        {tt.map((t,idx)=>(
          <div key={t.id}
            draggable
            onDragStart={e=>onDragStart(e,idx)}
            onDragEnter={()=>onDragEnter(idx)}
            onDragEnd={onDrop}
            onDragOver={e=>e.preventDefault()}
            style={{display:"flex",alignItems:"center",gap:8,padding:"8px",borderRadius:7,marginBottom:4,background:t.done?C.cream:C.bg,border:`1px solid ${C.border}`,cursor:"default",minHeight:40}}>
            <span className="drag-handle" style={{fontSize:14,color:C.t3,flexShrink:0}}>≡</span>
            <button onClick={()=>onChange(todos.map(x=>x.id===t.id?{...x,done:!x.done}:x))}
              style={{width:18,height:18,borderRadius:4,border:`2px solid ${t.done?C.green:C.border}`,background:t.done?C.green:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",minHeight:"unset"}}>
              {t.done?"✓":""}
            </button>
            <span style={{flex:1,fontSize:12,color:t.done?C.t3:C.text,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
            <button onClick={()=>onChange(todos.filter(x=>x.id!==t.id))} style={{background:"transparent",border:"none",color:C.t3,fontSize:10,padding:"2px 4px",flexShrink:0}}>✕</button>
          </div>
        ))}
        {tt.length>0&&<div style={{marginTop:7,fontSize:11,color:C.t3,textAlign:"right"}}>{tt.filter(t=>t.done).length}/{tt.length} done</div>}
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"17px"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:3}}>🔥 Needs Attention</div>
        <div style={{fontSize:11,color:C.t3,marginBottom:13}}>Urgent & High priority open items</div>
        {!urgent.length&&<div style={{fontSize:12,color:C.t3,textAlign:"center",padding:"16px 0"}}>Nothing urgent 🎉</div>}
        {urgent.map(item=>{const p=getPri(item.priority),s=getSec(item.section);return(
          <div key={item.id} style={{padding:"8px 10px",borderRadius:8,marginBottom:4,background:C.bg,borderLeft:`3px solid ${p.color}`,minHeight:40}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:2}}>{s.icon} {item.title}</div>
            {item.workstream&&<div style={{fontSize:10,color:C.t3}}>📁 {item.workstream}</div>}
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>
              <Tag c={p.color} label={p.label}/>
              {item.due&&<span style={{fontSize:9,color:isOD(item.due)?C.red:C.t3,fontWeight:600}}>{isOD(item.due)?"⏰ ":""}{fmt(item.due)}</span>}
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

function Gantt({items,settings}{
  const C=useC();
  const [offset,setOffset]=useState(0);
  const COLS=28,withDates=items.filter(i=>i.due&&i.status!=="done"&&i.status!=="archived");
  const start=useMemo(()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+offset*7);d.setHours(0,0,0,0);return d;},[offset]);
  const days=useMemo(()=>Array.from({length:COLS},(_,i)=>{const d=new Date(start);d.setDate(d.getDate()+i);return d;}),[start]);
  const todayD=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const allImp=[...(settings.showDOE!==false?DOE_HOLIDAYS:[]),...(settings.importantDates||[])];
  function ci(ds){if(!ds)return-1;return Math.round((new Date(ds+"T00:00:00")-start)/86400000);}
  const impByCol=useMemo(()=>{const m={};allImp.forEach(d=>{const c=ci(d.date);if(c>=0&&c<COLS){if(!m[c])m[c]=[];m[c].push(d);}});return m;},[days,settings]);
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"17px",overflowX:"auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>📅 Gantt — 4 Week View</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setOffset(o=>o-1)} style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>← Prev</button>
          <button onClick={()=>setOffset(0)} style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${C.accent}`,background:C.accent+"15",color:C.accent,fontSize:12,fontWeight:600}}>Today</button>
          <button onClick={()=>setOffset(o=>o+1)} style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Next →</button>
        </div>
      </div>
      <div style={{minWidth:680,overflowX:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:`180px repeat(${COLS},1fr)`,marginBottom:2,borderBottom:`1px solid ${C.border}`,paddingBottom:2}}>
          <div style={{fontSize:9,color:C.t3,fontWeight:700}}>ITEM</div>
          {days.map((d,i)=>{const isT=d.getTime()===todayD.getTime(),isMon=d.getDay()===1||i===0,imp=impByCol[i];return(
            <div key={i} title={imp?.map(x=>x.label).join(", ")} style={{fontSize:7,color:isT?C.accent:imp?C.green:isMon?C.t2:C.t3,fontWeight:isT?700:600,textAlign:"center",background:isT?C.accent+"12":imp?"#f0fdf4":"transparent",borderRadius:2,padding:"1px 0"}}>
              {isT||isMon?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):imp?"★":""}
            </div>
          );})}
        </div>
        {!withDates.length&&<div style={{fontSize:12,color:C.t3,padding:"22px 0",textAlign:"center"}}>No items with dates yet</div>}
        {withDates.map(item=>{
          const sec=getSec(item.section),pri=getPri(item.priority),od=isOD(item.due),bar=od?C.red:pri.color;
          const si=ci(item.startDate||item.due),ei=ci(item.due);
          return(
            <div key={item.id} style={{display:"grid",gridTemplateColumns:`180px repeat(${COLS},1fr)`,marginBottom:2,alignItems:"center"}}>
              <div style={{fontSize:10,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:6,display:"flex",gap:3,alignItems:"center"}}>
                <span style={{color:sec.color,flexShrink:0}}>{sec.icon}</span><span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{item.title}</span>
              </div>
              {days.map((_,i)=>{
                const isT=days[i].getTime()===todayD.getTime(),inR=i>=Math.max(0,si)&&i<=Math.min(COLS-1,ei);
                const isS=(i===si&&si>=0&&si<COLS),isE=(i===ei&&ei>=0&&ei<COLS),isDot=(si===ei && isS);
                return(
                  <div key={i} style={{height:22,position:"relative",display:"flex",alignItems:"center"}}>

function Cal({items,settings,onEdit}{
  const C=useC();
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear()),[mo,setMo]=useState(now.getMonth());
  const dIM=new Date(yr,mo+1,0).getDate(),fD=new Date(yr,mo,1).getDay(),td=today();
  const allImp=[...(settings.showDOE!==false?DOE_HOLIDAYS:[]),...(settings.importantDates||[])];
  const byDate=useMemo(()=>{
    const m={};
    const add=(ymdStr, obj)=>{
      if(!ymdStr) return;
      const d=new Date(ymdStr+"T00:00:00");
      if(d.getFullYear()!==yr || d.getMonth()!==mo) return;
      const k=d.getDate();
      m[k]=m[k]||[];
      m[k].push(obj);
    };
    const addRange=(start,end,obj)=>{
      if(!start) return;
      const s=new Date(start+"T00:00:00");
      const e=new Date((end||start)+"T00:00:00");
      let a=s, b=e;
      if(b<a){ const t=a; a=b; b=t; }
      for(let cur=new Date(a); cur<=b; cur.setDate(cur.getDate()+1)){
        const ymdStr=cur.toISOString().slice(0,10);
        add(ymdStr, obj);
      }
    };

    items.filter(i=>i.due&&i.status!=="done"&&i.status!=="archived").forEach(item=>{
      add(item.due,{type:"task",label:item.title,section:item.section});
    });

    const imps=[...(settings.importantDates||[]), ...((settings.showDOE)?DOE_HOLIDAYS:[])];
    imps.forEach(imp=>{
      const start=imp.start||imp.date;
      const end=imp.end||imp.date||imp.start;
      const category=imp.category||imp.type||"custom";
      addRange(start,end,{type:category,label:imp.label});
    });

    (settings.calendarEvents||[]).forEach(ev=>{
      const start=ev.start||ev.date;
      const end=ev.end||ev.date||ev.start;
      addRange(start,end,{type:ev.category||"calendar",label:ev.label||ev.summary||"Calendar event"});
    });

    return m;
  },[items,yr,mo,settings]);
  const cells=useMemo(()=>{const a=[];for(let i=0;i<fD;i++)a.push(null);for(let i=1;i<=dIM;i++)a.push(i);return a;},[fD,dIM]);
  function prev(){if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}
  function next(){if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"17px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>🗓 {new Date(yr,mo,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={prev} style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>← Prev</button>
          <button onClick={()=>{setYr(now.getFullYear());setMo(now.getMonth());}} style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${C.accent}`,background:C.accent+"15",color:C.accent,fontSize:12,fontWeight:600}}>Today</button>
          <button onClick={next} style={{padding:"5px 9px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Next →</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:3}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{fontSize:10,color:C.t3,fontWeight:700,textAlign:"center",padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,i)=>{
          if(!day)return<div key={`e${i}`}/>;
          const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`,isT=ds===td,cell=byDate[day]||[];
          const taskItems=cell.filter(x=>x.type==="task");
          const impItems=cell.filter(x=>x.type!=="task");
          const hasHol=impItems.some(x=>x.type==="holiday"||x.type==="break");
          return(
            <div key={day} style={{minHeight:72,background:isT?C.accent+"12":hasHol?"#fef9ee":taskItems.length?C.cream:C.bg,borderRadius:7,border:`1px solid ${isT?C.accent:hasHol?"#fde68a":C.border}`,padding:"4px 4px"}}>
              <div style={{fontSize:10,fontWeight:isT?700:400,color:isT?C.accent:C.t3,marginBottom:2}}>{day}</div>
              {impItems.slice(0,1).map((imp,ii)=>{
                const meta=(settings.dateCategories||DEF_SETTINGS.dateCategories).find(c=>c.key===imp.type)||{color:C.green,label:imp.type};
                const icon=imp.type==="holiday"?"🎉":imp.type==="break"?"🏖️":imp.type==="calendar"?"📅":imp.type==="deadline"?"⏰":imp.type==="release"?"🚀":imp.type==="meeting"?"🤝":imp.type==="training"?"🧠":imp.type==="reminder"?"📌":imp.type==="personal"?"💅":imp.type==="qc"?"🔎":imp.type==="pto"?"🌴":imp.type==="custom"?"✨":imp.type==="other"?"•":"★";
                return (<div key={ii} style={{fontSize:7,color:meta.color,fontWeight:700,marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{icon} {imp.label}</div>);
              })}
              {taskItems.slice(0,2).map((item,ii)=><div key={ii} title={item.label} style={{fontSize:8,color:C.text,background:C.accent+"20",border:`1px solid ${C.accent}44`,borderRadius:3,padding:"1px 3px",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}}>{getSec(item.section).icon} {item.label}</div>)}
              {taskItems.length>2&&<div style={{fontSize:7,color:C.t3}}>+{taskItems.length-2}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

    nextStep: "",

  const STATUSES = ["Not started","In progress","Waiting","Blocked","Done"];

    .filter(p => filterWs==="all" ? true : p.workstream===filterWs)

      const hay = [p.name, p.owner, p.status, p.workstream, p.nextStep, p.notes, ...(Array.isArray(p.links)? p.links : [])].map(normalized).join(" | ");

  const icsFileRef=useRef();

  const delJ=id=>setS(v=>({...v,jiraBoards:v.jiraBoards.filter(b=>b.id!==id)}));

    if(!nd.start || !nd.label) return;

    setNd({start:"",end:"",label:"",category:"custom"});
  }

  async function importICSUrl(){
    if(!icsUrl.trim())return;
    setIcsLoading(true);
    try{
      const res=await fetch(icsUrl);const text=await res.text();
      const events=parseICS(text);
      setS(v=>({...v,calendarEvents:[...(v.calendarEvents||[]),...events]}));
      alert(`✅ Imported ${events.length} events from calendar!`);
    }catch(e){alert("Could not fetch calendar. Try uploading the .ics file instead.");}
    setIcsLoading(false);
  }
  function importICSFile(file){
    const r=new FileReader();
    r.onload=e=>{const events=parseICS(e.target.result);setS(v=>({...v,calendarEvents:[...(v.calendarEvents||[]),...events]}));alert(`✅ Imported ${events.length} events!`);};
    r.readAsText(file);
  }
  function exportData(){const b=new Blob([JSON.stringify({items,todos,settings:s,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`daily-hub-${today()}.json`;a.click();}
  function importFile(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.items){lsSave("dh-items",d.items);lsSave("dh-todos",d.todos||[]);lsSave("dh-settings",d.settings||{});alert("✅ Restored! Refresh the page.");}}catch{alert("Invalid file.");}};r.readAsText(file);}

  const si={background:C.cream,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",color:C.text,fontSize:12,outline:"none"};
  const row={display:"flex",gap:6,alignItems:"center",marginBottom:5};
  const SH=({t,color,onAdd,lbl})=><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,marginTop:2}}><div style={{fontSize:10,fontWeight:700,color,letterSpacing:"0.05em"}}>{t}</div>{onAdd&&<button onClick={onAdd} style={{padding:"2px 8px",borderRadius:5,border:`1px solid ${color}`,background:color+"15",color,fontSize:10,fontWeight:600}}>+ {lbl}</button>}</div>;

  return(
    <div style={{position:"fixed",inset:0,background:"#00000044",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-in" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:23,width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:3}}>⚙ Settings & Integrations</div>
        <div style={{fontSize:12,color:C.t3,marginBottom:15}}>Configure calendar, boards, channels, and dates.</div>

        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"13px 15px",marginBottom:15}}>
          <SH t="📅 OUTLOOK CALENDAR IMPORT (.ICS)" color={C.blue}/>
          <div style={{fontSize:11,color:C.t2,marginBottom:9,lineHeight:1.5}}>Import your Outlook calendar to show meetings on Calendar and Gantt views.</div>
          <div style={{fontSize:10,fontWeight:700,color:C.t2,marginBottom:5}}>Option 1 — Paste ICS URL from Outlook:</div>
          <div style={{display:"flex",gap:6,marginBottom:9}}>
            <input value={icsUrl} onChange={e=>setIcsUrl(e.target.value)} placeholder="https://outlook.office365.com/owa/calendar/…" style={{...si,flex:1,width:"100%"}}/>
            <button onClick={importICSUrl} disabled={icsLoading||!icsUrl.trim()} style={{padding:"7px 11px",borderRadius:7,border:"none",background:C.blue,color:"#fff",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{icsLoading?"…":"Import"}</button>
          </div>
          <div style={{fontSize:10,fontWeight:700,color:C.t2,marginBottom:5}}>Option 2 — Upload .ics file:</div>
          <button onClick={()=>icsFileRef.current.click()} style={{width:"100%",padding:"8px",borderRadius:7,border:`2px dashed ${C.blue}44`,background:"transparent",color:C.blue,fontSize:12,fontWeight:600}}>📎 Upload .ics file</button>
          <input ref={icsFileRef} type="file" accept=".ics" style={{display:"none"}} onChange={e=>{if(e.target.files[0])importICSFile(e.target.files[0]);}}/>
          {(s.calendarEvents||[]).length>0&&<div style={{fontSize:11,color:C.blue,marginTop:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>✅ {s.calendarEvents.length} calendar events imported<button onClick={()=>setS(v=>({...v,calendarEvents:[]}))} style={{background:"transparent",border:"none",color:C.red,fontSize:11}}>Clear</button></div>}
        </div>

        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"13px 15px",marginBottom:15}}>
          <SH t="📌 IMPORTANT DATES" color={C.green}/>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            <input type="checkbox" checked={s.showDOE!==false} onChange={e=>setS(v=>({...v,showDOE:e.target.checked}))} style={{accentColor:C.green}}/>
            <span style={{fontSize:12,color:C.t2}}>Show DOE/NYC holidays & school breaks</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.6fr 1fr auto",gap:5,marginBottom:6}}>
            <input type="date" value={nd.start} onChange={e=>setNd(d=>({...d,start:e.target.value}))} style={{...si,width:"100%"}}/>
            <input type="date" value={nd.end} onChange={e=>setNd(d=>({...d,end:e.target.value}))} style={{...si,width:"100%"}}/>
            <input value={nd.label} onChange={e=>setNd(d=>({...d,label:e.target.value}))} placeholder="Label" style={{...si,width:"100%"}}/>
            <select value={nd.category} onChange={e=>setNd(d=>({...d,category:e.target.value}))} style={{...si,width:"100%"}}>
              {(s.dateCategories||DEF_SETTINGS.dateCategories).filter(c=>!["holiday","break","calendar"].includes(c.key)).map(c=>(<option key={c.key} value={c.key}>{c.label}</option>))}
            </select>
            <button onClick={addDate} title="Add" style={{padding:"7px 10px",borderRadius:7,border:"none",background:C.green,color:"#fff",fontSize:12,fontWeight:600}}>+</button>
          </div>
          {(s.importantDates||[]).map(d=>{
            const start=d.start||d.date;
            const end=d.end||d.date||d.start;
            const meta=(s.dateCategories||DEF_SETTINGS.dateCategories).find(c=>c.key===(d.category||d.type))||{label:(d.category||d.type||"custom"),color:C.green};
            const range=(start && end && start!==end)? `${fmt(start)} – ${fmt(end)}` : fmt(start||end||"");
            return (<div key={d.id} style={{display:"flex",alignItems:"center",gap:7,padding:"3px 0",borderBottom:"1px solid #d1fae5",fontSize:11}}>
              <span style={{color:C.green,fontWeight:600}}>{range}</span>
              <span style={{flex:1}}>{d.label}</span>
              <Tag c={meta.color} label={meta.label}/>
              <button onClick={()=>delDate(d.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:11}}>✕</button>
            </div>);
          })}
        </div>

        <SH t="🔵 JIRA BOARDS" color={C.blue} onAdd={addJ} lbl="Add"/>
        {s.jiraBoards.map(b=><div key={b.id} style={row}><input value={b.name} onChange={e=>upJ(b.id,"name",e.target.value)} placeholder="Name" style={{...si,flex:"0 0 70px"}}/><input value={b.prefix} onChange={e=>upJ(b.id,"prefix",e.target.value)} placeholder="Prefix" style={{...si,flex:"0 0 75px",fontFamily:"'DM Mono',monospace"}}/><input value={b.base} onChange={e=>upJ(b.id,"base",e.target.value)} placeholder="Base URL" style={{...si,flex:1}}/><button onClick={()=>delJ(b.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:13}}>✕</button></div>)}

        <div style={{borderTop:`1px solid ${C.border}`,marginTop:13,paddingTop:13,marginBottom:13}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t2,marginBottom:7}}>💾 BACKUP & RESTORE</div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={exportData} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.border}`,background:C.cream,color:C.blue,fontSize:12,fontWeight:600}}>⬇ Export</button>
            <button onClick={()=>fileRef.current.click()} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.border}`,background:C.cream,color:C.green,fontSize:12,fontWeight:600}}>⬆ Import</button>
            <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])importFile(e.target.files[0]);}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:13}}>Cancel</button>
          <button onClick={()=>{onSave(s);onClose();}} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:13,fontWeight:600}}>Save Settings</button>
        </div>
      </div>
    </div>
  );
}

function EditModal({item,onSave,onClose,all}{
  const C=useC();
  const inp0={width:"100%",background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontSize:13,outline:"none"};

  const linkable=all.filter(i=>i.id!==e.id&&!(e.linkedItems||[]).includes(i.id)&&(!lq||i.title.toLowerCase().includes(lq.toLowerCase())));
  return(
    <div style={{position:"fixed",inset:0,background:"#00000044",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={ev=>{if(ev.target===ev.currentTarget)onClose();}}>

          <div><Lbl>WORK STREAM</Lbl><input value={e.workstream||""} onChange={ev=>setE(i=>({...i,workstream:ev.target.value}))} list="ws" style={inp0}/></div>
          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><Lbl>SECTION</Lbl><select value={e.section||""} onChange={ev=>setE(i=>({...i,section:ev.target.value}))} style={inp0}>{SECTIONS.filter(s=>s.id!=="all").map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
            <div><Lbl>PRIORITY</Lbl><select value={e.priority||""} onChange={ev=>setE(i=>({...i,priority:ev.target.value}))} style={inp0}>{PRIS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</select></div>
            <div><Lbl>STATUS</Lbl><select value={e.status||""} onChange={ev=>setE(i=>({...i,status:ev.target.value}))} style={inp0}>{STATS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
            <div><Lbl>OWNER</Lbl><input value={e.owner||""} onChange={ev=>setE(i=>({...i,owner:ev.target.value}))} list="team" style={inp0}/></div>
            <div><Lbl>START DATE</Lbl><input type="date" value={e.startDate||""} onChange={ev=>setE(i=>({...i,startDate:ev.target.value}))} style={inp0}/></div>
            <div><Lbl>DUE DATE</Lbl><input type="date" value={e.due||""} onChange={ev=>setE(i=>({...i,due:ev.target.value}))} style={inp0}/></div>
          </div>
          <div><Lbl>JIRA</Lbl><input value={e.jira||""} onChange={ev=>setE(i=>({...i,jira:ev.target.value}))} style={{...inp0,fontFamily:"'DM Mono',monospace"}}/></div>
          <div style={{background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}><Lbl>🔗 LINKED ITEMS</Lbl><button onClick={()=>setShowL(p=>!p)} style={{fontSize:10,color:C.accent,background:"transparent",border:`1px solid ${C.accent}`,borderRadius:5,padding:"2px 6px",fontWeight:600}}>+ Link</button></div>
            {linkedObjs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:5}}>{linkedObjs.map(li=><div key={li.id} style={{display:"flex",alignItems:"center",gap:3,background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"2px 6px",fontSize:10}}><span style={{color:getSec(li.section).color}}>{getSec(li.section).icon}</span><span style={{maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{li.title}</span><button onClick={()=>setE(i=>({...i,linkedItems:(i.linkedItems||[]).filter(id=>id!==li.id)}))} style={{background:"transparent",border:"none",color:C.t3,fontSize:9}}>✕</button></div>)}</div>}
            {showL&&<><input value={lq} onChange={ev=>setLq(ev.target.value)} placeholder="Search…" style={{...inp0,marginBottom:5}}/><div style={{maxHeight:100,overflowY:"auto"}}>{linkable.slice(0,10).map(li=><div key={li.id} onClick={()=>{setE(i=>({...i,linkedItems:[...(i.linkedItems||[]),li.id]}));setShowL(false);setLq("");}} style={{padding:"5px 6px",borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontSize:11}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><span style={{color:getSec(li.section).color}}>{getSec(li.section).icon}</span><span style={{flex:1}}>{li.title}</span><Tag c={getStat(li.status).dot} label={getStat(li.status).label}/></div>)}</div></>}
          </div>
          {TFIELDS.map(f=><div key={f.key}><Lbl>{f.icon} {f.label.toUpperCase()}</Lbl><textarea value={e[f.key]||""} onChange={ev=>setE(i=>({...i,[f.key]:ev.target.value}))} rows={2} placeholder={f.ph} style={{...inp0,resize:"vertical"}}/></div>)}
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div onClick={()=>setE(i=>({...i,carryOver:!i.carryOver}))} style={{width:28,height:15,borderRadius:8,background:e.carryOver?C.accent:C.border,position:"relative",cursor:"pointer",flexShrink:0}}>
              <div style={{width:9,height:9,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:e.carryOver?16:2,transition:"left .2s"}}/>
            </div>
            <span style={{fontSize:12,color:C.t2}}>Carry over until done</span>

        <div style={{display:"flex",gap:8,marginTop:15}}>
