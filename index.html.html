// ── ZENDESK TRACKER ──────────────────────────────────────────────────────────
function ZendeskTracker(){
  const C=useC();
  const STATUSES=["new","open","pending","on-hold","solved","closed"];
  const PRIORITIES=["low","normal","high","urgent"];
  const SCOLORS={new:C.blue,open:C.orange,pending:C.yellow,"on-hold":C.t3,solved:C.green,closed:C.t3};
  const blank={id:null,ticketId:"",title:"",status:"open",priority:"normal",requester:"",workstream:"",notes:"",resolution:"",escalation:"",escalateTo:"",escalated:false};
  const [tickets,setTickets]=useState(()=>lsGet("dh-zendesk",SAMPLE_ZENDESK));
  const [form,setForm]=useState(blank);
  const [editing,setEditing]=useState(false);
  const [filter,setFilter]=useState("all");
  function save(d){lsSave("dh-zendesk",d);setTickets(d);}
  function submit(){
    if(!form.ticketId.trim()&&!form.title.trim())return;
    const obj={...form,id:form.id||Date.now(),updatedAt:new Date().toISOString()};
    save(form.id?tickets.map(t=>t.id===form.id?obj:t):[obj,...tickets]);
    setForm(blank);setEditing(false);
  }
  function del(id){if(confirm("Delete ticket?"))save(tickets.filter(t=>t.id!==id));}
  function edit(t){setForm(t);setEditing(true);}
  function toggleEscalate(t){save(tickets.map(x=>x.id===t.id?{...x,escalated:!x.escalated,updatedAt:new Date().toISOString()}:x));}
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};
  const shown=filter==="all"?tickets:tickets.filter(t=>t.status===filter);
  const openCount=tickets.filter(t=>!["solved","closed"].includes(t.status)).length;
  const escalatedCount=tickets.filter(t=>t.escalated).length;
  return(
    <div style={{maxWidth:960}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>🎫 Zendesk Tracker</div>
          <div style={{fontSize:12,color:C.t3}}>Track tickets, escalations, and resolutions</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:C.orange,background:C.orange+"15",padding:"3px 10px",borderRadius:20,fontWeight:700}}>{openCount} open</span>
          {escalatedCount>0&&<span style={{fontSize:11,color:C.red,background:C.red+"15",padding:"3px 10px",borderRadius:20,fontWeight:700}}>⚡ {escalatedCount} escalated</span>}
          <button onClick={()=>{setForm(blank);setEditing(true);}} style={{padding:"8px 16px",borderRadius:9,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>+ Ticket</button>
        </div>
      </div>
      {/* Filter chips */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {["all",...STATUSES].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{padding:"3px 12px",borderRadius:20,border:`1px solid ${filter===s?(SCOLORS[s]||C.accent):C.border}`,background:filter===s?(SCOLORS[s]||C.accent)+"15":"transparent",color:filter===s?(SCOLORS[s]||C.accent):C.t2,fontSize:11,fontWeight:filter===s?700:400}}>
            {s==="all"?`All (${tickets.length})`:s.charAt(0).toUpperCase()+s.slice(1)}
          </button>
        ))}
      </div>
      {/* Form */}
      {editing&&(
        <div style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:12}}>{form.id?"✎ Edit":"+ New"} Ticket</div>
          <div style={{display:"grid",gridTemplateColumns:"120px 1fr 1fr 1fr",gap:9,marginBottom:9}}>
            <div><Lbl>TICKET ID</Lbl><input style={inp} value={form.ticketId} onChange={e=>setForm(f=>({...f,ticketId:e.target.value}))} placeholder="#12345"/></div>
            <div style={{gridColumn:"span 2"}}><Lbl>TITLE / ISSUE</Lbl><input style={inp} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Brief description of the issue"/></div>
            <div><Lbl>REQUESTER</Lbl><input list="team" style={inp} value={form.requester} onChange={e=>setForm(f=>({...f,requester:e.target.value}))} placeholder="Who submitted?"/></div>
            <div><Lbl>STATUS</Lbl><select style={inp} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
              {STATUSES.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
            </select></div>
            <div><Lbl>PRIORITY</Lbl><select style={inp} value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>
              {PRIORITIES.map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
            </select></div>
            <div><Lbl>WORKSTREAM</Lbl><select style={inp} value={form.workstream} onChange={e=>setForm(f=>({...f,workstream:e.target.value}))}>
              <option value="">General</option>{WORKSTREAMS.map(w=><option key={w.id} value={w.id}>{w.label}</option>)}
            </select></div>
            <div><Lbl>ALERT TEAM MEMBER</Lbl><input list="team" style={inp} value={form.escalateTo} onChange={e=>setForm(f=>({...f,escalateTo:e.target.value}))} placeholder="Who to alert?"/></div>
            <div style={{gridColumn:"1/-1"}}><Lbl>ESCALATION / DELAY NOTE</Lbl><input style={inp} value={form.escalation} onChange={e=>setForm(f=>({...f,escalation:e.target.value}))} placeholder="Describe the delay, blocker, or escalation reason…"/></div>
            <div style={{gridColumn:"1/-1"}}><Lbl>MY NOTES</Lbl><textarea style={{...inp,resize:"none"}} rows={2} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Context, investigation notes, links…"/></div>
            <div style={{gridColumn:"1/-1"}}><Lbl>RESOLUTION / CLOSING NOTES</Lbl><textarea style={{...inp,resize:"none"}} rows={2} value={form.resolution} onChange={e=>setForm(f=>({...f,resolution:e.target.value}))} placeholder="How was this resolved?"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={submit} style={{padding:"8px 20px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>Save</button>
            <button onClick={()=>{setForm(blank);setEditing(false);}} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}
      {/* Ticket list */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {shown.map(t=>{
          const sc=SCOLORS[t.status]||C.t3;
          const pc={low:C.t3,normal:C.blue,high:C.orange,urgent:C.red}[t.priority]||C.t3;
          const ws=WORKSTREAMS.find(w=>w.id===t.workstream);
          return(
            <div key={t.id} style={{background:C.card,border:`1px solid ${t.escalated?C.red+"66":C.border}`,borderRadius:12,padding:"13px 16px",borderLeft:`4px solid ${t.escalated?C.red:sc}`}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                    {t.ticketId&&<span style={{fontSize:11,fontWeight:700,color:C.blue,background:C.blue+"15",padding:"2px 7px",borderRadius:20}}>#{t.ticketId}</span>}
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{t.title}</span>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:t.notes||t.escalation?6:0}}>
                    <span style={{fontSize:9,fontWeight:700,color:sc,background:sc+"15",padding:"2px 7px",borderRadius:20}}>{t.status}</span>
                    <span style={{fontSize:9,fontWeight:700,color:pc,background:pc+"15",padding:"2px 7px",borderRadius:20}}>{t.priority}</span>
                    {t.requester&&<span style={{fontSize:9,color:C.t2,background:C.cream,padding:"2px 7px",borderRadius:20,border:`1px solid ${C.border}`}}>👤 {t.requester}</span>}
                    {ws&&<span style={{fontSize:9,color:ws.color,background:ws.color+"15",padding:"2px 7px",borderRadius:20}}>{ws.icon} {ws.label}</span>}
                    {t.escalated&&<span style={{fontSize:9,fontWeight:700,color:C.red,background:C.red+"15",padding:"2px 7px",borderRadius:20,border:`1px solid ${C.red}44`}}>⚡ ESCALATED{t.escalateTo?` → ${t.escalateTo}`:""}</span>}
                  </div>
                  {t.escalation&&<div style={{fontSize:11,color:C.red,background:C.red+"0a",padding:"5px 9px",borderRadius:7,marginBottom:4,border:`1px solid ${C.red}22`}}>⚡ {t.escalation}</div>}
                  {t.notes&&<div style={{fontSize:11,color:C.t2,background:C.cream,padding:"5px 9px",borderRadius:7,marginBottom:4}}>📝 {t.notes}</div>}
                  {t.resolution&&<div style={{fontSize:11,color:C.green,background:C.green+"0f",padding:"5px 9px",borderRadius:7,border:`1px solid ${C.green}33`}}>✅ {t.resolution}</div>}
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0,flexWrap:"wrap"}}>
                  <button onClick={()=>toggleEscalate(t)} style={{padding:"4px 10px",borderRadius:7,border:`1px solid ${t.escalated?C.red+"44":C.border}`,background:t.escalated?C.red+"0f":"transparent",color:t.escalated?C.red:C.t2,fontSize:11,fontWeight:600}}>{t.escalated?"✓ Escalated":"⚡ Escalate"}</button>
                  <button onClick={()=>edit(t)} style={{background:"transparent",border:"none",color:C.t3,fontSize:13,padding:"4px 6px"}}>✎</button>
                  <button onClick={()=>del(t.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:12,padding:"4px 6px"}}>✕</button>
                </div>
              </div>
            </div>
          );
        })}
        {!shown.length&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}><div style={{fontSize:36,marginBottom:8}}>🎫</div><div style={{fontSize:13,fontWeight:600}}>No tickets{filter!=="all"?` with status "${filter}"`:" yet"}</div></div>}
      </div>
    </div>
  );
}

// ── WEEKLY PLANNER ────────────────────────────────────────────────────────────
function WeeklyPlanner({items,todos,onEdit}){
  const C=useC();
  const BLOCKS=["morning","afternoon","eod"];
  const BLOCK_LABELS={morning:"🌅 Morning",afternoon:"☀️ Afternoon",eod:"🌆 EOD"};
  // Get Mon of current week
  function getMonday(offset=0){
    const d=new Date();
    const day=d.getDay()||7;
    d.setDate(d.getDate()-day+1+offset*7);
    return ymdFromDateLocal(d);
  }
  const [weekOffset,setWeekOffset]=useState(0);
  const monday=useMemo(()=>getMonday(weekOffset),[weekOffset]);
  const days=useMemo(()=>{
    const arr=[];
    for(let i=0;i<5;i++){
      const d=new Date(monday+"T00:00:00");
      d.setDate(d.getDate()+i);
      arr.push(ymdFromDateLocal(d));
    }
    return arr;
  },[monday]);
  const DAY_NAMES=["Mon","Tue","Wed","Thu","Fri"];
  const DAY_FULL=["Monday","Tuesday","Wednesday","Thursday","Friday"];
  const todayStr=today();

  // Planner data: {[date]: {morning:[],afternoon:[],eod:[]}}
  const [plan,setPlan]=useState(()=>lsGet("dh-weekly-plan",{}));
  function savePlan(p){lsSave("dh-weekly-plan",p);setPlan(p);}
  function getBlock(date,block){return(plan[date]||{})[block]||[];}
  function addToBlock(date,block,text){
    if(!text.trim())return;
    const p={...plan,[date]:{...(plan[date]||{}),morning:[],afternoon:[],eod:[],...(plan[date]||{}),[block]:[...(getBlock(date,block)),{id:Date.now(),text:text.trim(),done:false}]}};
    savePlan(p);
  }
  function toggleBlockItem(date,block,id){
    const items2=getBlock(date,block).map(x=>x.id===id?{...x,done:!x.done}:x);
    savePlan({...plan,[date]:{...(plan[date]||{}),[block]:items2}});
  }
  function removeBlockItem(date,block,id){
    savePlan({...plan,[date]:{...(plan[date]||{}),[block]:getBlock(date,block).filter(x=>x.id!==id)}});
  }
  // Drag between days
  const [dragging,setDragging]=useState(null); // {date,block,id,text}
  function onDragStart(e,date,block,item){setDragging({date,block,id:item.id,text:item.text});}
  function onDrop(e,targetDate,targetBlock){
    e.preventDefault();
    if(!dragging||dragging.date===targetDate&&dragging.block===targetBlock)return;
    removeBlockItem(dragging.date,dragging.block,dragging.id);
    addToBlock(targetDate,targetBlock,dragging.text);
    setDragging(null);
  }

  // Map meeting cards and todos to days
  const active=items.filter(i=>i.status!=="archived");
  const cardsByDay=useMemo(()=>{
    const m={};
    days.forEach(d=>{m[d]=active.filter(i=>i.date===d||i.due===d);});
    return m;
  },[days,active]);
  const todosByDay=useMemo(()=>{
    const m={};
    days.forEach(d=>{m[d]=todos.filter(t=>t.date===d&&!t.done);});
    return m;
  },[days,todos]);

  // Week summary
  const weekDone=useMemo(()=>days.flatMap(d=>cardsByDay[d]||[]).filter(i=>i.status==="done").length,[days,cardsByDay]);
  const weekOpen=useMemo(()=>days.flatMap(d=>cardsByDay[d]||[]).filter(i=>i.status!=="done").length,[days,cardsByDay]);
  const weekOD=useMemo(()=>days.flatMap(d=>cardsByDay[d]||[]).filter(i=>isOD(i.due)&&i.status!=="done").length,[days,cardsByDay]);

  const [newItems,setNewItems]=useState({});
  function setNew(date,block,val){setNewItems(n=>({...n,[`${date}-${block}`]:val}));}
  function getNew(date,block){return newItems[`${date}-${block}`]||"";}

  const colW=`calc((100% - 16px) / 5)`;
  const isToday=d=>d===todayStr;

  return(
    <div>
      {/* Week header + nav */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>setWeekOffset(o=>o-1)} style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>← Prev</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>Week of {new Date(monday+"T00:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
          {weekOffset!==0&&<button onClick={()=>setWeekOffset(0)} style={{fontSize:10,color:C.accent,background:"transparent",border:"none",fontWeight:600}}>→ This Week</button>}
        </div>
        <button onClick={()=>setWeekOffset(o=>o+1)} style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Next →</button>
      </div>

      {/* Summary strip */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        {[
          {label:"Items this week",val:weekOpen+weekDone,color:C.accent},
          {label:"Completed",val:weekDone,color:C.green},
          {label:"Still open",val:weekOpen,color:C.blue},
          {label:"Overdue",val:weekOD,color:C.red},
        ].map(s=>(
          <div key={s.label} style={{background:C.card,border:`1px solid ${s.val>0&&s.color===C.red?C.red+"44":C.border}`,borderRadius:10,padding:"8px 14px",flex:"1 1 100px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,color:s.color}}>{s.val}</div>
            <div style={{fontSize:10,color:C.t3}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Day columns */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8}}>
        {days.map((date,di)=>{
          const today2=isToday(date);
          const cards=cardsByDay[date]||[];
          const tdos=todosByDay[date]||[];
          const dd=new Date(date+"T00:00:00");
          return(
            <div key={date} style={{minWidth:220,flex:"1 0 220px",background:today2?C.accent+"08":C.card,border:`1px solid ${today2?C.accent+"66":C.border}`,borderRadius:12,overflow:"hidden"}}>
              {/* Day header */}
              <div style={{padding:"9px 12px",background:today2?C.accent+"15":C.cream,borderBottom:`1px solid ${C.border}`,textAlign:"center"}}>
                <div style={{fontSize:11,fontWeight:700,color:today2?C.accent:C.t2}}>{DAY_NAMES[di]}</div>
                <div style={{fontSize:16,fontWeight:700,color:today2?C.accent:C.text}}>{dd.getDate()}</div>
                <div style={{fontSize:9,color:C.t3}}>{dd.toLocaleDateString("en-US",{month:"short"})}</div>
              </div>
              <div style={{padding:"8px",display:"flex",flexDirection:"column",gap:8,maxHeight:600,overflowY:"auto"}}>
                {/* Meeting cards */}
                {cards.length>0&&(
                  <div>
                    <div style={{fontSize:9,fontWeight:700,color:C.t3,letterSpacing:"0.06em",marginBottom:4}}>CARDS</div>
                    {cards.map(item=>{
                      const sec=getSec(item.section);const sta=getStat(item.status);
                      return(<div key={item.id} onClick={()=>onEdit(item)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"5px 8px",cursor:"pointer",marginBottom:3,borderLeft:`2px solid ${sec.color}`}}>
                        <div style={{fontSize:10,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                        <div style={{display:"flex",gap:4,marginTop:2}}>
                          <span style={{fontSize:8,color:sta.dot}}>● {sta.label}</span>
                        </div>
                      </div>);
                    })}
                  </div>
                )}
                {/* Todos */}
                {tdos.length>0&&(
                  <div>
                    <div style={{fontSize:9,fontWeight:700,color:C.t3,letterSpacing:"0.06em",marginBottom:4}}>TO-DOs</div>
                    {tdos.map(t=><div key={t.id} style={{fontSize:10,color:C.text,padding:"3px 0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>○ {t.text}</div>)}
                  </div>
                )}
                {/* Time blocks */}
                {BLOCKS.map(block=>(
                  <div key={block}
                    onDragOver={e=>e.preventDefault()}
                    onDrop={e=>onDrop(e,date,block)}
                    style={{background:C.cream,borderRadius:8,padding:"6px 7px",border:`2px dashed ${dragging?C.accent+"44":C.border}`,minHeight:40}}>
                    <div style={{fontSize:9,fontWeight:700,color:C.t3,marginBottom:4}}>{BLOCK_LABELS[block]}</div>
                    {getBlock(date,block).map(item=>(
                      <div key={item.id} draggable onDragStart={e=>onDragStart(e,date,block,item)}
                        style={{display:"flex",alignItems:"center",gap:4,marginBottom:3,cursor:"grab"}}>
                        <input type="checkbox" checked={item.done} onChange={()=>toggleBlockItem(date,block,item.id)} style={{flexShrink:0,accentColor:C.accent}}/>
                        <span style={{fontSize:10,color:item.done?C.t3:C.text,textDecoration:item.done?"line-through":"none",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.text}</span>
                        <button onClick={()=>removeBlockItem(date,block,item.id)} style={{background:"transparent",border:"none",color:C.t3,fontSize:9,flexShrink:0,padding:0}}>✕</button>
                      </div>
                    ))}
                    <input value={getNew(date,block)} onChange={e=>setNew(date,block,e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter"){addToBlock(date,block,getNew(date,block));setNew(date,block,"");}}}
                      placeholder="+ add…" style={{width:"100%",background:"transparent",border:"none",fontSize:10,color:C.text,outline:"none",padding:"2px 0"}}/>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── TRIAGE VIEW ───────────────────────────────────────────────────────────────
function TriageView({items,decisions,onEdit,onCycle}){
  const C=useC();
  const active=items.filter(i=>i.status!=="archived"&&i.status!=="done");
  const blocked=active.filter(i=>i.status==="blocked");
  const overdue=active.filter(i=>isOD(i.due)).sort((a,b)=>{
    const da=Math.floor((new Date()-new Date(a.due+"T00:00:00"))/86400000);
    const db=Math.floor((new Date()-new Date(b.due+"T00:00:00"))/86400000);
    return db-da;
  });
  const noOwner=active.filter(i=>!i.owner?.trim()&&(i.priority==="urgent"||i.priority==="high"));
  const staleDecs=decisions.filter(d=>d.status==="open"&&d.date<lastWeek());
  const longInProgress=active.filter(i=>i.status==="inprogress"&&i.statusChanged&&Math.floor((new Date()-new Date(i.statusChanged))/86400000)>=7);

  function Section({icon,label,color,items:its,emptyMsg,children}){
    if(!its.length&&!children)return null;
    return(
      <div style={{background:C.card,border:`1px solid ${its.length?color+"44":C.border}`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 16px",background:color+"08",borderBottom:its.length?`1px solid ${C.border}`:"none"}}>
          <span style={{fontSize:15}}>{icon}</span>
          <span style={{fontSize:13,fontWeight:700,color:C.text,flex:1}}>{label}</span>
          <span style={{fontSize:12,fontWeight:700,color:color,background:color+"18",padding:"2px 10px",borderRadius:20}}>{its.length}</span>
        </div>
        {its.length===0&&<div style={{padding:"10px 16px",fontSize:11,color:C.t3}}>{emptyMsg}</div>}
        {its.map(item=>{
          const sec=getSec(item.section);const pri=getPri(item.priority);
          const daysOD=item.due?Math.floor((new Date()-new Date(item.due+"T00:00:00"))/86400000):0;
          return(
            <div key={item.id} onClick={()=>onEdit(item)} style={{display:"flex",gap:10,padding:"10px 16px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",alignItems:"center"}}
              onMouseEnter={e=>e.currentTarget.style.background=C.cream}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{color:sec.color,fontSize:13,flexShrink:0}}>{sec.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                <div style={{display:"flex",gap:5,marginTop:2,flexWrap:"wrap"}}>
                  <span style={{fontSize:9,color:pri.color,background:pri.color+"15",padding:"1px 6px",borderRadius:20}}>{pri.label}</span>
                  {item.workstream&&<span style={{fontSize:9,color:C.t3}}>{item.workstream}</span>}
                  {item.owner&&<span style={{fontSize:9,color:C.t2}}>👤 {item.owner}</span>}
                  {daysOD>0&&<span style={{fontSize:9,color:C.red,fontWeight:700}}>⏰ {daysOD}d overdue</span>}
                </div>
              </div>
              <button onClick={e=>{e.stopPropagation();onCycle({...item,status:item.status==="blocked"?"pending":"done",_setStatus:true});}}
                style={{padding:"4px 9px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:10,flexShrink:0,whiteSpace:"nowrap"}}>
                {item.status==="blocked"?"Unblock":"Mark Done"}
              </button>
            </div>
          );
        })}
      </div>
    );
  }

  const total=blocked.length+overdue.length+noOwner.length+longInProgress.length+staleDecs.length;
  return(
    <div style={{maxWidth:860}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>🚨 Triage — What Needs Attention</div>
        <div style={{fontSize:12,color:C.t3}}>Everything blocked, overdue, ownerless, or stale — in one place</div>
      </div>
      {total===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:C.t3}}>
          <div style={{fontSize:48,marginBottom:12}}>🎉</div>
          <div style={{fontSize:15,fontWeight:700,color:C.green}}>You're clear!</div>
          <div style={{fontSize:12,marginTop:6}}>Nothing blocked, overdue, or ownerless right now.</div>
        </div>
      )}
      <Section icon="⛔" label="Blocked" color={C.red} items={blocked} emptyMsg="No blocked items"/>
      <Section icon="⏰" label={`Overdue (${overdue.length})`} color={C.orange} items={overdue} emptyMsg="Nothing overdue"/>
      <Section icon="🔥" label="In Progress 7+ Days" color={C.orange} items={longInProgress} emptyMsg="Nothing stale"/>
      <Section icon="👤" label="Urgent / High — No Owner" color={C.yellow} items={noOwner} emptyMsg="All high-priority items have owners"/>
      {staleDecs.length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.purple}44`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"11px 16px",background:C.purple+"08",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:15}}>⚖</span>
            <span style={{fontSize:13,fontWeight:700,color:C.text,flex:1}}>Stale Open Decisions</span>
            <span style={{fontSize:12,fontWeight:700,color:C.purple,background:C.purple+"18",padding:"2px 10px",borderRadius:20}}>{staleDecs.length}</span>
          </div>
          {staleDecs.map(d=>(
            <div key={d.id} style={{padding:"9px 16px",borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.text}}>
              <span style={{fontWeight:600}}>{d.text}</span>
              <span style={{fontSize:10,color:C.t3,marginLeft:8}}>— {d.meeting} · {fmt(d.date)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── RECURRING ITEMS ───────────────────────────────────────────────────────────
function RecurringItems({todos,setTodos}){
  const C=useC();
  const blank={id:null,text:"",recurrence:"weekly",interval:1,dayOfWeek:1,dayOfMonth:1,lastGenerated:""};
  const [rules,setRules]=useState(()=>lsGet("dh-recurring",[]));
  const [form,setForm]=useState(blank);
  const [editing,setEditing]=useState(false);
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};
  const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const RTYPE_LABELS={daily:"Daily",weekly:"Weekly (same day)",biweekly:"Bi-weekly",monthly:"Monthly",custom:"Custom interval"};

  function saveRules(r){lsSave("dh-recurring",r);setRules(r);}
  function submit(){
    if(!form.text.trim())return;
    const obj={...form,id:form.id||Date.now()};
    saveRules(form.id?rules.map(r=>r.id===form.id?obj:r):[obj,...rules]);
    setForm(blank);setEditing(false);
  }
  function del(id){saveRules(rules.filter(r=>r.id!==id));}

  // Check and generate due todos
  function generateNow(rule){
    const td=today();
    const d=new Date(td+"T00:00:00");
    let shouldGen=false;
    if(rule.recurrence==="daily")shouldGen=true;
    else if(rule.recurrence==="weekly")shouldGen=d.getDay()===rule.dayOfWeek;
    else if(rule.recurrence==="biweekly"){
      if(d.getDay()===rule.dayOfWeek){
        const weekN=Math.floor((d-new Date("2024-01-01"))/604800000);
        shouldGen=weekN%2===0;
      }
    }
    else if(rule.recurrence==="monthly")shouldGen=d.getDate()===rule.dayOfMonth;
    else if(rule.recurrence==="custom"&&rule.lastGenerated){
      const daysSince=Math.floor((d-new Date(rule.lastGenerated+"T00:00:00"))/86400000);
      shouldGen=daysSince>=(rule.interval||7);
    }else if(rule.recurrence==="custom")shouldGen=true;

    if(shouldGen&&rule.lastGenerated!==td){
      const already=todos.some(t=>t.text===rule.text&&t.date===td);
      if(!already){
        const newTodo={id:Date.now()+Math.random(),text:rule.text,done:false,date:td,recurring:true};
        setTodos(prev=>[newTodo,...prev]);
      }
      saveRules(rules.map(r=>r.id===rule.id?{...r,lastGenerated:td}:r));
    }
  }

  useEffect(()=>{rules.forEach(generateNow);},[]);

  return(
    <div style={{maxWidth:720}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>🔁 Recurring Items</div>
          <div style={{fontSize:12,color:C.t3}}>Auto-create to-dos on a schedule</div>
        </div>
        <button onClick={()=>{setForm(blank);setEditing(true);}} style={{padding:"8px 16px",borderRadius:9,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>+ Add Rule</button>
      </div>
      {editing&&(
        <div style={{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:12}}>{form.id?"Edit":"New"} Recurring Item</div>
          <div style={{marginBottom:9}}><Lbl>TASK TEXT</Lbl><input style={inp} value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))} placeholder="e.g. Review JIRA board"/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:12}}>
            <div><Lbl>RECURRENCE</Lbl><select style={inp} value={form.recurrence} onChange={e=>setForm(f=>({...f,recurrence:e.target.value}))}>
              {Object.entries(RTYPE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select></div>
            {(form.recurrence==="weekly"||form.recurrence==="biweekly")&&<div><Lbl>DAY OF WEEK</Lbl><select style={inp} value={form.dayOfWeek} onChange={e=>setForm(f=>({...f,dayOfWeek:+e.target.value}))}>
              {DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
            </select></div>}
            {form.recurrence==="monthly"&&<div><Lbl>DAY OF MONTH</Lbl><input type="number" min={1} max={28} style={inp} value={form.dayOfMonth} onChange={e=>setForm(f=>({...f,dayOfMonth:+e.target.value}))}/></div>}
            {form.recurrence==="custom"&&<div><Lbl>EVERY N DAYS</Lbl><input type="number" min={1} style={inp} value={form.interval} onChange={e=>setForm(f=>({...f,interval:+e.target.value}))}/></div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={submit} style={{padding:"7px 18px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>Save</button>
            <button onClick={()=>{setForm(blank);setEditing(false);}} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.t2,fontSize:12}}>Cancel</button>
            <button onClick={()=>rules.forEach(generateNow)} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.accent,fontSize:12,marginLeft:"auto"}}>↺ Run Now</button>
          </div>
        </div>
      )}
      {!rules.length&&!editing&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}><div style={{fontSize:36,marginBottom:8}}>🔁</div><div style={{fontSize:13,fontWeight:600}}>No recurring rules yet</div><div style={{fontSize:12,marginTop:4}}>Add rules to auto-create daily, weekly, or custom to-dos</div></div>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {rules.map(r=>(
          <div key={r.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"12px 16px",display:"flex",gap:10,alignItems:"center"}}>
            <div style={{fontSize:20,flexShrink:0}}>🔁</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>{r.text}</div>
              <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:C.accent,background:C.accent+"15",padding:"1px 7px",borderRadius:20}}>{RTYPE_LABELS[r.recurrence]}</span>
                {(r.recurrence==="weekly"||r.recurrence==="biweekly")&&<span style={{fontSize:10,color:C.t3}}>on {DAYS[r.dayOfWeek]}</span>}
                {r.recurrence==="monthly"&&<span style={{fontSize:10,color:C.t3}}>on the {r.dayOfMonth}th</span>}
                {r.recurrence==="custom"&&<span style={{fontSize:10,color:C.t3}}>every {r.interval} days</span>}
                {r.lastGenerated&&<span style={{fontSize:10,color:C.t3}}>last: {fmt(r.lastGenerated)}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>generateNow(r)} title="Generate now" style={{padding:"4px 9px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.accent,fontSize:11}}>▶ Now</button>
              <button onClick={()=>{setForm(r);setEditing(true);}} style={{background:"transparent",border:"none",color:C.t3,fontSize:13,padding:"4px 6px"}}>✎</button>
              <button onClick={()=>del(r.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:12,padding:"4px 6px"}}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── AGENDA BUILDER ────────────────────────────────────────────────────────────
function AgendaBuilder(){
  const C=useC();
  const blank={id:null,title:"",date:today(),startTime:"09:00",topics:[]};
  const [agendas,setAgendas]=useState(()=>lsGet("dh-agendas",[]));
  const [sel,setSel]=useState(null);
  const [newTopic,setNewTopic]=useState({topic:"",owner:"",minutes:10});
  const inp={background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:12,outline:"none",width:"100%"};

  function saveAgendas(a){lsSave("dh-agendas",a);setAgendas(a);}
  function newAgenda(){
    const a={...blank,id:Date.now(),title:"New Meeting Agenda"};
    saveAgendas([a,...agendas]);setSel(a.id);
  }
  function updateAgenda(id,patch){
    const updated=agendas.map(a=>a.id===id?{...a,...patch}:a);
    saveAgendas(updated);
  }
  function delAgenda(id){saveAgendas(agendas.filter(a=>a.id!==id));if(sel===id)setSel(null);}
  function addTopic(agendaId){
    if(!newTopic.topic.trim())return;
    const a=agendas.find(a=>a.id===agendaId);
    if(!a)return;
    updateAgenda(agendaId,{topics:[...(a.topics||[]),{...newTopic,id:Date.now()}]});
    setNewTopic({topic:"",owner:"",minutes:10});
  }
  function removeTopic(agendaId,topicId){
    const a=agendas.find(a=>a.id===agendaId);
    if(!a)return;
    updateAgenda(agendaId,{topics:a.topics.filter(t=>t.id!==topicId)});
  }
  function moveTopic(agendaId,idx,dir){
    const a=agendas.find(a=>a.id===agendaId);if(!a)return;
    const ts=[...a.topics];const ni=idx+dir;
    if(ni<0||ni>=ts.length)return;
    [ts[idx],ts[ni]]=[ts[ni],ts[idx]];
    updateAgenda(agendaId,{topics:ts});
  }

  const selAgenda=agendas.find(a=>a.id===sel);
  function timeForTopic(agenda,upToIdx){
    if(!agenda.startTime)return"";
    const [h,m]=agenda.startTime.split(":").map(Number);
    let mins=h*60+m;
    for(let i=0;i<upToIdx;i++)mins+=(agenda.topics[i]?.minutes||0);
    const hh=Math.floor(mins/60)%24,mm=mins%60;
    return`${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
  }
  const totalMins=selAgenda?(selAgenda.topics||[]).reduce((s,t)=>s+(t.minutes||0),0):0;

  function copyAgenda(){
    if(!selAgenda)return;
    const lines=[`📋 ${selAgenda.title}`,`📅 ${fmt(selAgenda.date)} · Start: ${selAgenda.startTime}`,"",...(selAgenda.topics||[]).map((t,i)=>`${timeForTopic(selAgenda,i)} [${t.minutes}min] ${t.topic}${t.owner?` — ${t.owner}`:""}`),"",`Total: ${totalMins} min`];
    navigator.clipboard?.writeText(lines.join("\n"));
  }

  return(
    <div style={{maxWidth:900}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:"'Lora',serif"}}>📋 Agenda Builder</div>
        <div style={{fontSize:12,color:C.t3}}>Build timed meeting agendas</div></div>
        <button onClick={newAgenda} style={{padding:"8px 16px",borderRadius:9,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:700}}>+ New Agenda</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:14,alignItems:"start"}}>
        {/* Agenda list */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:10}}>
          <div style={{fontSize:10,fontWeight:700,color:C.t3,marginBottom:8}}>AGENDAS</div>
          {!agendas.length&&<div style={{fontSize:11,color:C.t3}}>No agendas yet</div>}
          {agendas.map(a=>(
            <div key={a.id} onClick={()=>setSel(a.id)}
              style={{padding:"8px 10px",borderRadius:8,marginBottom:4,cursor:"pointer",background:sel===a.id?C.accent+"12":"transparent",border:`1px solid ${sel===a.id?C.accent+"44":"transparent"}`}}>
              <div style={{fontSize:12,fontWeight:600,color:sel===a.id?C.accent:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title}</div>
              <div style={{fontSize:10,color:C.t3}}>{fmt(a.date)} · {(a.topics||[]).length} topics</div>
            </div>
          ))}
        </div>
        {/* Agenda detail */}
        {!selAgenda&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:24,textAlign:"center",color:C.t3}}><div style={{fontSize:28,marginBottom:8}}>📋</div><div style={{fontSize:12}}>Select or create an agenda</div></div>}
        {selAgenda&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{display:"flex",gap:9,marginBottom:14,flexWrap:"wrap"}}>
              <input style={{...inp,flex:2}} value={selAgenda.title} onChange={e=>updateAgenda(sel,{title:e.target.value})} placeholder="Meeting title"/>
              <input type="date" style={{...inp,flex:"1 1 120px"}} value={selAgenda.date} onChange={e=>updateAgenda(sel,{date:e.target.value})}/>
              <input type="time" style={{...inp,flex:"1 1 100px"}} value={selAgenda.startTime} onChange={e=>updateAgenda(sel,{startTime:e.target.value})}/>
              <button onClick={copyAgenda} style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.accent,fontSize:12,fontWeight:600}}>📋 Copy</button>
              <button onClick={()=>delAgenda(sel)} style={{padding:"7px 10px",borderRadius:8,border:`1px solid ${C.red}44`,background:"transparent",color:C.red,fontSize:12}}>Delete</button>
            </div>
            {/* Total time */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.t2}}>TOPICS</div>
              <div style={{fontSize:11,color:totalMins>60?C.red:C.t3}}>⏱ Total: <strong>{totalMins} min</strong>{totalMins>60?` (${Math.floor(totalMins/60)}h ${totalMins%60}m)`:""}</div>
            </div>
            {/* Topics */}
            {(selAgenda.topics||[]).map((t,i)=>(
              <div key={t.id} style={{display:"flex",gap:7,alignItems:"center",padding:"8px 10px",background:C.cream,borderRadius:8,marginBottom:5,border:`1px solid ${C.border}`}}>
                <span style={{fontSize:10,fontWeight:700,color:C.accent,width:40,flexShrink:0}}>{timeForTopic(selAgenda,i)}</span>
                <span style={{flex:1,fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.topic}</span>
                {t.owner&&<span style={{fontSize:10,color:C.t3,flexShrink:0}}>👤 {t.owner}</span>}
                <span style={{fontSize:10,fontWeight:700,color:C.purple,background:C.purple+"15",padding:"1px 7px",borderRadius:20,flexShrink:0}}>{t.minutes}m</span>
                <div style={{display:"flex",gap:2,flexShrink:0}}>
                  <button onClick={()=>moveTopic(sel,i,-1)} disabled={i===0} style={{background:"transparent",border:"none",color:C.t3,fontSize:10,padding:"2px 3px",opacity:i===0?.3:1}}>↑</button>
                  <button onClick={()=>moveTopic(sel,i,1)} disabled={i===(selAgenda.topics.length-1)} style={{background:"transparent",border:"none",color:C.t3,fontSize:10,padding:"2px 3px",opacity:i===(selAgenda.topics.length-1)?.3:1}}>↓</button>
                  <button onClick={()=>removeTopic(sel,t.id)} style={{background:"transparent",border:"none",color:C.red,fontSize:11,padding:"2px 3px"}}>✕</button>
                </div>
              </div>
            ))}
            {/* Add topic */}
            <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
              <input style={{...inp,flex:3}} value={newTopic.topic} onChange={e=>setNewTopic(n=>({...n,topic:e.target.value}))} placeholder="Topic…"

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function Confetti(){
  const C=useC();
  const canvasRef=useRef();
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    const colors=[C.accent,C.green,C.yellow,C.orange,C.purple,"#ff6b9d","#ffd93d"];
    const pieces=Array.from({length:120},()=>({
      x:Math.random()*canvas.width,y:-10,w:8+Math.random()*8,h:4+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*4,vy:3+Math.random()*4,rot:Math.random()*360,vrot:(Math.random()-0.5)*10,
    }));
    let frame,alive=true;
    function draw(){
      if(!alive)return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;p.vy*=0.99;
        if(p.y>canvas.height+20)return;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      });
      frame=requestAnimationFrame(draw);
    }
    draw();
    const t=setTimeout(()=>{alive=false;cancelAnimationFrame(frame);},3000);
    return()=>{alive=false;cancelAnimationFrame(frame);clearTimeout(t);};
  },[]);
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}}/>;
}

function CommandPalette({items,onClose,onNav,onEdit}){

  const CMDS=VIEWS.map(v=>({type:"view",label:`Go to ${v.label}`,icon:v.icon,id:v.id}));
  const results=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    if(!lq)return CMDS.slice(0,8);
    const viewR=CMDS.filter(c=>c.label.toLowerCase().includes(lq));
    const itemR=items.filter(i=>i.status!=="archived"&&[i.title,i.workstream,i.jira].some(f=>f&&f.toLowerCase().includes(lq)))

    return[...viewR,...itemR].slice(0,10);
  },[q,items]);

    if(r.type==="view")onNav(r.id);

  }
  function onKey(e){

  function setTodos(v){setTodosRaw(v);lsSave("dh-todos",v);pulse();}
  function setDecisions(v){setDecisionsRaw(v);lsSave("dh-decisions",v);pulse();}
  function setSettings(v){setSettingsRaw(v);lsSave("dh-settings",v);pulse();}
  function setCustomize(v){

      return next;
    });

  function importJSON(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data._version!=="daily-hub-v2"&&!confirm("This file may be from a different version. Import anyway?"))return;
        ALL_KEYS.forEach(k=>{if(data[k]!==undefined)lsSave(k,data[k]);});
        // Reload state
        setItemsRaw(lsGet("dh-items",SAMPLE));
        setTodosRaw(lsGet("dh-todos",SAMPLE_TODOS));
        setDecisionsRaw(lsGet("dh-decisions",SAMPLE_DECISIONS));
        setCustomizeRaw(lsGet("dh-customize",{team:[],workstreams:[],sections:[],templates:[]}));
        setProjectsRaw(lsGet("dh-projects",[]));
        alert("✅ Import complete! Your data has been restored.");
      }catch(err){alert("❌ Import failed — file may be corrupted: "+err.message);}
    };
    reader.readAsText(file);
  }
  function exportCSV(){
    const cols=["id","title","section","workstream","status","priority","owner","due","date","jira"];
    const rows=[cols.join(","),...active.map(i=>cols.map(c=>`"${(i[c]||"").toString().replace(/"/g,'""')}"`).join(","))];
    const blob=new Blob([rows.join("\n")],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`daily-hub-cards-${today()}.csv`;a.click();
    URL.revokeObjectURL(url);
  }

  function openDebrief(tmplId){setDebriefTmpl(tmplId||null);setShowDebrief(true);}
  function handleDebriefSave(out,updateCardIds){

    if(out.decisions.length)setDecisions(prev=>[...out.decisions,...prev]);
  }
  function handleQuickSave(type,data){
    if(type==="todo")setTodos([data,...todos]);
    else if(type==="item")setItems([data,...items]);
    else if(type==="decision")setDecisions([data,...decisions]);

          {view==="zendesk"     &&<ZendeskTracker/>}
          {view==="actioninbox" &&<ActionInbox items={active}/>}
          {view==="linkhub"     &&<LinkHub customize={customize} setCustomize={setCustomize}/>}
          {view==="dependencies"&&<Dependencies items={active} onEdit={openEdit}/>}
          {view==="sprint"      &&<SprintTracker items={active} onConfetti={()=>{setShowConfetti(true);setTimeout(()=>setShowConfetti(false),3200);}}/>}
          {view==="statusreport"&&<StatusReport items={active} decisions={decisions} todos={todos}/>}
          {view==="weekly"      &&<WeeklyPlanner items={active} todos={todos} onEdit={openEdit}/>}
          {view==="triage"      &&<TriageView items={active} decisions={decisions} onEdit={openEdit} onCycle={cycleStatus}/>}
          {view==="recurring"   &&<RecurringItems todos={todos} setTodos={setTodos}/>}
          {view==="agenda"      &&<AgendaBuilder/>}
        </div>
      </div>

      {/* ── BOTTOM NAV (mobile only) ── */}
      <nav className="bottom-nav">
        {[
          {id:"dashboard",icon:"📊",label:"Home"},
          {id:"prep",icon:"🎯",label:"Prep"},
          {id:"todo",icon:"✅",label:"Tasks"},
          {id:"cards",icon:"▦",label:"Cards"},
          {id:"notes",icon:"📝",label:"Notes"},
          {id:"calendar",icon:"🗓",label:"Cal"},
          {id:"gantt",icon:"📅",label:"Gantt"},
        ].map(v=>(
          <button key={v.id} onClick={()=>setView(v.id)} className={view===v.id?"active":""}>
            <span className="ico">{v.icon}</span>
            <span className="lbl">{v.label}</span>
          </button>
        ))}
      </nav>

      {showCmd&&<CommandPalette items={active} onClose={()=>setShowCmd(false)} onNav={navTo} onEdit={openEdit}/>}
      {showShortcuts&&<ShortcutsPanel onClose={()=>setShowShortcuts(false)}/>}
      {showConfetti&&<Confetti/>}
      {showBackup&&<BackupModal onClose={()=>setShowBackup(false)} onExportJSON={exportJSON} onImportJSON={importJSON} onExportCSV={exportCSV} lastBackup={lastBackup}/>}
      {showEOD&&<EndOfDay items={items} todos={todos} onClose={()=>setShowEOD(false)} onCarryOver={handleEODCarryOver} onMarkDone={()=>{}}/>}
      {showCapture &&<QuickCapture prefill={capturePrefill} onSave={handleQuickSave} onClose={()=>setShowCapture(false)}/>}
      {showDebrief &&<PostMeetingDebrief items={items} onSave={handleDebriefSave} onClose={()=>{setShowDebrief(false);setDebriefTmpl(null);}} initTmpl={debriefTmpl}/>}
      {editItem    &&<EditModal item={editItem} onSave={saveEdit} onClose={()=>setEditItem(null)} all={items}/>}
      {showSettings&&<Settings settings={settings} onSave={setSettings} onClose={()=>setShowSettings(false)} items={items} todos={todos}/>}
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
